<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aging</title>
<style>
  :root {
    --of-charcoal: #1d1d1f;
    --of-orange: #F97316;
    --of-orange-soft: #FEF3E8;
    --of-gray-50: #F8F9FB;
    --of-gray-100: #F1F2F4;
    --of-gray-200: #E5E7EB;
    --of-gray-500: #6B7280;
    --of-gray-700: #374151;
    --of-red: #DC2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    color: var(--of-charcoal);
    background: #fff;
    padding: 20px 24px;
  }
  .page-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px;
  }
  .page-header h2 { font-size: 22px; font-weight: 600; color: var(--of-charcoal); margin: 0; }
  .subtitle { font-size: 13px; color: var(--of-gray-500); margin-top: 4px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--of-gray-100); border: 1px solid var(--of-gray-200);
    padding: 6px 12px; border-radius: 8px; font-size: 12px; color: var(--of-gray-700);
  }
  .pill b { color: var(--of-charcoal); margin-left: 4px; }
  .kpi-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--of-gray-50); border: 1px solid var(--of-gray-200);
    border-radius: 10px; padding: 16px;
  }
  .kpi-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--of-gray-500); margin-bottom: 8px;
  }
  .kpi-value { font-size: 24px; font-weight: 600; color: var(--of-charcoal); }
  .kpi-foot { font-size: 11px; color: var(--of-gray-500); margin-top: 4px; }
  .kpi-card.accent { background: var(--of-orange-soft); border-color: #FCD3A8; }
  .kpi-card.accent .kpi-value { color: var(--of-orange); }
  table.aging { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  table.aging th {
    text-align: right; padding: 10px 8px; color: var(--of-gray-500); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.3px; font-size: 10px;
    border-bottom: 1px solid var(--of-gray-200);
  }
  table.aging th.first { text-align: left; }
  table.aging td {
    padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--of-gray-100);
    color: var(--of-charcoal); font-variant-numeric: tabular-nums;
  }
  table.aging td.first { text-align: left; color: var(--of-charcoal); font-weight: 500; }
  table.aging td.dim { color: var(--of-gray-500); }
  table.aging td.total { font-weight: 600; }
  table.aging tr.totals td { font-weight: 700; border-top: 2px solid var(--of-charcoal); border-bottom: none; }
  .loading { padding: 24px; color: var(--of-gray-500); }
  .empty-state { padding: 24px; color: var(--of-gray-500); text-align: center; }
</style>
</head>
<body>
  <div id="aging-app"><div class="loading">Loading aging data...</div></div>
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <script>
    var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
    var brokerEmail = null;

    ZOHO.CREATOR.init().then(function (initParams) {
      var loginUser = initParams && initParams.loginUser;
      brokerEmail = loginUser && loginUser.loginId;
      if (!brokerEmail) {
        document.getElementById('aging-app').innerHTML = '<div style="padding:24px;color:#DC2626">Unable to identify broker.</div>';
        return;
      }
      fetchAging();
    });

    function fetchAging() {
      fetch(BROKER_API_BASE + '/aging?email=' + encodeURIComponent(brokerEmail))
        .then(function (r) { return r.json(); })
        .then(function (data) { renderSummary(data); })
        .catch(function () {
          document.getElementById('aging-app').innerHTML = "<div style='padding:24px;color:#DC2626'>Couldn't load aging data - try refreshing.</div>";
        });
    }

    function fmtMoney(v) {
      if (v == null || v === '') return '-';
      return '$' + Math.round(v).toLocaleString();
    }

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }

    function renderSummary(d) {
      if (!d || !d.buckets || !d.customers) {
        document.getElementById('aging-app').innerHTML = '<div class="empty-state">No aging data available.</div>';
        return;
      }
      var pastDue = (d.buckets.b31_45 || 0) + (d.buckets.b46_60 || 0) + (d.buckets.b61_90 || 0) + (d.buckets.b90_plus || 0);
      var top = d.customers.slice().sort(function(a,b){ return (b.concentrationPct || 0) - (a.concentrationPct || 0); })[0];
      var html = '<div class="page-header">' +
        '<div><h2>Aging Summary</h2><p class="subtitle">' + esc(d.client && d.client.name) + ' &mdash; Open customer balances</p></div>' +
        '<span class="pill">As of <b>' + esc(d.asOf) + '</b></span>' +
      '</div>';
      html += '<div class="kpi-grid">' +
        kpiCard(true, 'Total Open AR', fmtMoney(d.buckets.total), 'across ' + d.customers.length + ' customers') +
        kpiCard(false, 'Buy Limit', fmtMoney(d.client && d.client.buyLimit), fmtMoney(d.client && d.client.available) + ' available') +
        kpiCard(false, 'Past Due (31+ days)', fmtMoney(pastDue), pctOf(pastDue, d.buckets.total) + ' of total') +
        kpiCard(false, 'Top Concentration', (top ? (top.concentrationPct || 0).toFixed(1) + '%' : '-'), top ? esc(top.name) : '') +
      '</div>';
      html += renderTable(d);
      document.getElementById('aging-app').innerHTML = html;
    }

    function kpiCard(accent, label, value, foot) {
      return '<div class="kpi-card' + (accent ? ' accent' : '') + '">' +
             '<div class="kpi-label">' + esc(label) + '</div>' +
             '<div class="kpi-value">' + esc(value) + '</div>' +
             '<div class="kpi-foot">' + esc(foot) + '</div></div>';
    }

    function pctOf(part, whole) {
      if (!whole) return '0.0%';
      return ((part / whole) * 100).toFixed(1) + '%';
    }

    function renderTable(d) {
      var rows = d.customers.map(function (c) {
        var b = c.buckets || {};
        return '<tr>' +
          '<td class="first">' + esc(c.name) + '</td>' +
          cell(c.buyLimit, true) +
          cell(b.b0_30) + cell(b.b31_45) + cell(b.b46_60) + cell(b.b61_90) + cell(b.b90_plus) +
          '<td class="total">' + fmtMoney(b.total) + '</td>' +
          '<td>' + (c.concentrationPct != null ? c.concentrationPct.toFixed(1) : '0.0') + '%</td>' +
        '</tr>';
      }).join('');
      var t = d.buckets;
      var totalsRow = '<tr class="totals">' +
        '<td class="first">Total &mdash; ' + d.customers.length + ' customers</td>' +
        '<td class="dim">' + fmtMoney(d.client && d.client.buyLimit) + '</td>' +
        '<td>' + fmtMoney(t.b0_30) + '</td><td>' + fmtMoney(t.b31_45) + '</td><td>' + fmtMoney(t.b46_60) + '</td>' +
        '<td>' + fmtMoney(t.b61_90) + '</td><td>' + fmtMoney(t.b90_plus) + '</td>' +
        '<td>' + fmtMoney(t.total) + '</td><td>100%</td>' +
      '</tr>';
      return '<table class="aging">' +
        '<thead><tr><th class="first">Customer</th><th>Buy Limit</th><th>0-30</th><th>31-45</th><th>46-60</th><th>61-90</th><th>90+</th><th>Total</th><th>%</th></tr></thead>' +
        '<tbody>' + rows + totalsRow + '</tbody>' +
      '</table>';
    }

    function cell(v, dim) {
      if (!v) return '<td class="dim">-</td>';
      return '<td' + (dim ? ' class="dim"' : '') + '>' + fmtMoney(v) + '</td>';
    }
  </script>
</body>
</html>
