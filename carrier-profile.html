<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrier Profile</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px; background: #f0efe9; color: #333; min-height: 100vh;
}
.widget { max-width: 1200px; margin: 0 auto; padding: 20px 24px 60px; }

.card {
  background: #fff; border: 1px solid #e6e3da; border-radius: 10px;
  padding: 20px; margin-bottom: 14px;
}

.hero h1 {
  font-size: 26px; font-weight: 700; color: #272727;
  letter-spacing: -0.3px; margin-bottom: 6px;
}
.hero .meta { font-size: 13px; color: #777; }

.state { text-align: center; padding: 40px 20px; color: #888; font-size: 13px; }
.state.error { color: #a31818; }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid #e6e3da; border-top-color: #888;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.placeholder { color: #aaa; font-size: 12px; font-style: italic; }

.hero-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
.hero-pills { display: flex; gap: 8px; flex-wrap: wrap; }

.pill { padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.pill-success { background: #ddf7e3; color: #0a7a2a; }
.pill-danger  { background: #fde2e1; color: #b00020; }
.pill-warning { background: #fff3cd; color: #8a5b00; }
.pill-info    { background: #d8eaff; color: #0a4a93; }
.pill-neutral { background: #eee; color: #444; }

.risk-strip-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.tier {
  padding: 6px 14px; border-radius: 6px; font-weight: 700;
  font-size: 13px; letter-spacing: 0.3px; text-transform: uppercase;
}
.tier-critical { background: #b00020; color: #fff; }
.tier-high     { background: #e58200; color: #fff; }
.tier-medium   { background: #c69500; color: #fff; }
.tier-low      { background: #0a7a2a; color: #fff; }
.risk-counts { color: #666; font-size: 13px; }

.risk-flags h2 { font-size: 16px; margin-bottom: 12px; color: #272727; letter-spacing: -0.1px; }
.risk-flags h3 {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
  color: #888; margin: 18px 0 6px; font-weight: 700;
}
.risk-flags h3:first-of-type { margin-top: 0; }
.risk-flags .no-flags { color: #0a7a2a; font-weight: 600; }

.flag-row {
  display: flex; gap: 12px; padding: 12px 0;
  border-top: 1px solid #f0efe9;
}
.flag-row:first-of-type { border-top: none; padding-top: 4px; }
.flag-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.flag-critical .flag-dot { background: #b00020; }
.flag-high     .flag-dot { background: #e58200; }
.flag-medium   .flag-dot { background: #c69500; }
.flag-low      .flag-dot { background: #0a7a2a; }
.flag-label { font-weight: 600; color: #272727; }
.flag-sev {
  font-size: 11px; color: #666; margin-left: 8px;
  text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600;
}
.flag-explanation { color: #555; font-size: 13px; margin-top: 2px; }
.flag-data { color: #999; font-size: 11px; margin-top: 2px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

.footer-version {
  text-align: right; font-size: 10px; color: #bbb; padding: 10px 8px 0;
}
</style>
</head>
<body>

<div class="widget">
  <div id="hero" class="card hero">
    <div class="state"><span class="spinner"></span>Loading carrier profile…</div>
  </div>
  <div id="risk-strip" class="card"><span class="placeholder">Risk summary</span></div>
  <div id="risk-flags" class="card"><span class="placeholder">Risk flags</span></div>
  <div id="authority-history" class="card"><span class="placeholder">Authority history</span></div>
  <div id="insurance-history" class="card"><span class="placeholder">Insurance history</span></div>
  <div id="crash-history" class="card"><span class="placeholder">Crash history</span></div>
  <div id="operations" class="card"><span class="placeholder">Operations and safety</span></div>
  <div id="identity-signals" class="card"><span class="placeholder">Identity and signup signals</span></div>
  <div id="vendor-internal" class="card"><span class="placeholder">Internal vendor data</span></div>
  <div id="noa-history" class="card"><span class="placeholder">NOA / LOR history</span></div>
  <div id="recent-submissions" class="card"><span class="placeholder">Recent submissions</span></div>
  <div id="documents" class="card"><span class="placeholder">Documents — coming soon</span></div>
  <div id="action-bar"></div>

  <div class="footer-version">v2026-05-11.3</div>
</div>

<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script>
(function() {
'use strict';

var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';

var brokerEmail = '';
var vendorId = '';
var profileAction = '';
var profilePayload = null;

window.addEventListener('load', function() {
  var u = new URL(window.location.href);
  vendorId = u.searchParams.get('vendor_id') || '';
  profileAction = u.searchParams.get('action') || '';
  bootApp();
});

function bootApp() {
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR) {
    showError('SDK unavailable', 'Reload the page.');
    return;
  }
  if (!ZOHO.CREATOR.UTIL || typeof ZOHO.CREATOR.UTIL.getInitParams !== 'function') {
    showError('SDK shape unexpected', 'getInitParams is not available.');
    return;
  }
  function gotParams(params) {
    console.log('[CarrierProfile] init params:', params);
    brokerEmail = (params && (params.loginUser || params.login_user || params.email)) || '';
    if (!brokerEmail) {
      showError('Could not identify broker', 'Open DevTools console (F12) for details.');
      return;
    }
    if (!vendorId) {
      showError('Missing vendor', 'Open this page from the Vendors list (vendor_id is required).');
      return;
    }
    console.log('[CarrierProfile] Booted as', brokerEmail, 'vendor', vendorId);
    loadProfile();
  }
  try {
    var result = ZOHO.CREATOR.UTIL.getInitParams();
    if (result && typeof result.then === 'function') {
      result.then(gotParams).catch(function(err) {
        console.error('[CarrierProfile] getInitParams rejected', err);
        showError('Initialization failed', 'Could not read init params.');
      });
    } else {
      gotParams(result);
    }
  } catch (err) {
    console.error('[CarrierProfile] getInitParams threw', err);
    showError('Initialization failed', 'Could not read init params.');
  }
}

function loadProfile() {
  var qs = new URLSearchParams({ email: brokerEmail, vendor_id: vendorId });
  fetch(BROKER_API_BASE + '/carrier-profile?' + qs.toString())
    .then(function(res) {
      if (!res.ok) return res.text().then(function(b) { throw new Error('HTTP ' + res.status + ' ' + b); });
      return res.json();
    })
    .then(function(payload) {
      profilePayload = payload;
      renderProfile(payload);
    })
    .catch(function(err) {
      console.error('[CarrierProfile] /carrier-profile failed', err);
      showError('Failed to load profile', String(err.message || err));
    });
}

function renderProfile(payload) {
  renderHero(payload);
  renderRiskStrip(payload);
  renderRiskFlags(payload);
  // Other section renderers called from subsequent tasks
}

function renderRiskStrip(p) {
  var r = p.risk || { tier: 'Low', flags: [] };
  var counts = countBySeverity(r.flags);
  document.getElementById('risk-strip').innerHTML =
    '<div class="risk-strip-row">' +
      '<span class="tier tier-' + esc((r.tier || 'low').toLowerCase()) + '">' + esc(r.tier || 'Low') + '</span>' +
      '<span class="risk-counts">' +
        counts.Critical + ' Critical · ' +
        counts.High + ' High · ' +
        counts.Medium + ' Medium' +
      '</span>' +
    '</div>';
}

function renderRiskFlags(p) {
  var flags = ((p.risk || {}).flags) || [];
  var container = document.getElementById('risk-flags');
  container.classList.add('risk-flags');
  if (!flags.length) {
    container.innerHTML = '<div class="no-flags">No risk flags detected.</div>';
    return;
  }
  var grouped = {};
  var order = [];
  flags.forEach(function(f) {
    if (!grouped[f.category]) { grouped[f.category] = []; order.push(f.category); }
    grouped[f.category].push(f);
  });
  var html = '<h2>Risk Flags</h2>';
  order.forEach(function(cat) {
    html += '<h3>' + esc(cat) + '</h3>';
    grouped[cat].forEach(function(f) { html += renderFlagRow(f); });
  });
  container.innerHTML = html;
}

function renderFlagRow(f) {
  var sev = (f.severity || 'low').toLowerCase();
  return '<div class="flag-row flag-' + esc(sev) + '">' +
    '<span class="flag-dot"></span>' +
    '<div style="flex:1;">' +
      '<span class="flag-label">' + esc(f.label) + '</span>' +
      '<span class="flag-sev">' + esc(f.severity) + '</span>' +
      (f.explanation ? '<div class="flag-explanation">' + esc(f.explanation) + '</div>' : '') +
      (f.data_point ? '<div class="flag-data">' + esc(f.data_point) + '</div>' : '') +
    '</div></div>';
}

function countBySeverity(flags) {
  var c = { Critical: 0, High: 0, Medium: 0, Low: 0 };
  (flags || []).forEach(function(f) {
    if (c[f.severity] !== undefined) c[f.severity] += 1;
  });
  return c;
}

function renderHero(p) {
  var v = p.vendor || {};
  var c = p.carrierok || {};
  var name = v.Vendor_Name || c.legal_name || 'Carrier';
  document.getElementById('hero').innerHTML =
    '<div class="hero-row">' +
      '<div>' +
        '<h1>' + esc(name) + '</h1>' +
        '<div class="meta">DOT ' + esc(v.USDOT || c.dot_number || '—') +
          ' &nbsp;·&nbsp; MC ' + esc(v.MC || c.docket_number || '—') + '</div>' +
      '</div>' +
      '<div class="hero-pills">' +
        pill(vendorStatusLabel(v), vendorStatusClass(v)) +
        pill(paymentLabel(v), 'neutral') +
        factorBadgeHtml(v) +
      '</div>' +
    '</div>';
}

function pill(text, cls) {
  return '<span class="pill pill-' + cls + '">' + esc(text) + '</span>';
}

function vendorStatusLabel(v) {
  if (v.DO_NOT_USE === true || v.DO_NOT_USE === 'true') return 'Do Not Use';
  return v.Vendor_Status || 'Unknown';
}

function vendorStatusClass(v) {
  if (v.DO_NOT_USE === true || v.DO_NOT_USE === 'true') return 'danger';
  switch ((v.Vendor_Status || '').toLowerCase()) {
    case 'approved': return 'success';
    case 'denied': return 'danger';
    case 'pending': return 'warning';
    case 'payment change': return 'info';
    default: return 'neutral';
  }
}

function paymentLabel(v) {
  if (v.Factoring_Company) return 'Factoring';
  if ((v.Payment_Terms || '').toLowerCase().indexOf('quick pay') !== -1) return 'Quick Pay';
  return v.Payment_Terms || '—';
}

function factorBadgeHtml(v) {
  if (!v.Factoring_Company) return '';
  var status = (v.Factor_Status || '').toLowerCase();
  if (status === 'denied') return pill('Factor Not Approved', 'danger');
  if (status === 'pending') return pill('Factor Pending', 'warning');
  return '';
}

function showError(title, msg) {
  document.getElementById('hero').innerHTML =
    '<div class="state error"><strong>' + esc(title) + '</strong><br>' + esc(msg) + '</div>';
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(ch) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
  });
}

})();
</script>
</body>
</html>
