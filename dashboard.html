<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OperFi Dashboard</title>
<style>
  :root {
    --of-bg: #f8fafc;
    --of-card: #ffffff;
    --of-border: #e2e8f0;
    --of-text: #1e293b;
    --of-muted: #64748b;
    --of-blue: #3b82f6;
    --of-amber: #f59e0b;
    --of-green: #22c55e;
    --of-red: #dc2626;
    --of-purple: #8b5cf6;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--of-bg); margin: 0; color: var(--of-text); }
  .container { padding: 16px 20px; }
  .label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--of-muted); margin-bottom: 8px; }
  .header-strip { background: #1e293b; color: #fff; padding: 14px 20px; border-radius: 8px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
  .header-strip .eyebrow { opacity: .6; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
  .header-strip .name { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .header-strip .meta { text-align: right; font-size: 11px; opacity: .8; }
  .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .qa { padding: 14px 12px; border-radius: 8px; text-align: center; font-weight: 600; cursor: pointer; }
  .qa.primary { background: var(--of-blue); color: #fff; }
  .qa.secondary { background: #fff; border: 1px solid #cbd5e1; color: var(--of-text); }
  .watch { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .watch-card { border-radius: 8px; padding: 14px; cursor: pointer; }
  .watch-card.red { background: #fef2f2; border: 1px solid #fca5a5; color: #7f1d1d; }
  .watch-card.amber { background: #fffbeb; border: 1px solid #fcd34d; color: #78350f; }
  .watch-card.blue { background: #f0f9ff; border: 1px solid #7dd3fc; color: #0c4a6e; }
  .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .kpi { background: var(--of-card); border: 1px solid var(--of-border); border-radius: 8px; padding: 14px; border-top: 3px solid var(--of-blue); }
  .kpi.ar { border-top-color: var(--of-blue); }
  .kpi.ap { border-top-color: var(--of-amber); }
  .kpi.reserves { border-top-color: var(--of-green); }
  .kpi.month { border-top-color: var(--of-purple); }
  .key-tasks { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .task-card { background: var(--of-card); border: 1px solid var(--of-border); border-radius: 8px; padding: 14px; cursor: pointer; }
  .insights-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .chart-card { background: var(--of-card); border: 1px solid var(--of-border); border-radius: 8px; padding: 16px; cursor: pointer; }
  .empty, .loading, .error { padding: 24px; text-align: center; color: var(--of-muted); }
  .version-stamp { text-align: right; font-size: 10px; color: #bbb; padding: 8px 4px 0; }
</style>
</head>
<body>
<div class="container" id="root">
  <div class="loading">Loading dashboard...</div>
</div>
<div class="version-stamp">v2026-05-20.2</div>

<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script>
(function () {
  var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
  var state = { email: null, data: null };

  function isLocalTest() { return location.protocol === 'file:' || /[?&]mock=1/.test(location.search); }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]); }); }
  function fmtMoney(n) { var v = Number(n) || 0; return v.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
  function fmtMoneyK(n) { var v = Number(n) || 0; if (Math.abs(v) >= 1000) return '$' + (v / 1000).toFixed(1).replace(/\.0$/, '') + 'k'; return '$' + Math.round(v); }

  function waitForZoho(attempts, delay) {
    if (typeof ZOHO !== 'undefined' && ZOHO.CREATOR) return Promise.resolve();
    if (attempts <= 0) return Promise.reject(new Error('Widget must be loaded inside OperFi Broker Portal. Or append ?mock=1 to test locally.'));
    return new Promise(function (resolve, reject) {
      setTimeout(function () { waitForZoho(attempts - 1, delay).then(resolve, reject); }, delay);
    });
  }

  function init() {
    if (isLocalTest()) {
      var m = (location.search.match(/[?&]email=([^&]+)/) || [])[1] || 't.croteau01@gmail.com';
      state.email = decodeURIComponent(m);
      fetchAndRender();
      return;
    }
    waitForZoho(30, 100).then(function () {
      return ZOHO.CREATOR.UTIL.getInitParams();
    }).then(function (initParams) {
      var loginUser = initParams && (initParams.loginUser || initParams.login_user || initParams.email);
      state.email = loginUser || '';
      if (!state.email) throw new Error('No login email returned from Creator.');
      fetchAndRender();
    }).catch(showFatal);
  }

  function fetchAndRender() {
    if (isLocalTest()) {
      state.data = MOCK_DASHBOARD;
      render();
      return;
    }
    fetch(BROKER_API_BASE + '/dashboard/summary?email=' + encodeURIComponent(state.email))
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (d) { state.data = d; render(); })
      .catch(function (e) { document.getElementById('root').innerHTML = '<div class="error">Could not load dashboard: ' + escapeHtml(e.message) + '</div>'; });
  }

  function render() {
    var d = state.data;
    document.getElementById('root').innerHTML = '' +
      renderHeader(d) +
      renderQuickActions() +
      renderWatch(d.watch) +
      renderSnapshot(d.snapshot) +
      renderKeyTasks() +
      renderInsights(d.insights);

    document.getElementById('root').addEventListener('click', function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      handleAction(target.getAttribute('data-action'));
    });
  }

  var ACTION_TO_PAGE = {
    'submit-load': '#Page:New_Broker_Funding_Portal',
    'credit-check': '#Page:Credit_Check_New',
    'onboard-carrier': '#Page:Carrier_Onboarding_New',
    'request-reserve': '#Page:OperFi_Wallet_New',
    'view-chargeback': '#Page:AR_Aging_New',
    'view-credit-limits': '#Page:Customer_Approvals_New',
    'view-dso': '#Page:AR_Aging_New',
    'nav-vendor-payments': '#Page:Vendor_Payments_New',
    'nav-aging': '#Page:AR_Aging_New',
    'nav-customer-approvals': '#Page:Customer_Approvals_New',
    'nav-view-vendors': '#Page:View_Vendors_New',
    'nav-loads-margins': '#Page:Loads_Margins_New'
  };

  function handleAction(action) {
    var page = ACTION_TO_PAGE[action];
    if (!page) return;
    if (isLocalTest()) { alert('Test mode: would navigate to ' + page); return; }
    // Portal nav: top-level location change works for Creator-page targets
    try {
      if (parent && parent !== window) parent.location.hash = page;
      else location.hash = page;
    } catch (e) {
      location.hash = page;
    }
  }

  // ... section renderers added in subsequent tasks

  function renderWatch(w) {
    if (!w) return '';
    var dso = (w.dsoDays != null) ? w.dsoDays + ' days' : '—';
    return '' +
      '<div class="label">Watch</div>' +
      '<div class="watch">' +
        '<div class="watch-card red" data-action="view-chargeback">' +
          '<div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:600">Chargeback Risk</div>' +
          '<div style="margin-top:8px;font-size:18px;font-weight:700">$' + fmtMoney(w.chargebackRisk.amount) + '</div>' +
          '<div style="font-size:11px">in 75+ day balances · ' + w.chargebackRisk.invoiceCount + ' invoices</div>' +
        '</div>' +
        '<div class="watch-card amber" data-action="view-credit-limits">' +
          '<div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:600">Credit Limits</div>' +
          '<div style="margin-top:8px;font-size:18px;font-weight:700">' + w.creditLimits.customersAtRisk + ' customers</div>' +
          '<div style="font-size:11px">at &gt;80% of credit limit</div>' +
        '</div>' +
        '<div class="watch-card blue" data-action="view-dso">' +
          '<div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:600">Avg Days to Pay</div>' +
          '<div style="margin-top:8px;font-size:18px;font-weight:700">' + dso + '</div>' +
          '<div style="font-size:11px">trailing 90 days</div>' +
        '</div>' +
      '</div>';
  }
  function renderSnapshot(s) {
    if (!s) return '';
    return '' +
      '<div class="label">Snapshot</div>' +
      '<div class="kpi-strip">' +
        '<div class="kpi ar">' +
          '<div class="label" style="margin:0">Open AR</div>' +
          '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
            '<div><div style="font-size:20px;font-weight:700">' + fmtMoneyK(s.openAR.amount) + '</div><div style="font-size:10px;color:var(--of-muted)">outstanding</div></div>' +
            '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + s.openAR.count + '</div><div style="font-size:10px;color:var(--of-muted)">invoices</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="kpi ap">' +
          '<div class="label" style="margin:0">Open AP</div>' +
          '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
            '<div><div style="font-size:20px;font-weight:700">' + fmtMoneyK(s.openAP.amount) + '</div><div style="font-size:10px;color:var(--of-muted)">owed to carriers</div></div>' +
            '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + s.openAP.count + '</div><div style="font-size:10px;color:var(--of-muted)">invoices</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="kpi reserves">' +
          '<div class="label" style="margin:0">Reserves</div>' +
          '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
            '<div><div style="font-size:20px;font-weight:700">$' + fmtMoney(s.reserves.cash) + '</div><div style="font-size:10px;color:var(--of-muted)">cash</div></div>' +
            '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + fmtMoneyK(s.reserves.escrow) + '</div><div style="font-size:10px;color:var(--of-muted)">escrow</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="kpi month">' +
          '<div class="label" style="margin:0">This Month</div>' +
          '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
            '<div><div style="font-size:20px;font-weight:700">' + fmtMoneyK(s.thisMonth.purchases) + '</div><div style="font-size:10px;color:var(--of-muted)">' + s.thisMonth.loads + ' loads</div></div>' +
            '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + s.thisMonth.marginPct.toFixed(1) + '%</div><div style="font-size:10px;color:var(--of-muted)">margin</div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function renderKeyTasks() {
    var cards = [
      { name: 'Vendor Payments', desc: 'Open AP, payment history, vendor pay dates', action: 'nav-vendor-payments' },
      { name: 'AR Aging', desc: 'Customer balances by aging bucket', action: 'nav-aging' },
      { name: 'Customer Approvals', desc: 'Credit application status & limits', action: 'nav-customer-approvals' },
      { name: 'View Vendors', desc: 'Search carriers, view pay terms', action: 'nav-view-vendors' }
    ];
    return '' +
      '<div class="label">Key Tasks</div>' +
      '<div class="key-tasks">' +
        cards.map(function (c) {
          return '<div class="task-card" data-action="' + c.action + '">' +
            '<div style="font-weight:600;font-size:13px">' + escapeHtml(c.name) + '</div>' +
            '<div style="font-size:11px;color:var(--of-muted);margin-top:4px">' + escapeHtml(c.desc) + '</div>' +
            '<div style="font-size:11px;color:var(--of-blue);margin-top:8px">View &rarr;</div>' +
          '</div>';
        }).join('') +
      '</div>';
  }
  function renderInsights(i) {
    if (!i) return '';
    return '' +
      '<div class="label">Insights</div>' +
      '<div class="insights-row">' +
        renderAgingChart(i.agingBuckets) +
        renderConcentrationChart(i.concentration) +
      '</div>' +
      renderMonthlyChart(i.monthly);  // implemented in Task 15
  }

  function renderAgingChart(buckets) {
    var total = (buckets || []).reduce(function (s, b) { return s + b.amount; }, 0) || 1;
    var colors = { '0-30': '#3b82f6', '31-60': '#22c55e', '61-74': '#f59e0b', '75+': '#dc2626' };
    var segs = (buckets || []).map(function (b) {
      var pct = b.amount / total * 100;
      return '<div style="background:' + colors[b.label] + ';width:' + pct.toFixed(2) + '%" title="' + b.label + ' days"></div>';
    }).join('');
    var legend = (buckets || []).map(function (b) {
      var emphasis = b.label === '75+' ? ' style="color:#7f1d1d"' : '';
      return '<div' + emphasis + '>' +
        '<span style="display:inline-block;width:8px;height:8px;background:' + colors[b.label] + ';border-radius:2px;margin-right:4px"></span>' +
        (b.label === '75+' ? '<strong>75+ &#9888;</strong>' : b.label) + '<br><strong>' + fmtMoneyK(b.amount) + '</strong>' +
      '</div>';
    }).join('');
    return '' +
      '<div class="chart-card" data-action="nav-aging">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-weight:600;font-size:13px">AR Aging — chargeback line at 75 days</div><div style="font-size:11px;color:var(--of-blue)">View &rarr;</div></div>' +
        '<div style="display:flex;height:24px;border-radius:4px;overflow:hidden;margin-bottom:8px">' + segs + '</div>' +
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:11px">' + legend + '</div>' +
      '</div>';
  }

  function renderConcentrationChart(rows) {
    if (!rows || !rows.length) return '<div class="chart-card">No customer data.</div>';
    var max = Math.max.apply(null, rows.map(function (r) { return r.pct; }));
    var palette = ['#3b82f6', '#06b6d4', '#10b981', '#84cc16', '#cbd5e1'];
    var bars = rows.map(function (r, idx) {
      var color = palette[idx] || palette[palette.length - 1];
      var w = (r.pct / max) * 100;
      return '<div style="display:flex;align-items:center;margin-bottom:6px">' +
        '<div style="width:' + w.toFixed(1) + '%;height:10px;background:' + color + ';border-radius:2px;margin-right:8px;min-width:4px"></div>' +
        '<span style="font-size:12px">' + escapeHtml(r.customer) + ' · ' + r.pct.toFixed(1) + '% · ' + fmtMoneyK(r.amount) + '</span>' +
      '</div>';
    }).join('');
    return '' +
      '<div class="chart-card" data-action="nav-aging">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-weight:600;font-size:13px">Customer Concentration</div><div style="font-size:11px;color:var(--of-blue)">View &rarr;</div></div>' +
        bars +
      '</div>';
  }

  function renderMonthlyChart(months) {
    if (!months || !months.length) return '';
    var max = months.reduce(function (m, x) { return Math.max(m, x.purchases, x.collections); }, 1);
    var bars = months.map(function (x) {
      var ph = (x.purchases / max) * 100;
      var ch = (x.collections / max) * 100;
      return '<div style="flex:1;display:flex;gap:2px;align-items:flex-end">' +
        '<div style="background:#3b82f6;width:50%;height:' + ph.toFixed(0) + '%" title="' + x.month + ' purchases $' + fmtMoney(x.purchases) + '"></div>' +
        '<div style="background:#22c55e;width:50%;height:' + ch.toFixed(0) + '%" title="' + x.month + ' collections $' + fmtMoney(x.collections) + '"></div>' +
      '</div>';
    }).join('');
    var labels = months.map(function (x) {
      var mo = x.month.split('-')[1];
      var names = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return '<div style="flex:1">' + names[parseInt(mo, 10)] + '</div>';
    }).join('');
    return '' +
      '<div class="chart-card" data-action="nav-loads-margins">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:12px">' +
          '<div style="font-weight:600;font-size:13px">Monthly Purchases &amp; Collections &mdash; last 12 months</div>' +
          '<div style="font-size:11px"><span style="margin-right:10px"><span style="display:inline-block;width:8px;height:8px;background:#3b82f6;border-radius:2px;margin-right:4px"></span>Purchases</span><span><span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:2px;margin-right:4px"></span>Collections</span></div>' +
        '</div>' +
        '<div style="display:flex;align-items:flex-end;gap:6px;height:90px;padding:0 8px;border-bottom:1px solid var(--of-border)">' + bars + '</div>' +
        '<div style="display:flex;gap:6px;padding:6px 8px 0;font-size:9px;color:var(--of-muted);text-align:center">' + labels + '</div>' +
      '</div>';
  }

  function renderHeader(d) {
    var h = d.header || {};
    return '' +
      '<div class="header-strip">' +
        '<div>' +
          '<div class="eyebrow">Client</div>' +
          '<div class="name">' + escapeHtml(d.accountName || '') + '</div>' +
        '</div>' +
        '<div class="meta">' +
          (h.usdot ? 'USDOT ' + escapeHtml(h.usdot) + ' &nbsp;·&nbsp; ' : '') +
          (h.mc ? 'MC ' + escapeHtml(h.mc) + ' &nbsp;·&nbsp; ' : '') +
          '<span style="color:#22c55e">●</span> ' + escapeHtml(h.status || 'Active') +
        '</div>' +
      '</div>';
  }

  function renderQuickActions() {
    return '' +
      '<div class="label">Quick Actions</div>' +
      '<div class="quick-actions">' +
        '<div class="qa primary" data-action="submit-load">+ Submit Load</div>' +
        '<div class="qa secondary" data-action="credit-check">+ New Credit Check</div>' +
        '<div class="qa secondary" data-action="onboard-carrier">+ Onboard Carrier</div>' +
        '<div class="qa secondary" data-action="request-reserve">+ Request Reserve</div>' +
      '</div>';
  }

  function showFatal(e) {
    document.getElementById('root').innerHTML = '<div class="error">Widget unavailable: ' + escapeHtml(e && e.message || '') + '</div>';
  }

  var MOCK_DASHBOARD = {
    accountName: "Marek LLC (mock)",
    header: { usdot: "4149541", mc: "1592667", status: "Active" },
    watch: {
      chargebackRisk: { amount: 9100, invoiceCount: 4 },
      creditLimits: { customersAtRisk: 2 },
      dsoDays: 38
    },
    snapshot: {
      openAR: { amount: 427087, count: 268 },
      openAP: { amount: 297952, count: 272 },
      reserves: { cash: 839.51, escrow: 13456.83 },
      thisMonth: { purchases: 243972, loads: 14, marginPct: 24.6 }
    },
    insights: {
      agingBuckets: [
        { label: "0-30", amount: 333000, count: 220 },
        { label: "31-60", amount: 58000, count: 32 },
        { label: "61-74", amount: 27000, count: 12 },
        { label: "75+", amount: 9100, count: 4 }
      ],
      concentration: [
        { customer: "United Rentals", amount: 183000, pct: 42.9, count: 80 },
        { customer: "Millenia Productions", amount: 57000, pct: 13.3, count: 30 },
        { customer: "Sunbelt Rentals", amount: 45000, pct: 10.5, count: 25 },
        { customer: "Doka USA", amount: 26000, pct: 6.1, count: 12 },
        { customer: "+ 19 others", amount: 116087, pct: 27.2, count: 121 }
      ],
      monthly: [
        { month: "2025-06", purchases: 210000, collections: 230000 },
        { month: "2025-07", purchases: 240000, collections: 250000 },
        { month: "2025-08", purchases: 305000, collections: 220000 },
        { month: "2025-09", purchases: 340000, collections: 200000 },
        { month: "2025-10", purchases: 290000, collections: 235000 },
        { month: "2025-11", purchases: 265000, collections: 215000 },
        { month: "2025-12", purchases: 295000, collections: 250000 },
        { month: "2026-01", purchases: 275000, collections: 225000 },
        { month: "2026-02", purchases: 310000, collections: 240000 },
        { month: "2026-03", purchases: 355000, collections: 270000 },
        { month: "2026-04", purchases: 390000, collections: 255000 },
        { month: "2026-05", purchases: 244000, collections: 215000 }
      ]
    }
  };

  if (document.readyState === 'complete') init();
  else window.addEventListener('load', init);
})();
</script>
</body>
</html>
