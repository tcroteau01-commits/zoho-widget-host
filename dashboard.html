<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OperFi Dashboard</title>
<style>
  :root {
    --of-charcoal: #1d1d1f;
    --of-orange: #F97316; --of-orange-soft: #FEF3E8;
    --of-accent: #e8a020;
    --of-gray-50: #F8F9FB; --of-gray-100: #F1F2F4; --of-gray-200: #E5E7EB;
    --of-gray-300: #D1D5DB; --of-gray-500: #6B7280; --of-gray-700: #374151;
    --of-green: #059669; --of-green-soft: #ECFDF5;
    --of-amber: #D97706; --of-amber-soft: #FFFBEB;
    --of-red: #DC2626; --of-red-soft: #FEF2F2;
    --of-muted: var(--of-gray-500);
    --of-border: var(--of-gray-200);
  }
  html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; background: #f0efe9; color: var(--of-charcoal); margin: 0; min-height: 100vh; }
  .container { padding: 16px 20px; }
  .label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--of-gray-500); margin-bottom: 8px; }
  .header-strip { background: var(--of-charcoal); color: #fff; padding: 14px 20px; border-radius: 12px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
  .header-strip .eyebrow { opacity: .6; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
  .header-strip .name { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .header-strip .meta { text-align: right; font-size: 11px; opacity: .85; }
  .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .qa { padding: 14px 12px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 13px; cursor: pointer; transition: background 120ms; }
  .qa.primary { background: var(--of-accent); color: #fff; }
  .qa.primary:hover { background: #cf8d18; }
  .qa.secondary { background: #fff; border: 1px solid var(--of-gray-300); color: var(--of-gray-700); }
  .qa.secondary:hover { background: var(--of-gray-50); }
  .watch { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .watch-card { border-radius: 12px; padding: 14px; cursor: pointer; }
  .watch-card.red { background: var(--of-red-soft); border: 1px solid #fca5a5; color: #7f1d1d; }
  .watch-card.amber { background: var(--of-amber-soft); border: 1px solid #fcd34d; color: #78350f; }
  .watch-card.info { background: var(--of-gray-50); border: 1px solid var(--of-gray-200); color: var(--of-gray-700); }
  .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .kpi { background: #fff; border: 1px solid #e6e3da; border-radius: 12px; padding: 14px; }
  .key-tasks { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .task-card { background: #fff; border: 1px solid #e6e3da; border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 120ms; }
  .task-card:hover { border-color: var(--of-accent); }
  .insights-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .chart-card { background: #fff; border: 1px solid #e6e3da; border-radius: 12px; padding: 16px; cursor: pointer; }
  .empty, .loading, .error { padding: 24px; text-align: center; color: var(--of-gray-500); }
  .version-stamp { text-align: right; font-size: 10px; color: #b6b09a; padding: 8px 4px 0; }
  .donut-wrap { height: 200px; position: relative; }
  .donut-center { position: absolute; top: 42%; left: 0; right: 0; text-align: center; transform: translateY(-50%); pointer-events: none; }
  .donut-center .big { font-size: 18px; font-weight: 700; }
  .donut-center .lil { font-size: 10px; color: var(--of-muted); }
  .combo-wrap { height: 240px; position: relative; }

  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  .shimmer { background: linear-gradient(90deg, #ececec 25%, #f5f5f5 37%, #ececec 63%); background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px; color: transparent !important; }
  .sk-line { height: 14px; margin: 6px 0; }
  .sk-tile { min-height: 86px; }
  .sk-chart { height: 200px; }
  .reserves-loading { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--of-gray-300); border-top-color: var(--of-accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    html, body { overflow-x: hidden; }
    .container { padding: 12px; box-sizing: border-box; max-width: 100%; }
    .header-strip { flex-direction: column; align-items: flex-start; gap: 8px; }
    .header-strip .meta { text-align: left; }
    .quick-actions, .watch, .kpi-strip, .key-tasks { grid-template-columns: 1fr !important; }
    .insights-row { grid-template-columns: 1fr !important; }
    .qa { min-height: 44px; display: flex; align-items: center; justify-content: center; }
    .watch-card, .task-card, .chart-card { min-height: 44px; }
    button, .btn { min-height: 44px; }
    input, select, textarea { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container" id="root">
  <div class="loading">Loading dashboard...</div>
</div>
<div class="version-stamp">v2026-06-23.1</div>

<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script src="https://app.operfi.com/operfi-impersonate.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function () {
  var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
  var state = { email: null, data: null, reserves: undefined };
  var PALETTE = ['#e8a020', '#1976d2', '#388e3c', '#7b1fa2', '#0097a7', '#cfc9b8'];
  var AGING_COLORS = { '0-30': '#388e3c', '31-60': '#a3c293', '61-74': '#e8a020', '75+': '#c62828' };

  function isLocalTest() { return location.protocol === 'file:' || /[?&]mock=1/.test(location.search); }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]); }); }
  function fmtMoney(n) { var v = Number(n) || 0; return v.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
  function fmtMoneyK(n) { var v = Number(n) || 0; if (Math.abs(v) >= 1000) return '$' + (v / 1000).toFixed(1).replace(/\.0$/, '') + 'k'; return '$' + Math.round(v); }

  function waitForZoho(attempts, delay) {
    if (typeof ZOHO !== 'undefined' && ZOHO.CREATOR) return Promise.resolve();
    if (attempts <= 0) return Promise.reject(new Error('Widget must be loaded inside OperFi Broker Portal. Or append ?mock=1 to test locally.'));
    return new Promise(function (resolve, reject) {
      setTimeout(function () { waitForZoho(attempts - 1, delay).then(resolve, reject); }, delay);
    });
  }

  function dbg(msg, extra) { try { console.log('[Dashboard]', msg, extra || ''); } catch (e) {} }

  function init() {
    renderSkeleton();
    dbg('init() called. isLocalTest=' + isLocalTest() + ' url=' + location.href);
    if (isLocalTest()) {
      var m = (location.search.match(/[?&]email=([^&]+)/) || [])[1] || 't.croteau01@gmail.com';
      state.email = decodeURIComponent(m);
      fetchAndRender();
      return;
    }
    dbg('waiting for ZOHO.CREATOR global...');
    waitForZoho(30, 100).then(function () {
      dbg('ZOHO.CREATOR available. calling getInitParams()...');
      return ZOHO.CREATOR.UTIL.getInitParams();
    }).then(function (initParams) {
      dbg('getInitParams resolved with:', initParams);
      var loginUser = initParams && (initParams.loginUser || initParams.login_user || initParams.email);
      state.email = loginUser || '';
      if (!state.email) throw new Error('No login email returned from Creator.');
      dbg('email resolved:', state.email);
      fetchAndRender();
    }).catch(function (e) { dbg('init failed:', e && e.message); showFatal(e); });
  }

  function fillReserves(reserves) {
    var body = document.getElementById('reserves-body');
    if (!body) return;
    if (!reserves) { body.innerHTML = '<div style="font-size:12px;color:var(--of-muted)">Reserves unavailable</div>'; return; }
    body.innerHTML =
      '<div><div style="font-size:20px;font-weight:700">$' + fmtMoney(reserves.cash) + '</div><div style="font-size:10px;color:var(--of-muted)">cash</div></div>' +
      '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + fmtMoneyK(reserves.escrow) + '</div><div style="font-size:10px;color:var(--of-muted)">escrow</div></div>';
  }

  function fetchAndRender() {
    if (isLocalTest()) {
      state.data = MOCK_DASHBOARD;
      render();
      fillReserves(MOCK_DASHBOARD.snapshot.reserves);
      return;
    }
    var summaryUrl = BROKER_API_BASE + '/dashboard/summary?email=' + encodeURIComponent(state.email);
    var reservesUrl = BROKER_API_BASE + '/wallet-reserves?email=' + encodeURIComponent(state.email);

    fetch(summaryUrl)
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (d) { state.data = d; render(); })
      .catch(function (e) { dbg('summary failed:', e && e.message); document.getElementById('root').innerHTML = '<div class="error">Could not load dashboard: ' + escapeHtml(e.message) + '</div>'; });

    fetch(reservesUrl)
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (res) { state.reserves = res; fillReserves(res); })
      .catch(function (e) { dbg('reserves failed:', e && e.message); state.reserves = null; fillReserves(null); });
  }

  function skTile() { return '<div class="kpi sk-tile"><div class="shimmer sk-line" style="width:50%"></div><div class="shimmer sk-line" style="width:80%"></div></div>'; }
  function skChart() { return '<div class="chart-card"><div class="shimmer sk-line" style="width:40%"></div><div class="shimmer sk-chart"></div></div>'; }

  function renderSkeleton() {
    document.getElementById('root').innerHTML = '' +
      '<div class="header-strip"><div><div class="eyebrow">Client</div>' +
        '<div class="shimmer sk-line" style="width:180px;height:18px"></div></div>' +
        '<div class="shimmer sk-line" style="width:120px"></div></div>' +
      renderQuickActions() +
      '<div class="label">Watch</div><div class="watch">' + skTile() + skTile() + skTile() + '</div>' +
      '<div class="label">Snapshot</div><div class="kpi-strip">' + skTile() + skTile() + skTile() + skTile() + '</div>' +
      renderKeyTasks() +
      '<div class="label">Insights</div><div class="insights-row">' + skChart() + skChart() + '</div>';
  }

  function render() {
    var d = state.data;
    document.getElementById('root').innerHTML = '' +
      renderHeader(d) +
      renderQuickActions() +
      renderWatch(d.watch) +
      renderSnapshot(d.snapshot) +
      renderKeyTasks() +
      renderInsights(d.insights);

    mountCharts(d);

    document.getElementById('root').addEventListener('click', function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      handleAction(target.getAttribute('data-action'));
    });

    if (state.reserves !== undefined) fillReserves(state.reserves);
  }

  var ACTION_TO_PAGE = {
    'submit-load': '#Page:Load_Details',
    'credit-check': '#Page:Credit_Check',
    'onboard-carrier': '#Page:Carrier_Onboarding',
    'request-reserve': '#Page:OperFi_Wallet',
    'view-chargeback': '#Page:Aging',
    'view-credit-limits': '#Page:Customer_Approvals',
    'view-dso': '#Page:Aging',
    'nav-vendor-payments': '#Page:Vendor_Payments',
    'nav-aging': '#Page:Aging',
    'nav-customer-approvals': '#Page:Customer_Approvals',
    'nav-view-vendors': '#Page:View_Vendors',
    'nav-loads-margins': '#Page:Loads_Margins'
  };

  // Cross-origin portal navigation. Pattern from customer-approvals.html.
  // ZOHO.CREATOR.UTIL.navigateParentURL throws "Improper Configuration" in v2.0
  // widget SDK, so we set window.top.location directly with the full origin.
  function navigateParent(hash) {
    var sp = new URLSearchParams(window.location.search);
    var origin = sp.get('serviceOrigin') || 'https://brokerhub.operfi.com';
    var url = origin.replace(/\/$/, '') + '/' + hash;
    try { window.top.location.href = url; return; } catch (e) {}
    try { window.parent.location.href = url; return; } catch (e) {}
    try { window.open(url, '_top'); } catch (e) {}
  }

  function handleAction(action) {
    var page = ACTION_TO_PAGE[action];
    if (!page) return;
    if (isLocalTest()) { alert('Test mode: would navigate to ' + page); return; }
    navigateParent(page);
  }

  // ... section renderers added in subsequent tasks

  function renderWatch(w) {
    if (!w) return '';
    var dso = (w.dsoDays != null) ? w.dsoDays + ' days' : '—';
    return '' +
      '<div class="label">Watch</div>' +
      '<div class="watch">' +
        '<div class="watch-card red" data-action="view-chargeback">' +
          '<div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:600">Chargeback Risk</div>' +
          '<div style="margin-top:8px;font-size:18px;font-weight:700">$' + fmtMoney(w.chargebackRisk.amount) + '</div>' +
          '<div style="font-size:11px">in 75+ day balances · ' + w.chargebackRisk.invoiceCount + ' invoices</div>' +
        '</div>' +
        '<div class="watch-card amber" data-action="view-credit-limits">' +
          '<div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:600">Credit Limits</div>' +
          '<div style="margin-top:8px;font-size:18px;font-weight:700">' + w.creditLimits.customersAtRisk + ' customers</div>' +
          '<div style="font-size:11px">at &gt;80% of credit limit</div>' +
        '</div>' +
        '<div class="watch-card info" data-action="view-dso">' +
          '<div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:600">Avg Days to Pay</div>' +
          '<div style="margin-top:8px;font-size:18px;font-weight:700">' + dso + '</div>' +
          '<div style="font-size:11px">trailing 90 days</div>' +
        '</div>' +
      '</div>';
  }
  function renderSnapshot(s) {
    if (!s) return '';
    return '' +
      '<div class="label">Snapshot</div>' +
      '<div class="kpi-strip">' +
        '<div class="kpi ar">' +
          '<div class="label" style="margin:0">Open AR</div>' +
          '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
            '<div><div style="font-size:20px;font-weight:700">' + fmtMoneyK(s.openAR.amount) + '</div><div style="font-size:10px;color:var(--of-muted)">outstanding</div></div>' +
            '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + s.openAR.count + '</div><div style="font-size:10px;color:var(--of-muted)">invoices</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="kpi ap">' +
          '<div class="label" style="margin:0">Open AP</div>' +
          '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
            '<div><div style="font-size:20px;font-weight:700">' + fmtMoneyK(s.openAP.amount) + '</div><div style="font-size:10px;color:var(--of-muted)">owed to carriers</div></div>' +
            '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + s.openAP.count + '</div><div style="font-size:10px;color:var(--of-muted)">invoices</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="kpi reserves" id="kpi-reserves">' +
          '<div class="label" style="margin:0">Reserves</div>' +
          '<div id="reserves-body" style="display:flex;justify-content:space-between;margin-top:6px;align-items:center">' +
            (s.reserves
              ? ('<div><div style="font-size:20px;font-weight:700">$' + fmtMoney(s.reserves.cash) + '</div><div style="font-size:10px;color:var(--of-muted)">cash</div></div>' +
                 '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + fmtMoneyK(s.reserves.escrow) + '</div><div style="font-size:10px;color:var(--of-muted)">escrow</div></div>')
              : '<span class="reserves-loading"></span>') +
          '</div>' +
        '</div>' +
        '<div class="kpi month">' +
          '<div class="label" style="margin:0">This Month</div>' +
          '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
            '<div><div style="font-size:20px;font-weight:700">' + fmtMoneyK(s.thisMonth.purchases) + '</div><div style="font-size:10px;color:var(--of-muted)">' + s.thisMonth.loads + ' loads</div></div>' +
            '<div style="text-align:right"><div style="font-size:16px;font-weight:600">' + s.thisMonth.marginPct.toFixed(1) + '%</div><div style="font-size:10px;color:var(--of-muted)">margin</div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function renderKeyTasks() {
    var cards = [
      { name: 'Vendor Payments', desc: 'Open AP, payment history, vendor pay dates', action: 'nav-vendor-payments' },
      { name: 'AR Aging', desc: 'Customer balances by aging bucket', action: 'nav-aging' },
      { name: 'Customer Approvals', desc: 'Credit application status & limits', action: 'nav-customer-approvals' },
      { name: 'View Vendors', desc: 'Search carriers, view pay terms', action: 'nav-view-vendors' }
    ];
    return '' +
      '<div class="label">Key Tasks</div>' +
      '<div class="key-tasks">' +
        cards.map(function (c) {
          return '<div class="task-card" data-action="' + c.action + '">' +
            '<div style="font-weight:600;font-size:13px">' + escapeHtml(c.name) + '</div>' +
            '<div style="font-size:11px;color:var(--of-muted);margin-top:4px">' + escapeHtml(c.desc) + '</div>' +
            '<div style="font-size:11px;color:var(--of-accent);margin-top:8px">View &rarr;</div>' +
          '</div>';
        }).join('') +
      '</div>';
  }
  function renderInsights(i) {
    if (!i) return '';
    return '' +
      '<div class="label">Insights</div>' +
      '<div class="insights-row">' +
        renderAgingChart(i.agingBuckets) +
        renderConcentrationChart(i.concentration) +
      '</div>' +
      renderMonthlyChart(i.monthly);  // implemented in Task 15
  }

  function renderAgingChart(buckets) {
    var b75 = (buckets || []).find(function (x) { return x.label === '75+'; }) || { amount: 0 };
    return '' +
      '<div class="chart-card" data-action="nav-aging">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-weight:600;font-size:13px">AR Aging</div><div style="font-size:11px;color:var(--of-accent)">View &rarr;</div></div>' +
        '<div class="donut-wrap"><canvas id="chart-aging"></canvas>' +
          '<div class="donut-center"><div class="big" style="color:#2e7d32">$' + fmtMoney(b75.amount) + '</div><div class="lil">75+ days ' + (b75.amount > 0 ? '&#9888;' : '') + '</div></div>' +
        '</div>' +
      '</div>';
  }

  function renderConcentrationChart(rows) {
    if (!rows || !rows.length) return '<div class="chart-card">No customer data.</div>';
    var total = rows.reduce(function (s, r) { return s + (r.amount || 0); }, 0);
    return '' +
      '<div class="chart-card" data-action="nav-aging">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-weight:600;font-size:13px">Customer Concentration</div><div style="font-size:11px;color:var(--of-accent)">View &rarr;</div></div>' +
        '<div class="donut-wrap"><canvas id="chart-concentration"></canvas>' +
          '<div class="donut-center"><div class="big">' + fmtMoneyK(total) + '</div><div class="lil">total AR</div></div>' +
        '</div>' +
      '</div>';
  }

  function mountComboChart(months) {
    if (typeof Chart === 'undefined' || !months || !months.length) return;
    var el = document.getElementById('chart-combo');
    if (!el) return;
    var names = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    var labels = months.map(function (x) { return names[parseInt(x.month.split('-')[1], 10)]; });
    new Chart(el, {
      data: { labels: labels, datasets: [
        { type: 'bar', label: 'Purchases', data: months.map(function (x) { return x.purchases; }),
          backgroundColor: '#cbd5e1', yAxisID: 'y', order: 2, borderRadius: 3, maxBarThickness: 38 },
        { type: 'line', label: 'Margin %', data: months.map(function (x) { return x.marginPct || 0; }),
          borderColor: '#e8a020', backgroundColor: '#e8a020', yAxisID: 'y1', tension: 0.3, pointRadius: 2, borderWidth: 2, order: 1 }
      ] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { position: 'left', grid: { color: '#f3f1ea' }, ticks: { font: { size: 9 }, color: '#888', callback: function (v) { return '$' + (v / 1000) + 'k'; } } },
          y1: { position: 'right', grid: { drawOnChartArea: false }, min: 0, suggestedMax: 35, ticks: { font: { size: 9 }, color: '#e8a020', callback: function (v) { return v + '%'; } } },
          x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#888' } }
        } }
    });
  }

  function mountCharts(d) {
    if (typeof Chart === 'undefined') return;
    var i = d.insights || {};
    var ab = i.agingBuckets || [];
    if (document.getElementById('chart-aging')) {
      new Chart(document.getElementById('chart-aging'), {
        type: 'doughnut',
        data: { labels: ab.map(function (b) { return b.label; }),
          datasets: [{ data: ab.map(function (b) { return b.amount; }),
            backgroundColor: ab.map(function (b) { return AGING_COLORS[b.label] || '#cfc9b8'; }),
            borderWidth: 2, borderColor: '#fff' }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '66%',
          plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 9, padding: 8 } } } }
      });
    }
    var conc = i.concentration || [];
    if (document.getElementById('chart-concentration')) {
      new Chart(document.getElementById('chart-concentration'), {
        type: 'doughnut',
        data: { labels: conc.map(function (c) { return c.customer; }),
