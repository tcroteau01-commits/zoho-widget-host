<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft Loads</title>
<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script src="https://tcroteau01-commits.github.io/zoho-widget-host/operfi-impersonate.js?v=2"></script>
<style>
:root{
  --ink:#272727;--amber:#e8a020;--amber-dk:#c9871a;--body:#f0efe9;--card:#fff;
  --line:#e3e0d6;--muted:#7a766c;--green:#1f8f4e;--amber-soft:#fbf0d8;--red:#c0392b;--blue:#2c6fb5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--body);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.4}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.crumb{color:var(--muted);font-size:12px;margin-bottom:14px}
.head{display:flex;align-items:center;justify-content:space-between;gap:16px}
.head h1{font-size:21px;margin:0;color:var(--ink)}
.head .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px;font-size:13px;
  font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;color:var(--ink);font-family:inherit}
.btn:hover{border-color:#cfc9bb}
.btn.amber{background:var(--amber);border-color:var(--amber);color:#3a2a05}
.btn.dark{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.sm{padding:6px 11px;font-size:12px}
.btn[disabled]{opacity:.5;cursor:default}

/* Smart resolve bar */
.smart{background:linear-gradient(180deg,#fff8ea,#fdf0d6);border:1px solid #ecd49a;border-radius:12px;
  padding:14px 18px;margin:16px 0 14px;display:flex;align-items:center;gap:16px}
.smart.hidden{display:none}
.smart .ic{width:36px;height:36px;border-radius:9px;background:var(--amber);color:#3a2a05;
  display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;flex-shrink:0}
.smart .txt{flex:1}
.smart .txt b{font-size:14.5px}
.smart .txt .d{font-size:12.5px;color:#7a5e1e;margin-top:2px}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.filters{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:4px}
.chip{border:0;background:transparent;padding:6px 13px;border-radius:7px;font-size:12.5px;color:var(--ink);cursor:pointer;font-weight:600;font-family:inherit}
.chip.on{background:var(--ink);color:#fff}
.chip .ct{opacity:.6;font-weight:500;margin-left:4px}
.tmpl{font-size:12px;color:var(--blue);text-decoration:none;font-weight:600;cursor:pointer}
.spacer{flex:1}
.search{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;font-size:13px;min-width:170px;font-family:inherit}

/* Bulk-select bar */
.bulkbar{background:var(--ink);color:#fff;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bulkbar.hidden{display:none}
.bulkbar .cnt{font-weight:700}
.bulkbar .btn{background:#3a3a3a;border-color:#4a4a4a;color:#fff}
.bulkbar .btn:hover{background:#454545}
.bulkbar .x{margin-left:auto;cursor:pointer;opacity:.6}

/* Table */
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:visible}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
  padding:11px 14px;border-bottom:1px solid var(--line);background:#faf9f5;font-weight:700}
tbody td{padding:11px 14px;border-bottom:1px solid #f0eee6;vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
tbody tr:hover{background:#fcfbf7}
tbody tr.sel{background:#fff7e8}
.co{font-weight:600}
.small{font-size:11.5px;color:var(--muted);margin-top:2px}
.mono{font-variant-numeric:tabular-nums}
.rt{font-weight:600;font-variant-numeric:tabular-nums}
.marg{font-weight:700;color:var(--green);font-variant-numeric:tabular-nums}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--amber-dk);cursor:pointer}
.src{display:inline-flex;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.src.tms{background:#e8eff7;color:#2c6fb5}.src.csv{background:#eaf6ee;color:#1f8f4e}.src.manual{background:#f1eef9;color:#6a4bb5}
.stat{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap}
.stat.ready{background:#e7f5ec;color:var(--green)}.stat.attn{background:var(--amber-soft);color:var(--amber-dk)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.docs{font-size:12px;color:var(--muted)}.docs.ok{color:var(--green);font-weight:600}
.raw-mini{font-size:11px;color:#9a7a2e;font-style:italic}
.celledit{display:flex;flex-direction:column;gap:5px}
select.cell{border:1px solid var(--amber);background:#fffdf7;border-radius:7px;padding:6px 8px;font-size:12.5px;font-weight:600;color:var(--ink);width:100%;max-width:230px;font-family:inherit}
.applyall{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--amber-dk);font-weight:600;cursor:pointer}
.applyall input{width:13px;height:13px}
.editable{cursor:pointer;border-bottom:1px dashed transparent;display:inline-block}
tr:hover .editable{border-bottom-color:#cfc9bb}
.rowsubmit{font-size:11.5px;color:var(--green);font-weight:700;cursor:pointer;background:none;border:0;font-family:inherit;margin-left:8px}
.empty{text-align:center;color:var(--muted);padding:40px 0}

/* Modal: grouped resolve */
.scrim{position:fixed;inset:0;background:rgba(20,18,14,.4);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:9999}
.scrim.hidden{display:none}
.modal{background:var(--body);width:620px;max-width:94vw;border-radius:14px;border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.28);overflow:hidden}
.modal-head{background:var(--ink);color:#fff;padding:16px 22px}
.modal-head .x{float:right;cursor:pointer;opacity:.7}
.modal-head h2{margin:0;font-size:16px}
.modal-head .ms{font-size:12px;opacity:.72;margin-top:3px}
.modal-body{padding:8px 22px 4px;max-height:54vh;overflow-y:auto}
.grp{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:12px 0}
.grp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.grp-raw{font-size:13.5px}
.grp-raw b{font-weight:700}
.grp-raw .sentby{font-size:11px;color:var(--muted);display:block;margin-top:2px}
.grp-count{font-size:11.5px;font-weight:700;color:var(--amber-dk);background:var(--amber-soft);padding:4px 10px;border-radius:20px;white-space:nowrap}
.grp-resolve{display:flex;align-items:center;gap:9px}
select.gsel{flex:1;border:1px solid var(--amber);background:#fffdf7;border-radius:8px;padding:9px 11px;font-size:13px;font-weight:600;color:var(--ink);font-family:inherit}
select.gsel.done{border-color:#bfe3cc;background:#f1faf4}
.grp.done{opacity:.75}
.remember{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);margin-top:8px}
.remember input{width:14px;height:14px}
.remember b{color:var(--ink)}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--body)}
.modal-foot .left{flex:1;font-size:12.5px;color:var(--muted)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2a44;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:10000;box-shadow:0 8px 24px rgba(16,24,40,.3)}
#toast.hidden{display:none}

@media (max-width:640px){
  body{overflow-x:hidden}
  .wrap{padding:14px 12px 40px}
  .head{flex-direction:column;align-items:stretch;gap:12px}
  .toolbar{flex-direction:column;align-items:stretch}
  .search{min-width:0;width:100%}
  thead{display:none}
  table,tbody,tr,td{display:block;width:100%}
  tbody tr{padding:8px 14px}
  tbody td{display:flex;justify-content:space-between;gap:12px;text-align:right;padding:5px 0}
  tbody td[data-label]::before{content:attr(data-label);font-weight:700;color:var(--muted);text-align:left;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
  .btn,.chip{min-height:44px}
  input,select,textarea,.search{font-size:16px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="crumb">Broker Portal &nbsp;›&nbsp; Loads &nbsp;›&nbsp; <b style="color:var(--ink)">Draft Loads</b></div>
  <div class="head">
    <div><h1>Draft Loads</h1><div class="sub" id="sub">Loading…</div></div>
    <div style="display:flex;gap:9px">
      <button class="btn" id="import-csv">⬍ Import CSV</button>
      <button class="btn amber" id="new-draft">＋ New Draft</button>
    </div>
  </div>

  <div class="smart hidden" id="smart">
    <div class="ic">!</div>
    <div class="txt"><b id="smart-title"></b><div class="d" id="smart-desc"></div></div>
    <button class="btn dark" id="resolve-cust">Resolve customers</button>
    <button class="btn" id="resolve-carr">Resolve carriers</button>
  </div>

  <div class="toolbar">
    <div class="filters" id="filters">
      <button class="chip on" data-filter="all">All <span class="ct" id="ct-all">0</span></button>
      <button class="chip" data-filter="attention">Needs attention <span class="ct" id="ct-attn">0</span></button>
      <button class="chip" data-filter="ready">Ready <span class="ct" id="ct-ready">0</span></button>
    </div>
    <a class="tmpl" id="tmpl">⬇ Template</a>
    <div class="spacer"></div>
    <input class="search" id="search" placeholder="Search…">
    <button class="btn dark" id="submit-all">Submit all Ready (0)</button>
  </div>

  <div class="bulkbar hidden" id="bulkbar">
    <span class="cnt" id="bulk-count">0 selected</span>
    <button class="btn sm" id="bulk-cust">Set customer ▾</button>
    <button class="btn sm" id="bulk-carr">Set carrier ▾</button>
    <button class="btn sm" id="bulk-docs">Attach docs</button>
    <button class="btn sm" id="bulk-del">Delete</button>
    <span class="x" id="bulk-clear">✕ clear</span>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr>
          <th style="width:34px"><input type="checkbox" id="cb-all"></th>
          <th style="width:70px">Source</th>
          <th>Customer</th>
          <th>Carrier</th>
          <th style="width:88px">Cust. Rate</th>
          <th style="width:88px">Carr. Rate</th>
          <th style="width:74px">Margin</th>
          <th style="width:56px">Docs</th>
          <th style="width:170px">Status</th>
        </tr>
      </thead>
      <tbody id="queue-body"><tr><td colspan="9" class="empty">Loading drafts…</td></tr></tbody>
    </table>
  </div>
</div>

<div class="scrim hidden" id="scrim"><div class="modal" id="modal"></div></div>
<div id="toast" class="hidden"></div>

<script>
var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
var brokerEmail = '';
var __state = {
  drafts: [],
  filter: 'all',
  search: '',
  selected: [],
  customers: [],
  carriers: [],
  candidatesByRaw: {},
  lastSkipped: []
};
window.__state = __state;

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function money(n){ var v = Number(n)||0; return (v<0?'-$':'$') + Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0}); }
function setText(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }

function showToast(msg){
  var t=document.getElementById('toast'); if(!t) return;
  t.textContent=msg; t.classList.remove('hidden');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(function(){ t.classList.add('hidden'); },3000);
}

/* ---------------- queue render ---------------- */

function marginOf(d){ return (Number(d.customer_rate)||0) - (Number(d.carrier_rate)||0); }

function visibleDrafts(){
  var f=__state.filter, s=(__state.search||'').toLowerCase();
  return __state.drafts.filter(function(d){
    if (f==='ready' && d.status!=='ready') return false;
    if (f==='attention' && d.status!=='attention') return false;
    if (s){
      var hay=((d.customer_name||'')+' '+(d.customer_raw||'')+' '+(d.carrier_name||'')+' '+(d.carrier_raw||'')+' '+(d.customer_reference_number||'')).toLowerCase();
      if (hay.indexOf(s)===-1) return false;
    }
    return true;
  });
}

function customerCellHtml(d){
  if (d.customer_name){
    return '<div class="co editable" data-edit="customer">'+esc(d.customer_name)+'</div>'+
           (d.customer_reference_number?'<div class="small mono">Ref '+esc(d.customer_reference_number)+'</div>':'');
  }
  return '<div class="editable" data-edit="customer">'+
         '<div class="raw-mini">sent: “'+esc(d.customer_raw||'—')+'”</div>'+
         '<div class="co" style="color:var(--amber-dk)">Pick customer ▾</div></div>';
}
function carrierCellHtml(d){
  if (d.carrier_name){
    var line = d.carrier_mc ? 'MC '+esc(d.carrier_mc)+' ✓' : (d.carrier_dot ? 'DOT '+esc(d.carrier_dot)+' ✓' : '');
    return '<div class="co editable" data-edit="carrier">'+esc(d.carrier_name)+'</div>'+
           (line?'<div class="small mono">'+line+'</div>':'');
  }
  return '<div class="editable" data-edit="carrier">'+
         '<div class="raw-mini">sent: '+esc(d.carrier_raw||'—')+'</div>'+
         '<div class="co" style="color:var(--amber-dk)">Pick carrier ▾</div></div>';
}

function statusCellHtml(d){
  if (d.status==='ready') return '<span class="stat ready"><span class="dot"></span>Ready</span>'+
    '<button class="rowsubmit" data-submit="'+esc(d.id)+'">Submit ▸</button>';
  return '<span class="stat attn"><span class="dot"></span>'+esc(reasonLabel(d.reasons))+'</span>';
}
function reasonLabel(reasons){
  reasons = reasons||[];
  if (reasons.indexOf('customer')!==-1) return 'Customer';
  if (reasons.indexOf('carrier')!==-1) return 'Carrier';
  if (reasons.indexOf('customer_docs')!==-1 || reasons.indexOf('carrier_docs')!==-1) return 'Docs needed';
  return 'Needs info';
}

function renderQueue(drafts){
  if (drafts) __state.drafts = drafts;
  var rows = visibleDrafts();
  var body=document.getElementById('queue-body');
  if(!body) return;
  if(!rows.length){ body.innerHTML='<tr><td colspan="9" class="empty">No drafts.</td></tr>'; return; }
  body.innerHTML='';
  rows.forEach(function(d){
    var tr=document.createElement('tr');
    if (__state.selected.indexOf(d.id)!==-1) tr.className='sel';
    var docCount=(d.has_customer_docs?1:0)+(d.has_carrier_docs?1:0);
    var docCls='docs'+(docCount===2?' ok':'');
    tr.innerHTML=
      '<td data-label=""><input type="checkbox" class="rowcb" data-id="'+esc(d.id)+'"'+(__state.selected.indexOf(d.id)!==-1?' checked':'')+'></td>'+
      '<td data-label="Source"><span class="src '+srcClass(d.source)+'">'+esc(d.source||'')+'</span></td>'+
      '<td data-label="Customer">'+customerCellHtml(d)+'</td>'+
      '<td data-label="Carrier">'+carrierCellHtml(d)+'</td>'+
      '<td data-label="Cust. Rate" class="rt">'+money(d.customer_rate)+'</td>'+
      '<td data-label="Carr. Rate" class="rt">'+money(d.carrier_rate)+'</td>'+
      '<td data-label="Margin" class="marg">'+money(marginOf(d))+'</td>'+
      '<td data-label="Docs"><span class="'+docCls+'">'+docCount+(docCount===2?' ✓':'')+'</span></td>'+
      '<td data-label="Status">'+statusCellHtml(d)+'</td>';
    tr.setAttribute('data-row', d.id);
    wireRow(tr, d);
    body.appendChild(tr);
  });
}
function srcClass(s){ return String(s||'').toLowerCase().replace(/[^a-z]/g,''); }

function wireRow(tr, d){
  var cb=tr.querySelector('input.rowcb');
  if (cb) cb.addEventListener('change', function(){ toggleSelect(d.id, cb.checked); });
  tr.querySelectorAll('[data-edit]').forEach(function(cell){
    cell.addEventListener('click', function(e){
      e.stopPropagation();
      openInlineEdit(tr, d, cell.getAttribute('data-edit'));
    });
  });
  var sb=tr.querySelector('[data-submit]');
  if (sb) sb.addEventListener('click', function(e){ e.stopPropagation(); submitOne(d.id); });
}

/* ---------------- inline cell edit ---------------- */

function matchingUnresolved(sameRaw, kind){
  return __state.drafts.filter(function(x){
    var raw = kind==='customer' ? (x.customer_raw||'') : (x.carrier_raw||'');
    var named = kind==='customer' ? x.customer_name : x.carrier_name;
    return raw===sameRaw && !named;
  });
}

function openInlineEdit(tr, d, kind){
  var anchor=tr.querySelector('[data-edit="'+kind+'"]');
  var cell = anchor && anchor.closest('td');
  if (!cell || cell.querySelector('select.cell')) return;
  var sameRaw = kind==='customer' ? (d.customer_raw||'') : (d.carrier_raw||'');
  var matchCount = sameRaw ? matchingUnresolved(sameRaw, kind).length : 1;
  var wrap=document.createElement('div'); wrap.className='celledit';
  var rawTxt = kind==='customer' ? d.customer_raw : d.carrier_raw;
  if (rawTxt){ var r=document.createElement('div'); r.className='raw-mini'; r.textContent='sent: “'+rawTxt+'”'; wrap.appendChild(r); }
  var sel=document.createElement('select'); sel.className='cell';
  sel.innerHTML = kind==='customer' ? customerOptions('', []) : carrierOptions('');
  wrap.appendChild(sel);
  var applyAll=null;
  if (matchCount>1){
    var lbl=document.createElement('label'); lbl.className='applyall';
    lbl.innerHTML='<input type="checkbox" checked> Apply to all '+matchCount+' with this name';
    applyAll=lbl.querySelector('input'); wrap.appendChild(lbl);
  }
  cell.innerHTML=''; cell.appendChild(wrap);
  if (kind==='customer' && rawTxt){
    resolveCustomerCandidates(rawTxt, d.source).then(function(cands){ sel.innerHTML=customerOptions('', cands); });
  }
  if (sel.focus) sel.focus();
  sel.addEventListener('change', function(){
    var val=sel.value; if(!val) return;
    var ids=[d.id];
    if (applyAll && applyAll.checked && sameRaw){
      ids=matchingUnresolved(sameRaw, kind).map(function(x){return x.id;});
    }
    var patchKey = kind==='customer'?'customer_id':'carrier_id';
    Promise.all(ids.map(function(id){ var p={}; p[patchKey]=val; return patchDraft(id,p); }))
      .then(function(){ return loadQueue(); })
      .then(function(){ showToast('Updated'); });
  });
}

/* ---------------- bulk select ---------------- */

function toggleSelect(id, on){
  var i=__state.selected.indexOf(id);
  if (on && i===-1) __state.selected.push(id);
  if (!on && i!==-1) __state.selected.splice(i,1);
  renderBulkBar();
  var tr=document.querySelector('[data-row="'+id+'"]');
  if (tr) tr.classList.toggle('sel', on);
}
function clearSelection(){
  __state.selected=[];
  document.querySelectorAll('#queue-body input.rowcb').forEach(function(c){ c.checked=false; });
  document.querySelectorAll('#queue-body tr.sel').forEach(function(t){ t.classList.remove('sel'); });
  renderBulkBar();
}
function renderBulkBar(){
  var bar=document.getElementById('bulkbar'); if(!bar) return;
  var n=__state.selected.length;
  if (!n){ bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  setText('bulk-count', n+' selected');
}
function bulkSetCustomer(customerId){
  return Promise.all(__state.selected.map(function(id){ return patchDraft(id, { customer_id: customerId }); }))
    .then(function(){ clearSelection(); return loadQueue(); });
}
function bulkSetCarrier(carrierId){
  return Promise.all(__state.selected.map(function(id){ return patchDraft(id, { carrier_id: carrierId }); }))
    .then(function(){ clearSelection(); return loadQueue(); });
}

function promptPick(kind){
  var scrim=document.getElementById('scrim'), modal=document.getElementById('modal');
  if(!scrim||!modal||!__state.selected.length) return;
  var title = kind==='customer'?'Set customer for '+__state.selected.length+' loads':'Set carrier for '+__state.selected.length+' loads';
  modal.innerHTML=
    '<div class="modal-head"><span class="x" id="modal-x">✕</span><h2>'+esc(title)+'</h2></div>'+
    '<div class="modal-body"><div class="grp"><div class="grp-resolve"><select class="gsel" id="bulk-sel">'+
    (kind==='customer'?customerOptions('',[]):carrierOptions(''))+'</select></div></div></div>'+
    '<div class="modal-foot"><div class="left"></div><button class="btn" id="modal-cancel">Cancel</button>'+
    '<button class="btn amber" id="modal-apply">Apply</button></div>';
  scrim.classList.remove('hidden');
  modal.querySelector('#modal-x').addEventListener('click', closeModal);
  modal.querySelector('#modal-cancel').addEventListener('click', closeModal);
  modal.querySelector('#modal-apply').addEventListener('click', function(){
    var val=modal.querySelector('#bulk-sel').value; if(!val){ closeModal(); return; }
    (kind==='customer'?bulkSetCustomer(val):bulkSetCarrier(val)).then(function(){ closeModal(); showToast('Updated'); });
  });
}

function renderSummary(summary){
  summary=summary||{};
  setText('ct-all', summary.total!=null?summary.total:__state.drafts.length);
  setText('ct-ready', summary.ready!=null?summary.ready:__state.drafts.filter(function(d){return d.status==='ready';}).length);
  setText('ct-attn', summary.attention!=null?summary.attention:__state.drafts.filter(function(d){return d.status==='attention';}).length);
  var ready = summary.ready!=null?summary.ready:__state.drafts.filter(function(d){return d.status==='ready';}).length;
  setText('submit-all', 'Submit all Ready ('+ready+')');
  var sb=document.getElementById('submit-all'); if(sb) sb.disabled = !ready;
  renderSmartBar();
}

function renderSmartBar(){
  var smart=document.getElementById('smart'); if(!smart) return;
  var attn=__state.drafts.filter(function(d){return d.status==='attention';});
  var custGroups=computeGroups(attn,'customer');
  var carrGroups=computeGroups(attn,'carrier');
  var fixes=custGroups.length+carrGroups.length;
  if (!attn.length || !fixes){ smart.classList.add('hidden'); return; }
  smart.classList.remove('hidden');
  setText('smart-title', attn.length+' load'+(attn.length===1?'':'s')+' need attention — but only '+fixes+' thing'+(fixes===1?'':'s')+' to fix');
  setText('smart-desc', custGroups.length+' unmatched customer'+(custGroups.length===1?'':'s')+' and '+carrGroups.length+' unmatched carrier'+(carrGroups.length===1?'':'s')+' cover all '+attn.length+'. Resolve each once and they all clear.');
  var rc=document.getElementById('resolve-cust'), rr=document.getElementById('resolve-carr');
  if (rc){ rc.textContent='Resolve customers ('+custGroups.length+')'; rc.style.display=custGroups.length?'':'none'; }
  if (rr){ rr.textContent='Resolve carriers ('+carrGroups.length+')'; rr.style.display=carrGroups.length?'':'none'; }
}

function setFilter(f){
  __state.filter=f;
  document.querySelectorAll('#filters .chip').forEach(function(c){
    c.classList.toggle('on', c.getAttribute('data-filter')===f);
  });
  renderQueue();
}

/* ---------------- grouped resolve ---------------- */

function rawKeyFor(d, kind){
  if (kind==='customer') return d.customer_raw || ('(no name · load '+d.id+')');
  return d.carrier_raw || ('(no carrier · load '+d.id+')');
}

function computeGroups(drafts, kind){
  drafts = drafts || __state.drafts.filter(function(d){return d.status==='attention';});
  var map={};
  drafts.forEach(function(d){
    var miss = kind==='customer' ? (!d.customer_name && (d.reasons||[]).indexOf('customer')!==-1)
                                 : (!d.carrier_name && (d.reasons||[]).indexOf('carrier')!==-1);
    if (!miss) return;
    var raw=rawKeyFor(d,kind);
    if (!map[raw]) map[raw]={ raw:raw, count:0, ids:[], source:d.source };
    map[raw].count++;
    map[raw].ids.push(d.id);
  });
  return Object.keys(map).map(function(k){ return map[k]; });
}

function patchDraft(id, patch){
  var body=Object.assign({ email: brokerEmail }, patch);
  return fetch(BROKER_API_BASE+'/draft-loads/'+id, {
    method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  }).then(function(r){ return r.json(); });
}

function applyGroup(raw, value, ids, remember, kind){
  kind = kind||'customer';
  var patchKey = kind==='customer' ? 'customer_id' : 'carrier_id';
  var patches = ids.map(function(id){ var p={}; p[patchKey]=value; return patchDraft(id, p); });
  return Promise.all(patches).then(function(){
    if (remember && kind==='customer'){
      var g=computeGroups(undefined,'customer').find(function(x){return x.raw===raw;});
      return fetch(BROKER_API_BASE+'/draft-loads/alias', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ email:brokerEmail, source:(g&&g.source)||'', raw_name:raw, customer_id:value })
      }).then(function(r){ return r.json(); });
    }
  }).then(function(){ return loadQueue(); });
}

function customerOptions(selectedId, candidates){
  var opts='', seen={};
  (candidates||[]).forEach(function(c){
    seen[c.customer_id]=true;
    opts+='<option value="'+esc(c.customer_id)+'"'+(c.customer_id===selectedId?' selected':'')+'>'+esc(c.name||c.customer_name)+(c.score!=null?' — '+Math.round(c.score*100)+'% match':'')+'</option>';
  });
  __state.customers.forEach(function(c){
    if (seen[c.customer_id]) return;
    opts+='<option value="'+esc(c.customer_id)+'"'+(c.customer_id===selectedId?' selected':'')+'>'+esc(c.customer_name)+'</option>';
  });
  return '<option value="">— pick a customer —</option>'+opts;
}
function carrierOptions(selectedId){
  var opts='<option value="">— pick a carrier —</option>';
  __state.carriers.forEach(function(c){
    opts+='<option value="'+esc(c.vendor_id)+'"'+(c.vendor_id===selectedId?' selected':'')+'>'+esc(c.carrier_name)+(c.mc?' (MC '+esc(c.mc)+')':'')+(c.dnu?' · DNU':'')+'</option>';
  });
  return opts;
}

function resolveCustomerCandidates(raw, source){
  if (__state.candidatesByRaw[raw]) return Promise.resolve(__state.candidatesByRaw[raw]);
  return fetch(BROKER_API_BASE+'/draft-loads/resolve-customer', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ email:brokerEmail, raw_name:raw, source:source||'' })
  }).then(function(r){ return r.json(); }).then(function(res){
    var cands=(res&&res.candidates)||[];
    __state.candidatesByRaw[raw]=cands;
    return cands;
  }).catch(function(){ return []; });
}

function openResolveModal(kind){
  var groups=computeGroups(undefined, kind);
  var scrim=document.getElementById('scrim'), modal=document.getElementById('modal');
  if(!scrim||!modal) return;
  var totalLoads=groups.reduce(function(a,g){return a+g.count;},0);
  var title = kind==='customer'?'Resolve customers':'Resolve carriers';
  modal.innerHTML=
    '<div class="modal-head"><span class="x" id="modal-x">✕</span><h2>'+title+'</h2>'+
    '<div class="ms">'+groups.length+' unmatched name'+(groups.length===1?'':'s')+' across '+totalLoads+' loads — match each once to clear all of them</div></div>'+
    '<div class="modal-body" id="modal-body"></div>'+
    '<div class="modal-foot"><div class="left">'+groups.length+' to resolve</div>'+
    '<button class="btn" id="modal-cancel">Close</button></div>';
  var mb=modal.querySelector('#modal-body');
  groups.forEach(function(g, i){
    var div=document.createElement('div');
    div.className='grp'; div.setAttribute('data-raw', g.raw);
    var selHtml = kind==='customer' ? customerOptions('', []) : carrierOptions('');
    div.innerHTML=
      '<div class="grp-top"><div class="grp-raw"><b>“'+esc(g.raw)+'”</b>'+(g.source?'<span class="sentby">sent by '+esc(g.source)+'</span>':'')+'</div>'+
      '<span class="grp-count">'+g.count+' load'+(g.count===1?'':'s')+'</span></div>'+
      '<div class="grp-resolve"><select class="gsel">'+selHtml+'</select></div>'+
      (kind==='customer'?'<label class="remember"><input type="checkbox" class="remember-cb" checked> <b>Remember</b> this match for future imports from this TMS</label>':'');
    mb.appendChild(div);
    var sel=div.querySelector('select');
    if (kind==='customer'){
      resolveCustomerCandidates(g.raw, g.source).then(function(cands){ sel.innerHTML=customerOptions('', cands); });
    }
    sel.addEventListener('change', function(){
      var val=sel.value; if(!val) return;
      var remember = kind==='customer' ? !!(div.querySelector('.remember-cb') && div.querySelector('.remember-cb').checked) : false;
      sel.classList.add('done'); div.classList.add('done');
      applyGroup(g.raw, val, g.ids, remember, kind).then(function(){
        showToast(g.count+' load'+(g.count===1?'':'s')+' cleared');
      });
    });
  });
  scrim.classList.remove('hidden');
  modal.querySelector('#modal-x').addEventListener('click', closeModal);
  modal.querySelector('#modal-cancel').addEventListener('click', closeModal);
}
function closeModal(){ var s=document.getElementById('scrim'); if(s) s.classList.add('hidden'); }

/* ---------------- submit gating ---------------- */

function submitIds(ids){
  return fetch(BROKER_API_BASE+'/draft-loads/submit', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ email:brokerEmail, ids:ids })
  }).then(function(r){ return r.json(); }).then(function(res){ handleSubmitResult(res); return res; });
}
function submitAllReady(){
  var ids=__state.drafts.filter(function(d){return d.status==='ready';}).map(function(d){return d.id;});
  if (!ids.length){ showToast('Nothing ready to submit'); return Promise.resolve(); }
  return submitIds(ids);
}
function submitOne(id){ return submitIds([id]); }

function handleSubmitResult(res){
  res=res||{};
  var submitted=(res.submitted||[]);
  __state.lastSkipped=(res.skipped||[]);
  if (submitted.length){
    __state.drafts=__state.drafts.filter(function(d){ return submitted.indexOf(d.id)===-1; });
  }
  var msg = submitted.length+' submitted';
  if (__state.lastSkipped.length){
    msg += ' · '+__state.lastSkipped.length+' skipped ('+
      __state.lastSkipped.map(function(s){ return (s.reasons||[]).join(','); }).join('; ')+')';
  }
  showToast(msg);
  renderQueue();
  renderSummary();
}

/* ---------------- data load ---------------- */

function loadQueue(){
  if (!brokerEmail) return Promise.resolve();
  return fetch(BROKER_API_BASE+'/draft-loads?email='+encodeURIComponent(brokerEmail))
    .then(function(r){ return r.json(); })
    .then(function(p){
      __state.drafts=(p&&p.drafts)||[];
      __state.candidatesByRaw={};
      setText('sub', __state.drafts.length+' draft'+(__state.drafts.length===1?'':'s')+' · resolve once, submit in bulk.');
      renderQueue();
      renderSummary((p&&p.summary)||{});
    })
    .catch(function(){ setText('sub','Could not load drafts.'); });
}

function loadPickLists(){
  if (!brokerEmail) return Promise.resolve();
  var c=fetch(BROKER_API_BASE+'/tms-customers?email='+encodeURIComponent(brokerEmail))
    .then(function(r){return r.json();}).then(function(p){ __state.customers=(p&&p.customers)||[]; }).catch(function(){});
  var v=fetch(BROKER_API_BASE+'/tms-carriers?email='+encodeURIComponent(brokerEmail))
    .then(function(r){return r.json();}).then(function(p){ __state.carriers=(p&&p.carriers)||[]; }).catch(function(){});
  return Promise.all([c,v]);
}

function boot(){
  if (typeof ZOHO==='undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.UTIL) return;
  var result=ZOHO.CREATOR.UTIL.getInitParams();
  if (result && typeof result.then==='function'){
    result.then(function(params){
      brokerEmail=(params && (params.loginUser||params.login_user||params.email))||'';
      loadPickLists().then(loadQueue);
    });
  }
}

window.addEventListener('load', function(){
  document.querySelectorAll('#filters .chip').forEach(function(c){
    c.addEventListener('click', function(){ setFilter(c.getAttribute('data-filter')); });
  });
  var s=document.getElementById('search');
  if (s) s.addEventListener('input', function(){ __state.search=s.value; renderQueue(); });
  bind('import-csv', function(){ showToast('CSV import coming soon'); });
  bind('new-draft', function(){ showToast('New draft coming soon'); });
  bind('submit-all', function(){ submitAllReady(); });
  bind('resolve-cust', function(){ openResolveModal('customer'); });
  bind('resolve-carr', function(){ openResolveModal('carrier'); });
  bind('bulk-cust', function(){ promptPick('customer'); });
  bind('bulk-carr', function(){ promptPick('carrier'); });
  bind('bulk-clear', clearSelection);
  bind('bulk-docs', function(){ showToast('Attach docs coming soon'); });
  bind('bulk-del', function(){ showToast('Delete coming soon'); });
  var cbAll=document.getElementById('cb-all');
  if (cbAll) cbAll.addEventListener('change', function(){
    var on=cbAll.checked;
    if (on){ visibleDrafts().forEach(function(d){ if(__state.selected.indexOf(d.id)===-1) __state.selected.push(d.id); }); }
    else { __state.selected=[]; }
    renderQueue(); renderBulkBar();
  });
  var scrim=document.getElementById('scrim');
  if (scrim) scrim.addEventListener('click', function(e){ if(e.target===scrim) closeModal(); });
  boot();
});
function bind(id, fn){ var el=document.getElementById(id); if(el) el.addEventListener('click', fn); }

document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeModal(); } });

// expose for tests
window.renderQueue=renderQueue;
window.loadQueue=loadQueue;
window.renderSummary=renderSummary;
window.setFilter=setFilter;
window.computeGroups=computeGroups;
window.applyGroup=applyGroup;
window.openResolveModal=openResolveModal;
window.openInlineEdit=openInlineEdit;
window.toggleSelect=toggleSelect;
window.bulkSetCustomer=bulkSetCustomer;
window.bulkSetCarrier=bulkSetCarrier;
window.submitAllReady=submitAllReady;
window.submitOne=submitOne;
window.handleSubmitResult=handleSubmitResult;
</script>
