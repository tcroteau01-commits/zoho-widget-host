<!DOCTYPE html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 10px; font-family: sans-serif; font-size: 13px; background: #f9f9f9; }
  .status { padding: 8px 12px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
  .ok { background: #d4edda; color: #155724; }
  .fail { background: #f8d7da; color: #721c24; }
  .pending { background: #fff3cd; color: #856404; }
  .row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .label { width: 200px; font-weight: bold; color: #555; }
  .val { flex: 1; padding: 3px 8px; background: #fff; border: 1px solid #ddd; border-radius: 4px; }
  input[type=text] { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; width: 220px; font-size: 13px; }
  button { background: #e8a020; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 4px 4px 4px 0; }
  #log { margin-top: 10px; font-size: 11px; color: #333; background: #eee; padding: 8px; border-radius: 4px; white-space: pre-wrap; max-height: 250px; overflow-y: auto; }
  hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }
</style>
</head>
<body>

<div id="status" class="status pending">Checking SDK...</div>

<div class="row"><div class="label">ZOHO (object)</div><div class="val" id="chkZoho">—</div></div>
<div class="row"><div class="label">ZOHO.CREATOR</div><div class="val" id="chkCreator">—</div></div>
<div class="row"><div class="label">ZOHO.CREATOR.PUBLISH</div><div class="val" id="chkPublish">—</div></div>
<div class="row"><div class="label">ZOHO.CREATOR.DATA</div><div class="val" id="chkData">—</div></div>

<hr>
<p style="margin:4px 0;color:#555;">Find <b>private_link</b>: In Creator → your form → Share → Permalink URL<br>It's the alphanumeric string at the end, e.g. <code>abc123xyz</code></p>

<div class="row"><div class="label">Form Link Name</div><input type="text" id="formName" placeholder="e.g. Load_Details" /></div>
<div class="row"><div class="label">Private Link Token</div><input type="text" id="privateLink" placeholder="e.g. abc123xyz" /></div>

<br>
<button onclick="testPublish()">Test: PUBLISH.addRecords()</button>
<button onclick="testData()">Test: DATA.addRecords()</button>

<div id="log">Waiting...</div>

<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script>
function log(msg) {
  var el = document.getElementById('log');
  el.textContent += '\n' + msg;
  el.scrollTop = el.scrollHeight;
}

window.addEventListener('load', function() {
  var hasZoho = typeof ZOHO !== 'undefined';
  var hasCreator = hasZoho && typeof ZOHO.CREATOR !== 'undefined';
  var hasPublish = hasCreator && typeof ZOHO.CREATOR.PUBLISH !== 'undefined';
  var hasData = hasCreator && typeof ZOHO.CREATOR.DATA !== 'undefined';

  document.getElementById('chkZoho').textContent = hasZoho ? 'present' : 'MISSING';
  document.getElementById('chkCreator').textContent = hasCreator ? 'present' : 'MISSING';
  document.getElementById('chkPublish').textContent = hasPublish ? 'present' : 'MISSING';
  document.getElementById('chkData').textContent = hasData ? 'present' : 'MISSING';

  if (hasPublish || hasData) {
    document.getElementById('status').textContent = 'SDK READY — ' + (hasPublish ? 'PUBLISH available' : '') + (hasData ? ' DATA available' : '');
    document.getElementById('status').className = 'status ok';
  } else if (hasCreator) {
    document.getElementById('status').textContent = 'ZOHO.CREATOR present but no PUBLISH or DATA';
    document.getElementById('status').className = 'status fail';
    try { log('ZOHO.CREATOR keys: ' + Object.keys(ZOHO.CREATOR).join(', ')); } catch(e) { log('Could not enumerate CREATOR keys: ' + e); }
  } else {
    document.getElementById('status').textContent = hasZoho ? 'ZOHO present but CREATOR missing' : 'SDK DID NOT LOAD';
    document.getElementById('status').className = 'status fail';
    try { log('ZOHO keys: ' + Object.keys(ZOHO).join(', ')); } catch(e) {}
  }

  document.getElementById('log').textContent = 'SDK check complete.';
});

function testPublish() {
  var form = document.getElementById('formName').value.trim();
  var pl = document.getElementById('privateLink').value.trim();
  if (!form || !pl) { log('Enter form link name and private link token first'); return; }

  log('Calling PUBLISH.addRecords...');
  ZOHO.CREATOR.PUBLISH.addRecords({
    form_name: form,
    private_link: pl,
    payload: { data: { Load_Comments: 'WIDGET TEST - safe to delete' } }
  }).then(function(res) {
    log('PUBLISH OK: ' + JSON.stringify(res));
  }).catch(function(err) {
    log('PUBLISH FAILED: ' + JSON.stringify(err));
  });
}

function testData() {
  var form = document.getElementById('formName').value.trim();
  if (!form) { log('Enter form link name first'); return; }

  log('Calling DATA.addRecords...');
  ZOHO.CREATOR.DATA.addRecords({
    form_name: form,
    payload: { data: { Load_Comments: 'WIDGET TEST - safe to delete' } }
  }).then(function(res) {
    log('DATA OK: ' + JSON.stringify(res));
  }).catch(function(err) {
    log('DATA FAILED: ' + JSON.stringify(err));
  });
}
</script>
</body>
</html>
