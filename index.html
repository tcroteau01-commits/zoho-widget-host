<!DOCTYPE html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 10px; font-family: sans-serif; font-size: 13px; background: #f9f9f9; }
  .status { padding: 8px 12px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
  .ok { background: #d4edda; color: #155724; }
  .fail { background: #f8d7da; color: #721c24; }
  .pending { background: #fff3cd; color: #856404; }
  .row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .label { width: 160px; font-weight: bold; color: #555; }
  .val { flex: 1; padding: 3px 8px; background: #fff; border: 1px solid #ddd; border-radius: 4px; }
  button { background: #e8a020; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 4px 4px 4px 0; }
  #log { margin-top: 10px; font-size: 11px; color: #333; background: #eee; padding: 8px; border-radius: 4px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
  input[type=text] { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
</style>
</head>
<body>

<div id="status" class="status pending">Checking SDK API availability...</div>

<div class="row"><div class="label">ZOHO object</div><div class="val" id="chkZoho">—</div></div>
<div class="row"><div class="label">ZOHO.Creator.API</div><div class="val" id="chkAPI">—</div></div>
<div class="row"><div class="label">addRecord available</div><div class="val" id="chkAdd">—</div></div>

<br>
<div class="row">
  <div class="label">App Link Name</div>
  <input type="text" id="appName" placeholder="e.g. operfi-broker-portal" />
</div>
<div class="row">
  <div class="label">Form Link Name</div>
  <input type="text" id="formName" placeholder="e.g. Load_Details" />
</div>

<br>
<button onclick="testAddRecord()">Test: Create a test record</button>
<button onclick="testGetRecords()">Test: Read records</button>

<div id="log">Waiting...</div>

<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script>
function log(msg) {
  var el = document.getElementById('log');
  el.textContent += '\n' + msg;
  el.scrollTop = el.scrollHeight;
}

window.addEventListener('load', function() {
  // Check what's available without init()
  var hasZoho = typeof ZOHO !== 'undefined';
  var hasAPI = hasZoho && typeof ZOHO.Creator !== 'undefined' && typeof ZOHO.Creator.API !== 'undefined';
  var hasAdd = hasAPI && typeof ZOHO.Creator.API.addRecord === 'function';

  document.getElementById('chkZoho').textContent = hasZoho ? 'present' : 'MISSING';
  document.getElementById('chkAPI').textContent = hasAPI ? 'present' : 'MISSING';
  document.getElementById('chkAdd').textContent = hasAdd ? 'present' : 'MISSING';

  if (hasAdd) {
    document.getElementById('status').textContent = 'SDK API AVAILABLE — ready to test addRecord()';
    document.getElementById('status').className = 'status ok';
  } else if (hasZoho) {
    document.getElementById('status').textContent = 'ZOHO object present but Creator.API missing';
    document.getElementById('status').className = 'status fail';
    // Log what IS available
    try { log('ZOHO keys: ' + Object.keys(ZOHO).join(', ')); } catch(e) {}
    try { log('ZOHO.Creator keys: ' + Object.keys(ZOHO.Creator).join(', ')); } catch(e) {}
  } else {
    document.getElementById('status').textContent = 'ZOHO SDK DID NOT LOAD';
    document.getElementById('status').className = 'status fail';
  }

  document.getElementById('log').textContent = 'SDK check complete.';
});

function testGetRecords() {
  var app = document.getElementById('appName').value.trim();
  var form = document.getElementById('formName').value.trim();
  if (!app || !form) { log('Enter app and form name first'); return; }

  log('Calling getRecords(' + app + ', ' + form + ')...');
  ZOHO.Creator.API.getRecords({ appName: app, reportName: form + '_Report' })
    .then(function(res) { log('getRecords OK: ' + JSON.stringify(res).substring(0, 300)); })
    .catch(function(err) { log('getRecords FAILED: ' + JSON.stringify(err)); });
}

function testAddRecord() {
  var app = document.getElementById('appName').value.trim();
  var form = document.getElementById('formName').value.trim();
  if (!app || !form) { log('Enter app and form name first'); return; }

  log('Calling addRecord(' + app + ', ' + form + ')...');
  ZOHO.Creator.API.addRecord({
    appName: app,
    formName: form,
    payload: {
      data: {
        Load_Comments: 'WIDGET API TEST - safe to delete'
      }
    }
  }).then(function(res) {
    log('addRecord OK: ' + JSON.stringify(res));
  }).catch(function(err) {
    log('addRecord FAILED: ' + JSON.stringify(err));
  });
}
</script>
</body>
</html>
