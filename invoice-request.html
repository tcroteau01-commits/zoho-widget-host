<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Your Invoice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f0efe9; color: #333; min-height: 100vh; }
.page { max-width: 640px; margin: 0 auto; padding: 24px 18px 60px; }
.brand { font-size: 16px; font-weight: 700; color: #F97316; margin-bottom: 14px; }
.card { background: #fff; border: 1px solid #e6e3da; border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; }
.hidden { display: none; }
.title { font-size: 20px; font-weight: 700; color: #272727; }
.sub { font-size: 12px; color: #888; margin-top: 4px; }
.sec-h { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.4px; margin: 0 0 8px; }
.btn { background: #F97316; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; font-family: inherit; }
.btn:disabled { opacity: 0.6; }
.status { font-size: 13px; font-weight: 600; margin-top: 10px; }
.status.ok { color: #2e7d32; } .status.err { color: #c62828; }
.dropzone { border: 2px dashed #d8cfa8; border-radius: 8px; padding: 16px; text-align: center; color: #888; cursor: pointer; margin-bottom: 12px; }
.dropzone.staged { border-color: #2e7d32; color: #2e7d32; font-weight: 600; }
.dropzone.dragover { border-color: #F97316; background: #fef6e7; }

@media (max-width: 640px) {
  html, body { overflow-x: hidden; }
  .page { width: 100%; max-width: 100%; padding: 16px 12px 56px; }
  .card { width: 100%; max-width: 100%; padding: 16px 14px; }
  .btn { width: 100%; min-height: 44px; font-size: 16px; }
}
</style>
</head>
<body>
<div class="page">
  <div class="brand">OperFi</div>
  <div class="card" id="summary"><div class="sub">Loading…</div></div>
  <div class="card hidden" id="upload-card">
    <div class="sec-h">Upload your invoice</div>
    <div class="dropzone" id="cdropzone">Drop your invoice here or tap to choose a file</div>
    <input type="file" id="cfile" accept="application/pdf,image/*" style="display:none">
    <button class="btn" id="cupload">Submit Invoice</button>
    <div class="status" id="cstatus"></div>
  </div>
</div>
<script>
var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
var stagedFile = null;
var brokerCompany = '';

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function getToken() {
  try { return new URL(window.location.href).searchParams.get('token') || ''; } catch (e) { return ''; }
}

function status(msg, cls) {
  var el = document.getElementById('cstatus');
  if (el) { el.textContent = msg || ''; el.className = 'status ' + (cls || ''); }
}

function stageFile(file) {
  stagedFile = file || null;
  var dz = document.getElementById('cdropzone');
  if (!dz) return;
  if (stagedFile) { dz.classList.add('staged'); dz.textContent = stagedFile.name; }
  else { dz.classList.remove('staged'); dz.textContent = 'Drop your invoice here or tap to choose a file'; }
}

function submitInvoice() {
  if (!stagedFile) { status('Please choose a file first.', 'err'); return Promise.resolve(); }
  var btn = document.getElementById('cupload');
  if (btn) btn.disabled = true;
  status('Uploading…', '');
  var fd = new FormData();
  fd.append('file', stagedFile, stagedFile.name);
  return fetch(BROKER_API_BASE + '/invoice-request/upload?token=' + encodeURIComponent(getToken()),
               { method: 'POST', body: fd })
    .then(function (res) { return res.json().then(function (p) { return { ok: res.ok, p: p }; }); })
    .then(function (r) {
      if (r.ok && r.p && r.p.ok) {
        status('Thank you — your invoice was submitted. ' + (brokerCompany ? brokerCompany + ' will follow up.' : ''), 'ok');
        stageFile(null);
      } else {
        status((r.p && r.p.error) || 'Upload failed. Please try again.', 'err');
      }
      if (btn) btn.disabled = false;
    })
    .catch(function () {
      status('Network error. Please try again.', 'err');
      if (btn) btn.disabled = false;
    });
}

function boot() {
  var token = getToken();
  var summary = document.getElementById('summary');
  if (!token) {
    summary.innerHTML = '<div class="status err">Missing upload link token. Ask your broker to resend the link.</div>';
    return;
  }
  fetch(BROKER_API_BASE + '/invoice-request/info?token=' + encodeURIComponent(token))
    .then(function (res) {
      if (!res.ok) throw new Error(res.status);
      return res.json();
    })
    .then(function (s) {
      brokerCompany = s.broker_company || '';
      summary.innerHTML =
        '<div class="title">Submit your invoice</div>' +
        '<div class="sub">Requested by <b>' + esc(s.broker_company) + '</b>' +
        (s.carrier_name ? ' for <b>' + esc(s.carrier_name) + '</b>' : '') + '</div>' +
        '<div class="sub">No login required. Upload your invoice or rate confirmation below.</div>';
      document.getElementById('upload-card').classList.remove('hidden');
    })
    .catch(function () {
      summary.innerHTML = '<div class="status err">This link is no longer valid. Please contact your broker for a new one.</div>';
      document.getElementById('upload-card').classList.add('hidden');
    });

  var dz = document.getElementById('cdropzone');
  var input = document.getElementById('cfile');
  if (dz && input) {
    dz.addEventListener('click', function () { input.click(); });
    input.addEventListener('change', function () { stageFile(input.files && input.files[0]); });
    dz.addEventListener('dragover', function (e) { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', function () { dz.classList.remove('dragover'); });
    dz.addEventListener('drop', function (e) {
      e.preventDefault(); dz.classList.remove('dragover');
      stageFile(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]);
    });
  }
  var btn = document.getElementById('cupload');
  if (btn) btn.addEventListener('click', submitInvoice);
}

window.addEventListener('load', boot);
window.getToken = getToken;
window.stageFile = stageFile;
window.submitInvoice = submitInvoice;
</script>
</body>
</html>
