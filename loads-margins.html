<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loads &amp; Margins</title>
<style>
  :root {
    --of-charcoal: #1d1d1f;
    --of-orange: #F97316;
    --of-orange-soft: #FEF3E8;
    --of-gray-50: #F8F9FB;
    --of-gray-100: #F1F2F4;
    --of-gray-200: #E5E7EB;
    --of-gray-500: #6B7280;
    --of-gray-700: #374151;
    --of-green: #059669;
    --of-amber: #D97706;
    --of-red: #DC2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px; color: var(--of-charcoal); background: #fff;
    padding: 20px 24px;
  }
  .page-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px;
  }
  .page-header h2 { font-size: 22px; font-weight: 600; color: var(--of-charcoal); margin: 0; }
  .subtitle { font-size: 13px; color: var(--of-gray-500); margin-top: 4px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--of-gray-100); border: 1px solid var(--of-gray-200);
    padding: 6px 12px; border-radius: 8px; font-size: 12px; color: var(--of-gray-700);
  }

  /* Tab strip */
  .tab-strip {
    display: flex; border-bottom: 1px solid var(--of-gray-200);
    margin: 0 0 18px;
  }
  .tab-strip button {
    background: transparent; border: none; color: var(--of-gray-500);
    font-size: 14px; font-weight: 600; padding: 12px 0; margin-right: 28px;
    cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit;
  }
  .tab-strip button.active {
    color: var(--of-charcoal); border-bottom-color: var(--of-orange);
  }
  .tab-strip button:hover:not(.active) { color: var(--of-gray-700); }

  .loading { padding: 24px; color: var(--of-gray-500); }
</style>
</head>
<body>
  <div id="loads-margins-app"><div class="loading">Loading loads &amp; margins...</div></div>

  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <script>
    var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
    var brokerEmail = null;

    var state = {
      currentTab: 'loads',
      // Loads tab
      loadsFilters: { dateRange: 'this_month', dateFrom: '', dateTo: '',
                      debtorId: '', vendor: '', loadId: '', arStatus: 'all' },
      loadsData: null, loadsLoading: false, loadsExportOpen: false,
      selectedLoadId: null,
      loadPreview: null, loadPreviewLoading: false, loadPreviewError: null,
      // Margins tab
      marginsGroupBy: 'month',
      marginsFilters: { dateRange: 'last_12_months', dateFrom: '', dateTo: '',
                        debtorId: '' },
      marginsData: null, marginsLoading: false, marginsExportOpen: false,
      // Fees tab
      feesFilters: { dateRange: 'this_month', dateFrom: '', dateTo: '',
                     feeType: '', loadId: '' },
      feesData: null, feesLoading: false, feesExportOpen: false,
      expandedFeeGroups: {},
      // Allow ?clientId=N for standalone test
      clientId: null,
    };

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }
    function fmtMoney(v) {
      if (v == null || v === '') return '-';
      return '$' + Math.round(Number(v)).toLocaleString();
    }
    function fmtMoneyDec(v) {
      if (v == null || v === '') return '-';
      return '$' + Number(v).toLocaleString(undefined,
        { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function fmtPct(v) {
      if (v == null) return '-';
      return Number(v).toFixed(1) + '%';
    }

    // URL standalone-test mode
    function getQueryParam(name) {
      var m = window.location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
      return m ? decodeURIComponent(m[1]) : null;
    }
    var standaloneClientId = getQueryParam('clientId');
    if (standaloneClientId) state.clientId = standaloneClientId;

    function bootstrap() {
      if (state.clientId) {
        // Standalone test mode: skip Creator SDK
        renderShell();
        fetchLoads();
        return;
      }
      // Production: Creator SDK init
      if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.UTIL) {
        setTimeout(bootstrap, 300);
        return;
      }
      ZOHO.CREATOR.UTIL.getInitParams().then(function (params) {
        brokerEmail = (params && params.loginUser) ? params.loginUser : null;
        if (!brokerEmail) {
          document.getElementById('loads-margins-app').innerHTML =
            '<div class="loading" style="color:var(--of-red)">Unable to identify broker. Refresh the page or contact support.</div>';
          return;
        }
        renderShell();
        fetchLoads();
      }).catch(function (err) {
        document.getElementById('loads-margins-app').innerHTML =
          '<div class="loading" style="color:var(--of-red)">Init failed: ' + esc(err.message || err) + '</div>';
      });
    }

    function renderShell() {
      var app = document.getElementById('loads-margins-app');
      var html = '<div class="page-header">' +
        '<div><h2>Loads &amp; Margins</h2><p class="subtitle">' +
          (state.currentTab === 'loads' ? 'Per-load detail and margins' :
           state.currentTab === 'margins' ? 'Margin trend by period' :
           'Fees breakdown by type') + '</p></div>' +
        '<span class="pill">As of <b>' + new Date().toISOString().slice(0,10) + '</b></span>' +
      '</div>';
      html += '<div class="tab-strip">' +
        '<button data-tab="loads" class="' + (state.currentTab === 'loads' ? 'active' : '') + '">Loads</button>' +
        '<button data-tab="margins" class="' + (state.currentTab === 'margins' ? 'active' : '') + '">Margins by Period</button>' +
        '<button data-tab="fees" class="' + (state.currentTab === 'fees' ? 'active' : '') + '">Fees Paid</button>' +
      '</div>';
      if (state.currentTab === 'loads')   html += renderLoadsTab();
      if (state.currentTab === 'margins') html += renderMarginsTab();
      if (state.currentTab === 'fees')    html += renderFeesTab();
      app.innerHTML = html;
      bindTabClicks();
      if (state.currentTab === 'loads')   bindLoadsTab();
      if (state.currentTab === 'margins') bindMarginsTab();
      if (state.currentTab === 'fees')    bindFeesTab();
    }

    function bindTabClicks() {
      document.querySelectorAll('.tab-strip button').forEach(function (b) {
        b.addEventListener('click', function () {
          var tab = b.getAttribute('data-tab');
          if (tab === state.currentTab) return;
          state.currentTab = tab;
          if (tab === 'loads'   && state.loadsData   === null) { fetchLoads();   return; }
          if (tab === 'margins' && state.marginsData === null) { fetchMargins(); return; }
          if (tab === 'fees'    && state.feesData    === null) { fetchFees();    return; }
          renderShell();
        });
      });
    }

    // Stubs -- to be replaced in Tasks 14-17
    function renderLoadsTab()   { return '<div class="loading">Loads tab -- Task 14</div>'; }
    function renderMarginsTab() { return '<div class="loading">Margins tab -- Task 16</div>'; }
    function renderFeesTab()    { return '<div class="loading">Fees tab -- Task 17</div>'; }
    function bindLoadsTab()   {}
    function bindMarginsTab() {}
    function bindFeesTab()    {}
    function fetchLoads()   { state.loadsData = { loads: [], totals: { count: 0, purchaseAmount: 0, margin: 0, marginPct: null } }; renderShell(); }
    function fetchMargins() { state.marginsData = { rows: [], totals: {} }; renderShell(); }
    function fetchFees()    { state.feesData = { groups: [], totals: { count: 0, amount: 0 } }; renderShell(); }

    bootstrap();
  </script>
</body>
</html>
