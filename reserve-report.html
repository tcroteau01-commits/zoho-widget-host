<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reserve Report</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script src="https://tcroteau01-commits.github.io/zoho-widget-host/operfi-impersonate.js?v=2"></script>
<style>
  :root {
    --bg: #f0efe9;
    --card: #ffffff;
    --border: #e6e3da;
    --text: #272727;
    --muted: #6b6b6b;
    --accent: #F97316;
    --accent-soft: #fff1e6;
    --positive: #16a34a;
    --negative: #dc2626;
    --chip-orange: #fff1e6;
    --chip-orange-text: #b45309;
    --chip-red: #fee2e2;
    --chip-red-text: #991b1b;
    --chip-green: #dcfce7;
    --chip-green-text: #166534;
    --chip-blue: #dbeafe;
    --chip-blue-text: #1e40af;
    --chip-amber: #fef3c7;
    --chip-amber-text: #92400e;
    --chip-gray: #e5e7eb;
    --chip-gray-text: #374151;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14px;
  }
  .page-header { display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; }
  .page-header h1 { margin: 0; font-size: 24px; font-weight: 600; }
  .toolbar { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 8px 14px; border: 1px solid var(--border); background: var(--card);
    color: var(--text); border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent);
    border-radius: 8px; padding: 16px; }
  .kpi-label { color: var(--muted); font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-size: 24px; font-weight: 600; }
  .kpi-cta { margin-top: 8px; }
  .kpi-cta button { padding: 4px 10px; font-size: 12px; }
  .activity-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
  .footer-note { color: var(--muted); font-size: 12px; margin-top: 16px; }

  /* Task 11 — tab strip, search, accordion, chips */
  .tabs-row { display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--muted); transition: background 0.15s, color 0.15s; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .search { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; width: 220px; background: var(--bg); color: var(--text); }
  .search:focus { outline: none; border-color: var(--accent); }

  .day-group { border-bottom: 1px solid var(--border); }
  .day-group:last-child { border-bottom: none; }
  .day-header { display: flex; align-items: center; padding: 12px 16px; cursor: pointer;
    user-select: none; gap: 10px; }
  .day-header:hover { background: var(--bg); }
  .day-caret { width: 16px; flex-shrink: 0; font-style: normal; }
  .day-group:not(.expanded) .day-caret::before { content: '▶'; font-size: 10px; color: var(--muted); }
  .day-group.expanded .day-caret::before { content: '▼'; font-size: 10px; color: var(--accent); }
  .day-date { font-weight: 600; font-size: 13px; flex: 1; }
  .day-count { font-size: 12px; color: var(--muted); }
  .day-net { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; margin-left: auto; }
  .day-net.positive { color: var(--positive); }
  .day-net.negative { color: var(--negative); }
  .day-end { font-size: 12px; color: var(--muted); margin-left: 16px; font-variant-numeric: tabular-nums; }
  .day-body { display: none; padding: 0 16px 12px; }
  .day-group.expanded .day-body { display: block; }

  table.txns { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.txns th { text-align: left; color: var(--muted); font-weight: 500; font-size: 12px;
    padding: 6px 8px; border-bottom: 1px solid var(--border); }
  table.txns td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.txns tr:last-child td { border-bottom: none; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.num.positive { color: var(--positive); }
  td.num.negative { color: var(--negative); }

  .chip { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px;
    font-weight: 500; white-space: nowrap; }
  .chip-invoice-purchase { background: var(--chip-orange); color: var(--chip-orange-text); }
  .chip-reserve-release  { background: var(--chip-green);  color: var(--chip-green-text);  }
  .chip-vendor-qp        { background: var(--chip-blue);   color: var(--chip-blue-text);   }
  .chip-chargeback       { background: var(--chip-red);    color: var(--chip-red-text);    }
  .chip-overpay          { background: var(--chip-amber);  color: var(--chip-amber-text);  }
  .chip-direct-deposit   { background: var(--chip-green);  color: var(--chip-green-text);  }
  .chip-pending-payout   { background: var(--chip-amber);  color: var(--chip-amber-text);  }
  .chip-escrow-cash      { background: var(--chip-blue);   color: var(--chip-blue-text);   }
  .chip-escrow-reserve   { background: var(--chip-orange); color: var(--chip-orange-text); }
  .chip-collection       { background: var(--chip-red);    color: var(--chip-red-text);    }
  .chip-other            { background: var(--chip-gray);   color: var(--chip-gray-text);   }
  .chip-interest          { background: #e0e7ff; color: #3730a3; }
  .chip-loan-payment      { background: #d1fae5; color: #065f46; }
  .chip-loan-adjustment   { background: #fef3c7; color: #92400e; }
  .chip-fuel-advance      { background: #fed7aa; color: #9a3412; }
  .chip-tank-fee          { background: #fde68a; color: #78350f; }
  .chip-fee-reclass       { background: #ede9fe; color: #5b21b6; }
  .chip-reserve-transfer  { background: #cffafe; color: #155e75; }
  .chip-client-advance    { background: #f3e8ff; color: #6b21a8; }
  .interest-row td        { color: #6b7280; }
  .muted                  { color: #9ca3af; }

  .empty { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 14px; }

  /* ===== Mobile (<=640px): card reflow + stacking ===== */
  @media (max-width: 640px) {
    html, body { overflow-x: hidden; }
    body { padding: 14px 12px; }
    .page-header { flex-direction: column; align-items: stretch; gap: 12px; }

    /* P2 — stack KPIs + toolbar */
    .kpis { grid-template-columns: 1fr !important; gap: 12px; }
    .toolbar { flex-wrap: wrap; }
    .toolbar .btn { flex: 1 1 auto; }
    .tabs-row { flex-direction: column; align-items: stretch; }
    .search { width: 100% !important; }

    /* P6 — tap targets + no iOS zoom */
    .btn, .tab { min-height: 44px; }
    input, select, textarea, .search { font-size: 16px; }
    .day-header { padding: 14px 12px; }

    /* P3 — txns table reflows to cards */
    table.txns thead { display: none; }
    table.txns, table.txns tbody, table.txns tr, table.txns td { display: block; width: 100%; }
    table.txns tr {
      border: 1px solid var(--border); border-radius: 10px; background: #fff;
      padding: 8px 12px; margin: 0 0 10px;
    }
    table.txns tr:last-child td { border-bottom: none; }
    table.txns td {
      display: flex; justify-content: space-between; gap: 12px;
      text-align: right; padding: 5px 0; border: none;
    }
    table.txns td.num { text-align: right; }
    table.txns td[data-label]::before {
      content: attr(data-label); font-weight: 600; color: var(--muted);
      text-align: left; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px;
    }
  }
</style>
</head>
<body>
  <div class="page-header">
    <h1>Reserve Report</h1>
    <div class="toolbar">
      <select id="dateRange" class="btn">
        <option value="30" selected>Last 30 days</option>
        <option value="7">Last 7 days</option>
        <option value="60">Last 60 days</option>
        <option value="90">Last 90 days</option>
        <option value="this_month">This month</option>
        <option value="last_month">Last month</option>
      </select>
      <button class="btn" id="exportCsv">CSV</button>
      <button class="btn" id="exportPdf">PDF</button>
    </div>
  </div>

  <div class="kpis" id="kpiStrip">
    <div class="kpi-card">
      <div class="kpi-label">Escrow Reserve</div>
      <div class="kpi-value" id="kpiEscrow">--</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Cash Reserve</div>
      <div class="kpi-value" id="kpiCash">--</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Reserve</div>
      <div class="kpi-value" id="kpiTotal">--</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Available for Release</div>
      <div class="kpi-value" id="kpiAvailable">--</div>
      <div class="kpi-cta">
        <button class="btn btn-primary" id="btnRequestRelease">Request Release &rarr;</button>
      </div>
    </div>
  </div>

  <div class="activity-panel" id="activityPanel">
    <!-- Task 11 fills this in -->
    <div style="padding: 32px; color: var(--muted); text-align: center;">Loading reserve activity...</div>
  </div>

  <div class="footer-note">
    Balances reflect OperFi's transaction history; for the authoritative FactorView balance contact OperFi if needed.
  </div>

<script>
  const API_BASE = "https://operfi-broker-api.onrender.com";

  function navigateParent(hash) {
    if (window.top && window.top.location) {
      window.top.location.href = hash;
    }
  }

  function fmtMoney(n) {
    const v = Number(n || 0);
    return (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString(undefined, {
      minimumFractionDigits: 2, maximumFractionDigits: 2,
    });
  }

  function getDateRange() {
    const sel = document.getElementById('dateRange').value;
    const today = new Date();
    // .toISOString() returns UTC; in Phoenix evenings (MST -07:00), the rendered
    // date string may be one day ahead of the local calendar day. Acceptable for
    // 30/60/90-day rolling windows; edge case for narrow same-day queries.
    const fmt = (d) => d.toISOString().slice(0, 10);
    let start, end;
    if (sel === 'this_month') {
      start = new Date(today.getFullYear(), today.getMonth(), 1);
      end = today;
    } else if (sel === 'last_month') {
      start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      end = new Date(today.getFullYear(), today.getMonth(), 0);
    } else {
      const days = parseInt(sel, 10);
      start = new Date(today);
      start.setDate(start.getDate() - days);
      end = today;
    }
    return { start: fmt(start), end: fmt(end) };
  }

  // Task 11 — module-scope state
  let currentData = null;
  let currentTab = 'cash';
  let currentSearch = '';
  let loanData = null;          // /loan/activity payload, populated only if has_outstanding_balance
  let hasOutstandingBalance = false;
  // Resolved SDK init params (loginUser email, scope, etc). Populated by
  // bootstrap() before any API call. getInitParams() returns a Promise in
  // production — accessing .loginUser synchronously yields undefined.
  let initParams = null;

  function chipClass(cat) {
    const map = {
      // Reserve categories (existing)
      'Invoice Purchase':          'chip-invoice-purchase',
      'Reserve Release':           'chip-reserve-release',
      'Vendor Quick Pay':          'chip-vendor-qp',
      'Chargeback':                'chip-chargeback',
      'Overpayment':               'chip-overpay',
      'Direct Deposit':            'chip-direct-deposit',
      'Pending Payout':            'chip-pending-payout',
      'Escrow ↔ Cash Transfer': 'chip-escrow-cash',
      'Escrow Reserve Adjustment': 'chip-escrow-reserve',
      'Collection':                'chip-collection',
      // Loan categories (new)
      'Interest':                  'chip-interest',
      'Loan Payment':              'chip-loan-payment',
      'Loan Adjustment':           'chip-loan-adjustment',
      'Fuel Advance':              'chip-fuel-advance',
      'Tank Fee':                  'chip-tank-fee',
      'Fee Reclassification':      'chip-fee-reclass',
      'Reserve Transfer':          'chip-reserve-transfer',
      'Client Advance':            'chip-client-advance',
      'Other':                     'chip-other',
    };
    return map[cat] || 'chip-other';
  }

  function txnMatchesSearch(t, q) {
    const hay = [
      t.trans_id || '', t.inv_no || '', t.debtor_name || '',
      t.note || '', t.ref_number || '', t.category || '',
    ].join(' ').toLowerCase();
    return hay.includes(q);
  }

  function renderActivity(data) {
    currentData = data;
    const panel = document.getElementById('activityPanel');
    const loanTabBtn = hasOutstandingBalance
      ? `<button class="tab${currentTab === 'loan' ? ' active' : ''}" data-tab="loan">Outstanding Balance</button>`
      : '';
    panel.innerHTML = `
      <div class="tabs-row">
        <div class="tabs">
          <button class="tab${currentTab === 'cash' ? ' active' : ''}" data-tab="cash">Cash Reserve</button>
          <button class="tab${currentTab === 'escrow' ? ' active' : ''}" data-tab="escrow">Escrow Reserve</button>
          ${loanTabBtn}
        </div>
        <input class="search" id="rr-search" type="search" placeholder="Search transactions…" value="${currentSearch}" />
      </div>
      <div id="rr-body"></div>
    `;
    panel.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        panel.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderKpis(currentTab);
        renderBody();
      });
    });
    panel.querySelector('#rr-search').addEventListener('input', e => {
      currentSearch = e.target.value.trim().toLowerCase();
      renderBody();
    });
    renderBody();
  }

  function renderBody() {
    const bodyEl = document.getElementById('rr-body');
    if (!bodyEl || !currentData) return;
    let days;
    if (currentTab === 'loan') {
      days = (loanData && loanData.activity_by_date) || [];
    } else if (currentTab === 'cash') {
      days = currentData.cash_activity_by_date || [];
    } else {
      days = currentData.escrow_activity_by_date || [];
    }
    const today = new Date().toISOString().slice(0, 10);
    const q = currentSearch;

    if (days.length === 0) {
      const label = currentTab === 'loan' ? 'outstanding balance' : 'reserve';
      bodyEl.innerHTML = `<div class="empty">No ${label} activity in this date range.</div>`;
      return;
    }

    // Apply search filter
    const filtered = q
      ? days.map(day => ({
          ...day,
          transactions: (day.transactions || []).filter(t => txnMatchesSearch(t, q)),
        })).filter(day => day.transactions.length > 0)
      : days;

    if (filtered.length === 0) {
      bodyEl.innerHTML = '<div class="empty">No matches.</div>';
      return;
    }

    bodyEl.innerHTML = filtered.map(day => {
      let expanded;
      if (q) {
        expanded = true; // auto-expand all matching days when searching
      } else {
        expanded = day.date === today || filtered.indexOf(day) === 0;
      }
      return dayMarkup(day, day.transactions || [], expanded);
    }).join('');

    // Attach click handlers for accordion
    bodyEl.querySelectorAll('.day-header').forEach(hdr => {
      hdr.addEventListener('click', () => {
        const group = hdr.closest('.day-group');
        group.classList.toggle('expanded');
      });
    });
  }

  function dayMarkup(day, txns, expanded) {
    const net = Number(day.net_change) || 0;
    const netClass = net >= 0 ? 'positive' : 'negative';
    const endBal = day.ending_balance != null ? Number(day.ending_balance) : null;
    const endStr = endBal !== null
      ? `<span class="day-end">End: ${fmtMoney(endBal)}</span>`
      : '';
    const dateLabel = new Date(day.date + 'T00:00:00').toLocaleDateString(undefined, {
      weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
    });

    const rows = txns.map(t => {
      const amtClass = Number(t.amount) >= 0 ? 'positive' : 'negative';
      const isInterest = !!t.is_interest;
      const noteHtml = isInterest ? `<em>${t.note || ''}</em>` : (t.note || '');
      const endingHtml = isInterest ? '<span class="muted">—</span>' : fmtMoney(t.ending_balance);
      return `<tr${isInterest ? ' class="interest-row"' : ''}>
        <td data-label="Trans ID">${t.trans_id || ''}</td>
        <td data-label="Invoice">${t.inv_no || ''}</td>
        <td data-label="Debtor">${t.debtor_name || ''}</td>
        <td data-label="Note">${noteHtml}</td>
        <td data-label="Category"><span class="chip ${chipClass(t.category)}">${t.category || 'Other'}</span></td>
        <td class="num" data-label="Beginning">${fmtMoney(t.beginning_balance)}</td>
        <td class="num ${amtClass}" data-label="Amount">${fmtMoney(t.amount)}</td>
        <td class="num" data-label="Ending">${endingHtml}</td>
      </tr>`;
    }).join('');

    return `<div class="day-group${expanded ? ' expanded' : ''}">
      <div class="day-header">
        <span class="day-caret"></span>
        <span class="day-date">${dateLabel}</span>
        <span class="day-count">${txns.length} txn${txns.length !== 1 ? 's' : ''}</span>
        <span class="day-net ${netClass}">${net >= 0 ? '+' : ''}${fmtMoney(net)}</span>
        ${endStr}
      </div>
      <div class="day-body">
        <table class="txns">
          <thead><tr>
            <th>Trans ID</th><th>Invoice</th><th>Debtor</th><th>Note</th><th>Category</th>
            <th style="text-align:right">Beginning</th>
            <th style="text-align:right">Amount</th>
            <th style="text-align:right">Ending</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  // clientId override: when the page URL includes ?clientId=NNNN, scope to that
  // FVClientID directly instead of resolving from email. Mirrors the admin
  // testing pattern used by /aging, /credit-dashboard, /loads-margins. Lets
  // an admin spot-check any broker's view without remapping their Contact.
  const QUERY_CLIENT_ID = new URLSearchParams(window.location.search).get('clientId');

  function scopeParams() {
    if (QUERY_CLIENT_ID) {
      return `clientId=${encodeURIComponent(QUERY_CLIENT_ID)}`;
    }
    const email = initParams && (initParams.loginUser || initParams.login_user || initParams.email);
    return `email=${encodeURIComponent(email || '')}`;
  }

  async function loadActivity() {
    const { start, end } = getDateRange();
    const reserveUrl = `${API_BASE}/reserve/activity?${scopeParams()}&start=${start}&end=${end}`;

    const reserveResp = await fetch(reserveUrl);
    if (!reserveResp.ok) {
      document.getElementById('activityPanel').innerHTML =
        '<div style="padding: 32px; color: var(--negative); text-align: center;">Failed to load reserve activity.</div>';
      return;
    }
    const data = await reserveResp.json();
    hasOutstandingBalance = !!data.has_outstanding_balance;

    if (hasOutstandingBalance) {
      const loanUrl = `${API_BASE}/loan/activity?${scopeParams()}&start=${start}&end=${end}`;
      try {
        const loanResp = await fetch(loanUrl);
        if (loanResp.ok) {
          loanData = await loanResp.json();
        } else {
          loanData = null;
          hasOutstandingBalance = false;
        }
      } catch (err) {
        console.error('loan fetch failed:', err);
        loanData = null;
        hasOutstandingBalance = false;
      }
    } else {
      loanData = null;
    }

    currentData = data;          // set before renderKpis so the reserve KPI path can read currentData.kpis
    renderKpis(currentTab);
    renderActivity(data);
  }

  function renderKpis(tab) {
    const strip = document.getElementById('kpiStrip');
    if (!strip) return;

    if (tab === 'loan' && loanData && loanData.kpis) {
      const k = loanData.kpis;
      const rateStr = (k.interest_rate != null) ? `${k.interest_rate}%` : '—';
      strip.innerHTML = `
        <div class="kpi-card">
          <div class="kpi-label">Amount Owed</div>
          <div class="kpi-value">${fmtMoney(Math.abs(k.amount_owed || 0))}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Interest Rate</div>
          <div class="kpi-value">${rateStr}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Interest Charged LTD</div>
          <div class="kpi-value">${fmtMoney(k.interest_charged_ltd)}</div>
        </div>
      `;
      return;
    }

    // Default: cash/escrow reserve KPI strip — matches the original static markup.
    const k = (currentData && currentData.kpis) || {};
    strip.innerHTML = `
      <div class="kpi-card">
        <div class="kpi-label">Escrow Reserve</div>
        <div class="kpi-value" id="kpiEscrow">${fmtMoney(k.escrow_reserve)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Cash Reserve</div>
        <div class="kpi-value" id="kpiCash">${fmtMoney(k.cash_reserve)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total Reserve</div>
        <div class="kpi-value" id="kpiTotal">${fmtMoney(k.total_reserve)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Available for Release</div>
        <div class="kpi-value" id="kpiAvailable">${fmtMoney(k.available_for_release)}</div>
        <div class="kpi-cta">
          <button class="btn btn-primary" id="btnRequestRelease">Request Release &rarr;</button>
        </div>
      </div>
    `;
    const btn = strip.querySelector('#btnRequestRelease');
    if (btn) btn.addEventListener('click', () => navigateParent('#Page:OperFi_Wallet_New'));
  }

  document.getElementById('dateRange').addEventListener('change', loadActivity);
  function exportUrl(format) {
    const { start, end } = getDateRange();
    const tab = document.querySelector('.tab.active')?.dataset.tab || 'cash';
    if (tab === 'loan') {
      return `${API_BASE}/loan/export/${format}?${scopeParams()}&start=${start}&end=${end}`;
    }
    return `${API_BASE}/reserve/export/${format}?${scopeParams()}&start=${start}&end=${end}&tab=${tab}`;
  }
  document.getElementById('exportCsv').addEventListener('click', () => window.open(exportUrl('csv')));
  document.getElementById('exportPdf').addEventListener('click', () => window.open(exportUrl('pdf')));

  // Bootstrap: getInitParams() returns a Promise in production. Resolve it
  // once, cache to module-scope, then kick off the first load. Defensive
  // duck-typing handles older SDK builds that returned the params sync.
  function bootstrap() {
    function onParams(p) {
      initParams = p || {};
      loadActivity();
    }
    function onErr(err) {
      console.error('getInitParams failed:', err);
      // If admin override is in URL, we can still load without the SDK params.
      if (QUERY_CLIENT_ID) {
        initParams = {};
        loadActivity();
        return;
      }
      document.getElementById('activityPanel').innerHTML =
        '<div style="padding: 32px; color: var(--negative); text-align: center;">Could not initialize widget. Reload the page or contact OperFi.</div>';
    }
    try {
      const result = ZOHO.CREATOR.UTIL.getInitParams();
      if (result && typeof result.then === 'function') {
        result.then(onParams).catch(onErr);
      } else {
        onParams(result);
      }
    } catch (e) {
      onErr(e);
    }
  }

  bootstrap();
</script>
</body>
</html>
