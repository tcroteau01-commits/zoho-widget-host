<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OperFi — Sales Pipeline</title>
<!--
  OperFi Sales workspace widget (Creator widget, GitHub Pages hosted).
  Built from the Sales view of persona-mockups.html. Pipeline-first:
  the rep sees their book, current stage, what Underwriting is waiting on,
  read-only estimated terms, and can nudge prospects / request docs / add notes.
  Persona guardrails (mirrors the mockup): NO approve/decline, NO fraud/UCC
  internals, NO credit-decision editing.
  Pure logic on window.OFS (unit-tested). Demo data when not embedded in Creator
  (sample pipeline); live reads/writes go through the Creator SDK when present.
  Field link-names verbatim from OperFi_Client_Onboarding.ds.
-->
<style>
:root {
  --of-beige: #f0efe9; --of-beige-soft: #fafaf6; --of-beige-line: #e6e3da;
  --of-charcoal: #272727; --of-charcoal-soft: #444; --of-gray-500: #888; --of-gray-700: #555; --of-gray-100: #f5f5f0;
  --of-orange: #e8a020; --of-green: #2e7d32; --of-green-text: #1f6321; --of-green-soft: #e3f4e3;
  --of-amber: #f5a623; --of-amber-text: #b86e00; --of-amber-soft: #fff8e1;
  --of-red: #c62828; --of-red-text: #a31818; --of-red-soft: #fde4e4;
  --of-blue-text: #1a5fb4; --of-blue-soft: #e3edfb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: var(--of-beige); color: var(--of-charcoal); min-height: 100vh; }
.page { max-width: 1280px; margin: 0 auto; padding: 16px 22px 80px; }

/* topbar */
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding: 4px 0 16px; }
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.brand .logo span { color: var(--of-orange); }
.brand .tag { font-size: 11px; color: var(--of-gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
.whoami { font-size: 12px; color: var(--of-gray-700); }
.whoami b { color: var(--of-charcoal); }

.banner { display: none; border-radius: 10px; padding: 9px 14px; margin-bottom: 14px; font-size: 12.5px; line-height: 1.5; }
.banner.show { display: block; }
.banner.info { background: var(--of-blue-soft); color: var(--of-blue-text); }
.banner.warn { background: var(--of-amber-soft); color: var(--of-amber-text); }
.banner.demo { background: var(--of-charcoal); color: rgba(255,255,255,0.92); }
.banner.demo b { color: var(--of-orange); }

/* buttons */
.btn { background: var(--of-charcoal); color: #fff; border: none; border-radius: 7px; padding: 8px 15px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.3px; }
.btn.ghost { background: #fff; border: 1px solid var(--of-beige-line); color: var(--of-charcoal); }
.btn.orange { background: var(--of-orange); }
.btn.sm { padding: 5px 11px; font-size: 11px; }
.btn:disabled { opacity: 0.5; cursor: default; }

/* KPI */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
@media (max-width: 760px){ .kpi-row { grid-template-columns: 1fr 1fr; } }
.kpi { background: #fff; border: 1px solid var(--of-beige-line); border-radius: 12px; padding: 15px 18px; position: relative; overflow: hidden; }
.kpi::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--of-orange); }
.kpi.good::before { background: var(--of-green); } .kpi.warn::before { background: var(--of-amber); }
.kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--of-gray-500); font-weight: 700; margin-bottom: 6px; }
.kpi-value { font-size: 25px; font-weight: 700; letter-spacing: -0.4px; line-height: 1; }
.kpi-value.good { color: var(--of-green-text); } .kpi-value.warn { color: var(--of-amber-text); }
.kpi-sub { font-size: 11px; color: var(--of-gray-700); margin-top: 6px; line-height: 1.4; }

/* cards */
.card { background: #fff; border: 1px solid var(--of-beige-line); border-radius: 12px; padding: 18px 22px; margin-bottom: 14px; }
.card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; padding-bottom: 10px; margin-bottom: 14px; border-bottom: 2px solid var(--of-orange); display: flex; justify-content: space-between; align-items: center; }
.card-title .count { color: var(--of-gray-500); font-weight: 700; }

/* pipeline list */
.pipe-search { width: 100%; box-sizing: border-box; border: 1px solid var(--of-beige-line); border-radius: 8px; padding: 9px 12px; font-family: inherit; font-size: 13px; margin-bottom: 10px; background: #fff; }
.list-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border: 1px solid var(--of-beige-line); border-radius: 10px; margin-bottom: 8px; background: #fff; cursor: pointer; }
.list-row:hover, .list-row.active { border-color: var(--of-orange); }
.list-row.active { box-shadow: 0 0 0 2px rgba(232,160,32,0.18); }
.lr-name { font-weight: 700; font-size: 13.5px; }
.lr-sub { font-size: 11.5px; color: var(--of-gray-500); margin-top: 2px; }
.lr-right { text-align: right; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

/* hero */
.hero { background: var(--of-charcoal); color: #fff; border-radius: 14px; padding: 20px 24px; display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: center; margin-bottom: 14px; }
.hero-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: rgba(255,255,255,0.5); font-weight: 700; }
.hero-name { font-size: 23px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.1; margin-top: 4px; }
.hero-meta { display: flex; gap: 12px; font-size: 13px; color: rgba(255,255,255,0.7); flex-wrap: wrap; margin-top: 6px; }
.hero-meta .sep { color: rgba(255,255,255,0.3); } .hero-meta .key { color: var(--of-orange); font-weight: 600; }
.decision-state-pill { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 6px 12px; border-radius: 6px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.15); }
.decision-state-pill.need-review { background: rgba(245,166,35,0.18); color: #fbc77f; border-color: rgba(245,166,35,0.3); }
.decision-state-pill.good { background: rgba(46,125,50,0.2); color: #6dcf6d; border-color: rgba(46,125,50,0.3); }
.decision-state-pill.bad { background: rgba(198,40,40,0.2); color: #ff7a7a; border-color: rgba(198,40,40,0.3); }

/* stepper */
.stepper { display: flex; align-items: center; gap: 0; margin: 4px 0 6px; }
.step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
.step .node { width: 30px; height: 30px; border-radius: 50%; background: #fff; border: 2px solid var(--of-beige-line); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--of-gray-500); z-index: 2; }
.step.done .node { background: var(--of-green); border-color: var(--of-green); color: #fff; }
.step.current .node { background: var(--of-orange); border-color: var(--of-orange); color: #fff; box-shadow: 0 0 0 4px rgba(232,160,32,0.2); }
.step .slabel { font-size: 11px; font-weight: 600; margin-top: 7px; text-align: center; color: var(--of-gray-700); }
.step.current .slabel { color: var(--of-charcoal); font-weight: 700; }
.step::before { content: ''; position: absolute; top: 14px; left: -50%; width: 100%; height: 2px; background: var(--of-beige-line); z-index: 1; }
.step:first-child::before { display: none; }
.step.done::before, .step.current::before { background: var(--of-green); }

/* check rows */
.chk { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px dashed var(--of-beige-line); font-size: 13px; }
.chk:last-child { border-bottom: none; }
.chk .mark { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; }
.mark.bad { background: var(--of-red); } .mark.ok { background: var(--of-green); }
.chk-body { flex: 1; } .chk-body .lbl { font-weight: 600; } .chk-body .det { font-size: 12px; color: var(--of-gray-700); margin-top: 2px; line-height: 1.45; }

/* rate box */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 760px){ .grid2 { grid-template-columns: 1fr; } }
.rate-box { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.rate-item { text-align: center; padding: 14px 8px; background: var(--of-beige-soft); border-radius: 10px; }
.rate-item .rv { font-size: 22px; font-weight: 800; }
.rate-item .rl { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--of-gray-500); font-weight: 700; margin-top: 3px; }

/* pills */
.pill { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.3px; display: inline-block; }
.pill.g { background: var(--of-green-soft); color: var(--of-green-text); }
.pill.a { background: var(--of-amber-soft); color: var(--of-amber-text); }
.pill.r { background: var(--of-red-soft); color: var(--of-red-text); }
.pill.b { background: var(--of-blue-soft); color: var(--of-blue-text); }
.pill.n { background: var(--of-gray-100); color: var(--of-gray-700); }

/* owners list (names only) */
.owner-names { display: flex; flex-direction: column; }
.owner-name { font-size: 13.5px; font-weight: 600; color: var(--of-charcoal); padding: 8px 0; border-bottom: 1px dashed var(--of-beige-line); }
.owner-name:last-child { border-bottom: none; }

/* notes */
.notes { display: flex; flex-direction: column; gap: 10px; }
.note { font-size: 12.5px; border-left: 3px solid var(--of-beige-line); padding: 4px 0 4px 12px; }
.note.uw { border-left-color: var(--of-orange); }
.note.client { border-left-color: var(--of-blue-text); }
.note .who { font-weight: 700; font-size: 11px; }
.note .who .role { font-weight: 600; color: var(--of-gray-500); margin-left: 6px; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px; }
.note .txt { color: var(--of-charcoal-soft); margin-top: 2px; line-height: 1.45; }
.note .when { font-size: 10.5px; color: var(--of-gray-500); margin-top: 2px; }
.muted { color: var(--of-gray-500); }
.note-input { width: 100%; border: 1px solid var(--of-beige-line); border-radius: 8px; padding: 9px 11px; font-family: inherit; font-size: 12.5px; resize: vertical; min-height: 56px; }
.hint { font-size: 11px; color: var(--of-gray-500); margin-top: 8px; line-height: 1.5; }
.empty { text-align: center; color: var(--of-gray-500); padding: 40px 10px; font-size: 13px; }
.toast { font-size: 12px; margin-top: 8px; min-height: 16px; }
.toast.ok { color: var(--of-green-text); } .toast.err { color: var(--of-red-text); }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="brand"><div class="logo">Oper<span>Fi</span></div><div class="tag">Sales · Pipeline</div></div>
    <div class="whoami">Viewing as <b id="repName">—</b></div>
  </div>

  <div class="banner" id="banner"></div>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="card">
    <div class="card-title">My Pipeline <span class="count" id="pipeCount"></span></div>
    <input type="search" id="pipeSearch" class="pipe-search" placeholder="Search by USDOT or business name…" autocomplete="off">
    <div id="pipeline"><div class="empty">Loading your pipeline…</div></div>
    <div id="pipeNoMatch" class="empty" style="display:none">No applications match your search.</div>
  </div>

  <div id="detail"></div>

</div>

<script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script src="https://app.operfi.com/operfi-impersonate.js?v=2"></script>
<script src="https://app.operfi.com/pdfjs/pdf.min.js?v=2"></script>
<script src="https://app.operfi.com/operfi-docviewer.js?v=4"></script>
<script>
/*
 * OperFi Sales Pipeline widget — testable logic on window.OFS.
 * Field link-names verbatim from OperFi_Client_Onboarding.ds.
 */
(function (global) {
'use strict';

// ── Config ───────────────────────────────────────────────────────────────────
var RPT = { application: 'Application_Report', document: 'Document_Report', review: 'Underwriting_Review_Report' };
var FORM = { document: 'Document', application: 'Application' };
var APPLICATION_LOOKUP = 'Application';       // child → Application lookup (hand-add in Creator)
// How a rep "owns" an application. No dedicated field ships in the .ds; default to a hand-add
// 'Sales_Rep' field (mirrors how Underwriting uses 'Assigned_Underwriter'). Falls back to showing
// the whole book if the field/criteria isn't present yet.
var SALES_ATTR = global.OPERFI_SALES_ATTR || 'Sales_Rep';
var SALES_NOTES_FIELD = 'Sales_Notes';        // multiline on Application (hand-add in Creator)
var API_BASE = global.OPERFI_SALES_API_BASE || 'https://operfi-broker-api.onrender.com';
var NOTIFY_PATH = '/notify-client';           // POST { usdot, application_id, kind } → emails prospect (confirm with Tom)

// The data-backed pipeline stages (each maps to a real Application_Status value).
var STEPS = ['Submitted', 'In Review', 'Underwriting', 'Approved', 'Signed'];
var STAGE_INDEX = { 'New': 0, 'In Review': 1, 'Docs Requested': 2, 'Underwriting': 2, 'Approved': 3, 'Signed': 4, 'Declined': 3, 'Abandoned': 0 };

// ── Pure logic (unit-tested) ───────────────────────────────────────────────────
function num(v){ var n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?'':n; }

// Map an Application_Status (+ optional review) onto the stepper.
function deriveStage(application, review) {
  var st = (application && application.Application_Status) || 'New';
  var idx = STAGE_INDEX.hasOwnProperty(st) ? STAGE_INDEX[st] : 0;
  return {
    status: st,
    index: idx,
    label: STEPS[idx] || st,
    terminal: st === 'Declined' || st === 'Abandoned',
    actionNeeded: st === 'Docs Requested'
  };
}

// Pipeline list pill ({cls,label}) for a status.
function statusPill(status) {
  switch (status) {
    case 'Docs Requested': return { cls: 'a', label: 'Docs Needed' };
    case 'In Review':      return { cls: 'b', label: 'In Review' };
    case 'Underwriting':   return { cls: 'b', label: 'Underwriting' };
    case 'Approved':       return { cls: 'g', label: 'Approved' };
    case 'Signed':         return { cls: 'g', label: 'Signed' };
    case 'Declined':       return { cls: 'r', label: 'Declined' };
    case 'Abandoned':      return { cls: 'n', label: 'Abandoned' };
    default:               return { cls: 'n', label: status || 'New' };
  }
}

function isClosed(status){ return status === 'Declined' || status === 'Abandoned' || status === 'Signed'; }

// KPI tiles from the rep's book.
function computeKPIs(apps) {
  apps = apps || [];
  function n(pred){ return apps.filter(pred).length; }
  return {
    openApps:     n(function(a){ return !isClosed(a.Application_Status); }),
    actionNeeded: n(function(a){ return a.Application_Status === 'Docs Requested'; }),
    approved:     n(function(a){ return a.Application_Status === 'Approved'; }),
    signed:       n(function(a){ return a.Application_Status === 'Signed'; })
  };
}

// "What UW is waiting on" — Document records not yet received/verified.
function isPendingDoc(status){ return !/^(received|verified|approved|complete|on file)$/i.test(String(status || '').trim()); }
function pendingDocs(documents) {
  return (documents || []).map(function (d) {
    if (Array.isArray(d)) return { type: d[0], source: d[1], status: d[2] };
    return { type: d.Document_Type || 'Document', source: d.Source || '—', status: d.Status || 'Requested' };
  }).filter(function (d) { return isPendingDoc(d.status); });
}

// Document checklist — SAME rules as the client doc portal + underwriting tool, so Sales sees
// the full expected list with the prospect's uploaded Document records matched in by type.
var BASE_DOCS = [
  { key:'factoring_agreement', label:'OperFi Factoring Agreement',  type:'Signed Agreement' },
  { key:'noa',                 label:'OperFi Notice of Assignment', type:'NOA' },
  { key:'operating_authority', label:'Operating Authority',         type:'Operating Authority' },
  { key:'insurance',           label:'Insurance Certificate',       type:'Insurance Certificate' },
  { key:'voided_check',        label:'Voided Check (printed company name)', type:'Voided Check' },
  { key:'drivers_license',     label:"Driver's License (all owners)", type:'Drivers License' },
  { key:'w9',                  label:'W-9',                          type:'W-9' }
];
function requiredDocs(application) {
  application = application || {};
  var ft = String(application.Business_Formation_Type || application.formationType || '').toLowerCase();
  var vet = String(application.Veteran || application.Veteran_Status || application.veteran || '').toLowerCase();
  var list = BASE_DOCS.slice();
  if (/sole|proprietor|\bdba\b/.test(ft)) {
    list.push({ key:'utility_bill', label:'Utility Bill (current address)', type:'Utility Bill' });
    list.push({ key:'ssn_card',     label:'Social Security Card',           type:'Social Security Card' });
  } else if (/llc|corp|partnership/.test(ft)) {
    list.push({ key:'formation', label:'Formation Documents', type:'Articles of Formation' });
  }
  if (vet === 'yes' || vet === 'true' || vet === 'veteran') {
    list.push({ key:'proof_of_service', label:'Proof of Service', type:'Proof of Service' });
  }
  return list;
}
function docType(d){ return Array.isArray(d) ? d[0] : (d && (d.Document_Type || d.type)); }
function docStatus(d){ return Array.isArray(d) ? d[2] : (d && (d.Status || d.status)); }
function docUrl(d){ return (Array.isArray(d) ? d[3] : (d && (d.fileUrl || d.link || d.url))) || ''; }
function normType(t){ return String(t == null ? '' : t).trim().toLowerCase(); }
function isUploadedStatus(s){ return !isPendingDoc(s); }
function statusRank(s){ s = String(s || '').trim().toLowerCase(); if (s === 'verified') return 3; if (isUploadedStatus(s)) return 2; if (s === 'rejected') return 1; return 0; }
function reconcileDocs(required, documents) {
  required = required || []; documents = documents || [];
  var byType = {};
  documents.forEach(function (d) {
    var t = normType(docType(d)), st = docStatus(d) || '', cur = byType[t];
    if (!cur || statusRank(st) > statusRank(cur.status)) byType[t] = { status: st, link: docUrl(d) };
  });
  var checklist = required.map(function (item) {
    var u = byType[normType(item.type)];
    return {
      key:item.key, label:item.label, type:item.type,
      status: u ? u.status : 'Needed',
      uploaded: !!u && isUploadedStatus(u.status),
      verified: !!u && /verified/i.test(String(u.status)),
      rejected: !!u && /rejected/i.test(String(u.status)),
      link: u ? (u.link || '') : ''
    };
  });
  var reqTypes = {}; required.forEach(function (i) { reqTypes[normType(i.type)] = true; });
  var extras = documents.filter(function (d) { return !reqTypes[normType(docType(d))] && isUploadedStatus(docStatus(d)); })
    .map(function (d) { return { label: docType(d) || 'Document', status: docStatus(d) || 'Received', link: docUrl(d) }; });
  return {
    checklist: checklist, extras: extras,
    uploadedCount: checklist.filter(function (c) { return c.uploaded; }).length,
    total: checklist.length
  };
}

// Read-only estimate for setting client expectations (NOT a confirmed offer).
function estTerms(application) {
  application = application || {};
  var rate = application.Factoring_Rate, limit = application.Purchase_Limit;
  function pct(v){ if (v == null || v === '') return '—'; return /%/.test(String(v)) ? String(v) : (v + '%'); }
  function money(v){ if (v == null || v === '') return '—'; return /^\$/.test(String(v)) ? String(v) : ('$' + v); }
  return { rate: pct(rate), limit: money(limit), funding: 'Next-day' };
}

// Filter the book to the logged-in rep. Empty rep → whole list (admin / demo).
function filterMyPipeline(apps, rep, attrField) {
  attrField = attrField || SALES_ATTR;
  if (!rep) return (apps || []).slice();
  var r = String(rep).trim().toLowerCase();
  return (apps || []).filter(function (a) { return String(a[attrField] || '').trim().toLowerCase() === r; });
}

// Append a timestamped sales note to the Application's Sales_Notes field (non-destructive).
function buildNotePayload(application, noteText, author, stamp) {
  var prev = (application && application[SALES_NOTES_FIELD]) || '';
  var line = '[' + (stamp || '') + '] ' + (author || 'Sales') + ': ' + (noteText || '');
  var out = {};
  out[SALES_NOTES_FIELD] = prev ? (prev + '\n' + line) : line;
  return out;
}

// Build a Document "requested" record (staff asking the prospect for a doc).
function buildDocRequestPayload(appId, docType) {
  var p = { Document_Type: docType || '', Status: 'Requested', Source: 'Staff Request' };
  if (appId != null) p[APPLICATION_LOOKUP] = appId;
  return p;
}

var OFS = {
  deriveStage: deriveStage, statusPill: statusPill, computeKPIs: computeKPIs,
  pendingDocs: pendingDocs, isPendingDoc: isPendingDoc, requiredDocs: requiredDocs, reconcileDocs: reconcileDocs, estTerms: estTerms,
  filterMyPipeline: filterMyPipeline, buildNotePayload: buildNotePayload,
  buildDocRequestPayload: buildDocRequestPayload, docViewButton: docViewButton,
  SALES_ATTR: SALES_ATTR, SALES_NOTES_FIELD: SALES_NOTES_FIELD, APPLICATION_LOOKUP: APPLICATION_LOOKUP, STEPS: STEPS
};
global.OFS = OFS;

// ── Demo data (used when not embedded in Creator) ──────────────────────────────
var DEMO_REP = 'Jordan Park';
var DEMO_PIPELINE = [
  { ID: 'UW-2026-0418', Business_Name: 'Brennan Eslinger Trucking LLC', Authority_Type: 'Carrier', USDOT: '4366362',
    Application_Status: 'Docs Requested', Submitted_At: 'Jun 8, 2026', Sales_Rep: 'Jordan Park', Assigned_Underwriter: 'M. Reyes',
    loc: 'Glendale, AZ', Factoring_Rate: '3.00%', Purchase_Limit: '$30,000',

// ── LIVE detection ─────────────────────────────────────────────────────────────
var LIVE = (typeof ZOHO !== 'undefined') && !!(ZOHO && ZOHO.CREATOR && typeof ZOHO.CREATOR.init === 'function');
function withTimeout(p, ms) {
  return new Promise(function (resolve, reject) {
    var to = setTimeout(function () { reject(new Error('sdk-timeout')); }, ms);
    Promise.resolve(p).then(function (v) { clearTimeout(to); resolve(v); }, function (e) { clearTimeout(to); reject(e); });
  });
}
function getRecords(report, criteria) {
  var cfg = { report_name: report, page: 1, pageSize: 100 };
  if (criteria) cfg.criteria = criteria;
  return ZOHO.CREATOR.DATA.getRecords(cfg).then(function (r) { return (r && r.data) ? r.data : []; }).catch(function () { return []; });
}

var STATE = { mode: 'demo', rep: '', apps: [], selected: null };

// Resolve the logged-in rep (best-effort; demo rep when standalone).
function resolveRep() {
  if (!LIVE) return Promise.resolve(DEMO_REP);
  try {
    var p = (ZOHO.CREATOR.UTIL && ZOHO.CREATOR.UTIL.getInitParams) ? ZOHO.CREATOR.UTIL.getInitParams() : null;
    return Promise.resolve(p).then(function (params) {
      return (params && (params.loginUser || params.login_user)) || '';
    }).catch(function () { return ''; });
  } catch (e) { return Promise.resolve(''); }
}

// Load the rep's pipeline. Filters by SALES_ATTR when present; degrades to the whole book.
function loadPipeline() {
  // Backend read (the Creator SDK won't init in the widget). Optional rep scoping via
  // window.OPERFI_SALES_REP; default shows the whole book (no SDK login to resolve a rep).
  if (typeof fetch !== 'function') return Promise.resolve({ mode: 'demo', rep: DEMO_REP, apps: DEMO_PIPELINE.slice() });
  var rep = global.OPERFI_SALES_REP || '';
  var url = API_BASE + '/sales-pipeline' + (rep ? ('?rep=' + encodeURIComponent(rep)) : '');
  return fetch(url).then(function (r) { return r.ok ? r.json() : null; }).then(function (j) {
    if (!j || !j.applications) return { mode: 'demo', rep: DEMO_REP, apps: DEMO_PIPELINE.slice() };
    return { mode: 'live', rep: rep, apps: j.applications, unfiltered: !rep };
  }).catch(function () { return { mode: 'demo', rep: DEMO_REP, apps: DEMO_PIPELINE.slice() }; });
}

// Load the supporting records for one application (documents + UW note).
function loadDetail(app) {
  if (STATE.mode === 'demo' || typeof fetch !== 'function') {
    return Promise.resolve({ documents: app.documents || [], owners: app.owners || [], physicalAddress: app.loc || app.Physical_Address || '', uwNotes: app.UW_Notes || '', uwWhen: app.UW_When || '', clientMessage: app.Client_Message || '', salesNotes: app.Sales_Notes || '' });
  }
  // Reuse /application-by-usdot (returns documents + owners + the latest Underwriting_Review).
  var usdot = String(app.USDOT || '');
  return fetch(API_BASE + '/application-by-usdot?usdot=' + encodeURIComponent(usdot))
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (j) {
      j = j || {};
      var rev = j.review || {}, ap = j.application || {};
      var docs = (j.documents || []).map(function (d) { return [d.Document_Type || 'Document', d.Source || '—', d.Status || 'Requested', d.fileUrl || '']; });
      var owners = (j.owners || []).map(function (o) { return { First_Name1:o.First_Name1, Last_Name1:o.Last_Name1, Title:o.Title, Ownership_Percent:o.Ownership_Percent, Owner_Sequence:o.Owner_Sequence, Birthdate:o.Birthdate, SSN:o.SSN, Phone:o.Phone, Email:o.Email, Address:o.Address }; });
      return { documents: docs, owners: owners, physicalAddress: ap.Physical_Address || ap.loc || app.loc || '', uwNotes: rev.UW_Notes || '', uwWhen: rev.Decision_Date || '', clientMessage: rev.Client_Message || '', salesNotes: app[SALES_NOTES_FIELD] || '' };
    })
    .catch(function () { return { documents: [], owners: [], physicalAddress: app.loc || '', uwNotes: '', uwWhen: '', clientMessage: '', salesNotes: app[SALES_NOTES_FIELD] || '' }; });
}

// Live filter of the pipeline list by USDOT (digits) or business name. Client-side; row indices
// (data-i → STATE.apps) are untouched, so selectApp still resolves correctly.
function filterPipeline(q) {
  q = String(q == null ? '' : q).trim().toLowerCase();
  var qDigits = q.replace(/\D/g, '');
  var shown = 0;
  Array.prototype.forEach.call(el('pipeline').querySelectorAll('.list-row'), function (row) {
    var a = STATE.apps[parseInt(row.getAttribute('data-i'), 10)] || {};
    var usdot = String(a.USDOT || '').replace(/\D/g, '');
    var name = String(a.Business_Name || '').toLowerCase();
    var match = !q || (qDigits && usdot.indexOf(qDigits) !== -1) || (!!name && name.indexOf(q) !== -1);
    row.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  var none = el('pipeNoMatch'); if (none) none.style.display = (q && shown === 0) ? 'block' : 'none';
}

function selectApp(i) {
  var app = STATE.apps[i];
  if (!app) return;
  STATE.selected = i;
  Array.prototype.forEach.call(el('pipeline').querySelectorAll('.list-row'), function (row) {
    row.classList.toggle('active', parseInt(row.getAttribute('data-i'), 10) === i);
  });
  el('detail').innerHTML = '<div class="card"><div class="empty">Loading application…</div></div>';
  loadDetail(app).then(function (d) { renderDetail(app, d); });
}

function renderDetail(app, d) {
  var stage = deriveStage(app);
  var terms = estTerms(app);
  var statePill = stage.terminal
    ? (stage.status === 'Declined' ? '<span class="decision-state-pill bad">✕ Declined</span>' : '<span class="decision-state-pill">Abandoned</span>')
    : (stage.actionNeeded ? '<span class="decision-state-pill need-review">⏳ Docs Needed</span>'
      : (stage.status === 'Approved' ? '<span class="decision-state-pill good">✓ Approved</span>'
        : (stage.status === 'Signed' ? '<span class="decision-state-pill good">✓ Signed</span>'
          : '<span class="decision-state-pill need-review">' + esc(stage.status) + '</span>')));

  var meta = [app.USDOT ? '<span><span class="key">DOT</span> ' + esc(app.USDOT) + '</span>' : '',
    app.loc ? '<span>' + esc(app.loc) + '</span>' : '',
    app.Assigned_Underwriter ? '<span>UW: <b style="color:#fff">' + esc(app.Assigned_Underwriter) + '</b></span>' : '']
    .filter(Boolean).join('<span class="sep">·</span>');

  var stepsHtml = STEPS.map(function (label, idx) {
    var cls = idx < stage.index ? 'done' : (idx === stage.index ? 'current' : '');
    var node = idx < stage.index ? '✓' : (idx + 1);
    return '<div class="step ' + cls + '"><div class="node">' + node + '</div><div class="slabel">' + esc(label) + '</div></div>';
  }).join('');

  // Full document checklist (same rules as the doc portal + underwriting tool): every required
  // doc with its status; uploaded ones show Received/Verified, still-needed ones keep a Nudge.
  var docRec = reconcileDocs(requiredDocs(app), d.documents);
  var docView = function(url, filename){ return docViewButton(url, filename); };
  var docsHtml = docRec.checklist.map(function (c) {
    var det = c.verified ? 'Verified' : (c.uploaded ? 'Received' : (c.rejected ? 'Rejected — re-upload' : 'Needed'));
    var action = c.uploaded ? docView(c.link, c.label) : '<button class="btn ghost sm js-nudge" data-doc="' + esc(c.type) + '">Nudge client</button>';
    return '<div class="chk"><span class="mark ' + (c.uploaded ? 'ok' : 'bad') + '">' + (c.uploaded ? '✓' : '○') + '</span>' +
      '<div class="chk-body"><div class="lbl">' + esc(c.label) + '</div><div class="det">' + det + '</div></div>' + action + '</div>';
  }).join('') +
  docRec.extras.map(function (e) {
    return '<div class="chk"><span class="mark ok">✓</span><div class="chk-body"><div class="lbl">' + esc(e.label) +
      '</div><div class="det">' + esc(e.status) + ' · additional</div></div>' + docView(e.link, e.label) + '</div>';
  }).join('');

  // The underwriter's "Message to client" (Client_Message) — the same note the prospect sees on their
  // portal. Surfaced here so Sales knows what the client has been told (read-only; Sales can't edit it).
  // The note carries a trailing "— <MM/DD/YYYY h:mm AM>" stamp; split it off to show as a "when" line.
  var _cm = String(d.clientMessage || '');
  var _cmM = _cm.match(/\n*—\s(\d{1,2}\/\d{1,2}\/\d{4}\s\d{1,2}:\d{2}\s[AP]M)\s*$/);
  var _cmText = _cmM ? _cm.slice(0, _cmM.index).replace(/\s+$/, '') : _cm;
  var _cmStamp = _cmM ? _cmM[1] : '';
  var clientMsgNote = _cmText
    ? '<div class="note client"><div class="who">Message to client <span class="role">shown on client portal</span></div><div class="txt">' + esc(_cmText) + '</div>' + (_cmStamp ? '<div class="when">' + esc(_cmStamp) + '</div>' : '') + '</div>'
    : '';
  var salesNotesHtml = (d.salesNotes || '').split('\n').filter(Boolean).map(function (ln) {
    return '<div class="note"><div class="txt">' + esc(ln) + '</div></div>';
  }).join('');
  var notesBody = (clientMsgNote + salesNotesHtml) || '<div class="muted" style="font-size:12.5px">No notes yet.</div>';

  // Owners — a simple list of the declared owners' names.
  var owners = d.owners || [];
  var ownersInner = owners.length
    ? '<div class="owner-names">' + owners.map(function (o) {
        var name = ((o.First_Name1 || '') + ' ' + (o.Last_Name1 || '')).trim() || '—';
        return '<div class="owner-name">' + esc(name) + '</div>';
      }).join('') + '</div>'
    : '<div class="muted" style="font-size:12.5px">No owners on record for this application.</div>';
  var ownerCard = '<div class="card"><div class="card-title">Owners <span class="count">' +
    (owners.length ? owners.length + (owners.length === 1 ? ' owner' : ' owners') : '—') + '</span></div>' + ownersInner + '</div>';

  el('detail').innerHTML =
    '<div class="hero"><div class="hero-left"><div class="hero-eyebrow">Application #' + esc(app.ID) + ' · ' + esc(app.Authority_Type || '') + '</div>' +
      '<div class="hero-name">' + esc(app.Business_Name || '') + '</div><div class="hero-meta">' + meta + '</div></div>' +
      '<div>' + statePill + '</div></div>' +

    '<div class="card"><div class="card-title">Where it stands</div><div class="stepper">' + stepsHtml + '</div></div>' +

    ownerCard +

    '<div class="grid2"><div class="card"><div class="card-title">Documents <span class="count">' + docRec.uploadedCount + ' / ' + docRec.total + ' received</span></div>' + docsHtml +
      '<div class="hint">Documents the prospect uploads appear here as Received. Use “Nudge client” on a still-needed item to send a reminder — Sales can’t mark docs received.</div></div>' +

      '<div class="card"><div class="card-title">Estimated Terms <span class="count">from rate engine</span></div><div class="rate-box">' +
        '<div class="rate-item"><div class="rv">' + esc(terms.rate) + '</div><div class="rl">Est. Rate</div></div>' +
        '<div class="rate-item"><div class="rv">' + esc(terms.limit) + '</div><div class="rl">Est. Limit</div></div>' +
        '<div class="rate-item"><div class="rv">' + esc(terms.funding) + '</div><div class="rl">Funding</div></div></div>' +
        '<div class="hint">Estimate only — final terms are set by Underwriting at approval. Use to set expectations, not to confirm a deal.</div></div></div>' +

    '<div class="card"><div class="card-title">Notes &amp; Activity</div><div class="notes" id="notesFeed">' + notesBody + '</div>' +
      '<div style="margin-top:12px"><textarea class="note-input" id="noteInput" placeholder="Add a note for this deal…"></textarea>' +
      '<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn js-addnote">+ Add note</button>' +
      '<button class="btn ghost js-reqdoc">✉ Request document</button></div>' +
      '<div class="toast" id="detailToast"></div></div></div>';

  Array.prototype.forEach.call(el('detail').querySelectorAll('.js-nudge'), function (b) {
    b.addEventListener('click', function () { nudgeClient(app, b.getAttribute('data-doc'), b); });
  });
  el('detail').querySelector('.js-addnote').addEventListener('click', function () { addNote(app); });
  el('detail').querySelector('.js-reqdoc').addEventListener('click', function () { requestDoc(app); });
}

function dToast(kind, msg){ var t = el('detailToast'); if (t) { t.className = 'toast ' + kind; t.textContent = msg; } }

// ── Actions (best-effort live; demo = local + toast) ───────────────────────────
function nudgeClient(app, docType, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Sent ✓'; }
  if (STATE.mode === 'demo' || typeof fetch !== 'function') { dToast('ok', 'Reminder queued to ' + (app.Business_Name || 'client') + (docType ? ' for ' + docType : '') + ' (demo).'); return; }
  fetch(API_BASE + NOTIFY_PATH, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ usdot: app.USDOT, application_id: app.ID, kind: 'doc-reminder', document: docType }) })
    .then(function () { dToast('ok', 'Reminder sent to ' + (app.Business_Name || 'client') + '.'); })
    .catch(function () { dToast('err', 'Could not send the reminder — try again shortly.'); if (btn) { btn.disabled = false; btn.textContent = 'Nudge client'; } });
}

function addNote(app) {
  var input = el('noteInput'); var text = (input && input.value || '').trim();
  if (!text) { dToast('err', 'Type a note first.'); return; }
  var stamp = ''; try { stamp = new Date().toLocaleString(); } catch (e) { stamp = ''; }
  var payload = buildNotePayload(app, text, STATE.rep || 'Sales', stamp);
  // Optimistic UI
  var feed = el('notesFeed'); if (feed) { if (/No notes yet/.test(feed.innerHTML)) feed.innerHTML = '';
    feed.insertAdjacentHTML('beforeend', '<div class="note"><div class="who">' + esc(STATE.rep || 'You') + ' <span class="role">Sales</span></div><div class="txt">' + esc(text) + '</div><div class="when">' + esc(stamp) + '</div></div>'); }
  app[SALES_NOTES_FIELD] = payload[SALES_NOTES_FIELD];
  if (input) input.value = '';
  if (STATE.mode === 'demo' || typeof fetch !== 'function') { dToast('ok', 'Note added (demo).'); return; }
  fetch(API_BASE + '/sales-note', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ application_id: app.ID, sales_notes: payload[SALES_NOTES_FIELD] }) })
    .then(function (r) { return r.json().catch(function () { return {}; }); })
    .then(function (j) { dToast(j && j.ok ? 'ok' : 'err', j && j.ok ? 'Note saved.' : ('Saved locally — could not write Sales_Notes' + ((j && j.detail) ? ' (' + j.detail + ')' : '') + '.')); })
    .catch(function () { dToast('err', 'Saved locally — Sales_Notes write failed.'); });
}

function requestDoc(app) {
  var docType = (typeof prompt === 'function') ? prompt('Document to request from the prospect:') : '';
  if (!docType) return;
  if (STATE.mode === 'demo' || typeof fetch !== 'function') {
    app.documents = (app.documents || []); app.documents.push([docType, 'Staff Request', 'Requested']);
    selectApp(STATE.selected); dToast('ok', 'Requested “' + docType + '” (demo).'); return;
  }
  fetch(API_BASE + '/sales-doc-request', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ application_id: app.ID, document_type: docType }) })
    .then(function (r) { return r.json().catch(function () { return {}; }); })
    .then(function (j) {
      if (j && j.ok) { dToast('ok', 'Requested “' + docType + '”.'); selectApp(STATE.selected); }
      else dToast('err', 'Could not create the request' + ((j && j.detail) ? ': ' + j.detail : '') + '.');
    })
    .catch(function () { dToast('err', 'Could not create the document request.'); });
}

function boot() {
  loadPipeline().then(function (res) {
    STATE.mode = res.mode; STATE.rep = res.rep || (res.mode === 'demo' ? DEMO_REP : '');
    STATE.apps = filterMyPipeline(res.apps, res.unfiltered ? '' : STATE.rep, SALES_ATTR);
    // If a live filtered read fell back to the whole book, keep them all (already unfiltered).
    if (res.unfiltered) STATE.apps = res.apps.slice();
    el('repName').textContent = STATE.rep || (STATE.mode === 'demo' ? DEMO_REP : 'All reps');
    if (STATE.mode === 'demo') setBanner('demo', '<b>DEMO.</b> Showing a sample pipeline — this page isn’t embedded in Creator yet. Live, it loads the applications assigned to you.');
    else if (res.unfiltered) setBanner('warn', 'Showing all applications — add a <b>' + SALES_ATTR + '</b> field on the Application form to scope this to your book.');
    renderKPIs(STATE.apps);
    renderPipeline(STATE.apps);
    var ps = el('pipeSearch'); if (ps && !ps._bound) { ps._bound = true; ps.addEventListener('input', function () { filterPipeline(this.value); }); }
    if (STATE.apps.length) selectApp(0);
  }).catch(function (e) {
    setBanner('warn', 'Could not load the pipeline: ' + esc(e && e.message ? e.message : e));
    el('pipeline').innerHTML = '<div class="empty">Pipeline unavailable.</div>';
  });
}

if (typeof window !== 'undefined' && typeof document !== 'undefined') {
  if (document.readyState === 'loading') window.addEventListener('load', boot); else boot();
}

})(typeof window !== 'undefined' ? window : this);
</script>
</body>
</html>
