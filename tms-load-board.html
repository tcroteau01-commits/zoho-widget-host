<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Load Board</title>
<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script src="https://tcroteau01-commits.github.io/zoho-widget-host/operfi-impersonate.js?v=2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f0efe9; color: #333; min-height: 100vh; }
.page { max-width: 1180px; margin: 0 auto; padding: 20px 24px 60px; }
.head { margin-bottom: 18px; display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }
.title { font-size: 22px; font-weight: 700; color: #272727; letter-spacing: -0.2px; }
.sub { font-size: 12px; color: #888; margin-top: 4px; }
.btn { background: #fff; border: 1px solid #d8d8d8; border-radius: 8px; padding: 11px 22px; font-size: 13px; font-weight: 600; color: #444; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn:hover { border-color: #b8b8b8; background: #fafafa; }
.btn.primary { background: #e8a020; color: #fff; border-color: #e8a020; }
.btn.primary:hover { background: #d49018; border-color: #d49018; }
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.kpi { background: #fff; border: 1px solid #e6e3da; border-radius: 12px; padding: 16px 18px; }
.kpi-num { font-size: 24px; font-weight: 700; color: #272727; letter-spacing: -0.5px; }
.kpi-label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 4px; }
.toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; border: 1px solid #d8d8d8; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: inherit; background: #fff; outline: none; }
.search-input:focus { border-color: #e8a020; box-shadow: 0 0 0 3px rgba(232,160,32,0.12); }
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-pill { border: 1px solid #d8d8d8; background: #fff; border-radius: 20px; padding: 8px 14px; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; }
.filter-pill.active { background: #272727; color: #fff; border-color: #272727; }
.card { background: #fff; border: 1px solid #e6e3da; border-radius: 12px; padding: 6px 0; }
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th { text-align: left; font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px 10px; border-bottom: 1px solid #ececec; }
.tbl tbody tr { border-bottom: 1px solid #f3f1ea; cursor: pointer; }
.tbl tbody tr:hover { background: #fafaf6; }
.tbl td { padding: 14px 16px; vertical-align: middle; font-size: 13px; }
.ld-num { font-weight: 700; color: #272727; }
.muted { color: #999; font-size: 11px; margin-top: 2px; }
.pos { color: #2e7d32; font-weight: 700; }
.neg { color: #c62828; font-weight: 700; }
.chip { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.chip.draft, .chip.available { background: #ececec; color: #777; }
.chip.covered, .chip.dispatched { background: #fff3d6; color: #b8860b; }
.chip.intransit { background: #eef4ec; color: #3a7d44; }
.chip.delivered, .chip.podreceived, .chip.readytosubmit { background: #e8f5e9; color: #2e7d32; }
.chip.submitted { background: #272727; color: #fff; }
.chip.cancelled { background: #f1f1f1; color: #999; text-decoration: line-through; }
.chip.issue { background: #fdecea; color: #c62828; }
.empty { text-align: center; color: #999; padding: 40px 0; }

/* slide-out panel */
.hidden { display: none !important; }
#tms-backdrop { position: fixed; inset: 0; background: rgba(16,24,40,.35); z-index: 9998; }
#tms-slideout { position: fixed; top: 0; right: 0; height: 100%; width: 480px; max-width: 92vw; background: #f0efe9; box-shadow: -12px 0 40px rgba(16,24,40,.18); transform: translateX(100%); transition: transform .25s ease; z-index: 9999; overflow-y: auto; }
#tms-slideout.open { transform: translateX(0); }
#tms-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #272727; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 10000; box-shadow: 0 8px 24px rgba(16,24,40,.3); }

/* read-only detail (moved from the detail page) */
#tms-slideout .vhead { background: #272727; color: #fff; padding: 16px 22px 20px; border-bottom: 3px solid #e8a020; }
#tms-slideout .vhead-top { display: flex; justify-content: space-between; align-items: center; color: #aeb8cc; font-size: 13px; }
#tms-slideout .vlink { cursor: pointer; font-size: 18px; line-height: 1; }
#tms-slideout .vtag { background: #14b8a6; color: #04201c; font-weight: 700; font-size: 11px; letter-spacing: .5px; padding: 3px 9px; border-radius: 6px; }
#tms-slideout .vtitle { font-size: 22px; font-weight: 800; margin-top: 12px; }
#tms-slideout .vsub { color: #aeb8cc; font-size: 12.5px; margin-top: 5px; }
#tms-slideout .vactions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
#tms-slideout .vcards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; background: #f0efe9; }
#tms-slideout .vcard { background: #fff; border: 1px solid #eaecf0; border-radius: 12px; padding: 14px 16px; }
#tms-slideout .vcard.wide { grid-column: 1 / -1; }
#tms-slideout .vlabel { font-size: 11px; color: #667085; letter-spacing: .5px; font-weight: 700; margin-bottom: 10px; }
#tms-slideout .vrates { display: flex; gap: 10px; }
#tms-slideout .vstat { flex: 1; background: #f9fafb; border-radius: 9px; padding: 10px; }
#tms-slideout .vstat span { font-size: 10.5px; color: #667085; display: block; }
#tms-slideout .vstat b { font-size: 17px; color: #101828; }
#tms-slideout .vstat.good { background: #ecfdf3; } #tms-slideout .vstat.good span { color: #067647; } #tms-slideout .vstat.good b { color: #067647; }
#tms-slideout .vname { font-size: 14px; font-weight: 600; color: #101828; }
#tms-slideout .vrow { font-size: 12.5px; color: #101828; margin-top: 4px; }
#tms-slideout .muted { color: #667085; font-size: 12.5px; }
#tms-slideout #v-stepper { margin-top: 16px; }
#tms-slideout .chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 6px; }
#tms-slideout .chip { display: inline-block; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px; }
#tms-slideout .chip.done { background: #0e3d36; color: #5eead4; cursor: pointer; }
#tms-slideout .chip.current { background: #14b8a6; color: #04201c; font-weight: 800; box-shadow: 0 0 0 3px rgba(20,184,166,.25); }
#tms-slideout .chip.upcoming { background: #2a3550; color: #aeb8cc; cursor: pointer; }
#tms-slideout .chip.locked { background: #2a3550; color: #8b97ad; }
#tms-slideout .vbtn { border: 0; font-weight: 600; font-size: 13px; padding: 9px 16px; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; }
#tms-slideout .vbtn.light { background: #fff; color: #1f2a44; }
#tms-slideout .vbtn.dark { background: #33425f; color: #fff; }

/* ===== Mobile (<=640px): card reflow + stacking ===== */
@media (max-width: 640px) {
  html, body { overflow-x: hidden; }
  .page { padding: 14px 12px 40px; max-width: 100%; }
  .head { flex-direction: column; align-items: stretch; gap: 12px; }
  .head .btn.primary { width: 100%; }

  /* P2 — stack KPIs + toolbar */
  .kpi-row { grid-template-columns: 1fr !important; gap: 8px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-input { min-width: 0; width: 100%; }

  /* P6 — tap targets + no iOS zoom */
  .btn, .filter-pill { min-height: 44px; }
  input, select, textarea, .search-input { font-size: 16px; }

  /* P3 — board table reflows to cards */
  .tbl thead { display: none; }
  .tbl, .tbl tbody, .tbl tr, .tbl td { display: block; width: 100%; }
  .tbl tbody tr {
    border-bottom: 1px solid #f3f1ea; padding: 8px 14px;
  }
  .tbl td {
    display: flex; justify-content: space-between; gap: 12px;
    text-align: right !important; padding: 5px 0;
  }
  .tbl td[data-label]::before {
    content: attr(data-label); font-weight: 700; color: #999;
    text-align: left; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;
  }

  /* P5 — slide-out near full screen + stack its cards */
  #tms-slideout { width: 100% !important; max-width: 100% !important; }
  #tms-slideout .vcards { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>
<div class="page">
  <div class="head">
    <div>
      <div class="title">Load Board</div>
      <div class="sub" id="sub">Loading…</div>
    </div>
    <button class="btn primary" id="new-load-btn">+ New Load</button>
  </div>
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-num" id="kpi-active">–</div><div class="kpi-label">Active Loads</div></div>
    <div class="kpi"><div class="kpi-num" id="kpi-revenue">–</div><div class="kpi-label">Total Invoice</div></div>
    <div class="kpi"><div class="kpi-num" id="kpi-margin">–</div><div class="kpi-label">Total Margin</div></div>
    <div class="kpi"><div class="kpi-num" id="kpi-tosubmit">–</div><div class="kpi-label">Ready to Submit</div></div>
  </div>
  <div class="toolbar">
    <input class="search-input" id="search" placeholder="Search load #, customer, carrier…">
    <div class="filter-pills" id="pills"></div>
  </div>
  <div id="bulk-bar" class="hidden" style="display:flex;gap:8px;align-items:center;margin:8px 0">
    <span id="bulk-count" class="muted"></span>
    <select id="bulk-status">
      <option value="">Set status…</option>
      <option>Draft</option><option>Available</option><option>Covered</option>
      <option>Dispatched</option><option>In Transit</option><option>Delivered</option>
    </select>
    <button class="btn" id="bulk-apply">Apply</button>
    <button class="btn" id="bulk-cancel">Cancel selected</button>
  </div>
  <div class="card">
    <table class="tbl">
      <thead><tr><th style="width:28px"></th><th>Load</th><th>Status</th><th>Customer</th><th>Lane</th><th>Carrier</th><th style="text-align:right">Invoice</th><th style="text-align:right">Margin</th></tr></thead>
      <tbody id="board-body"><tr><td colspan="8" class="empty">Loading loads…</td></tr></tbody>
    </table>
  </div>
</div>
<div id="tms-backdrop" class="hidden"></div>
<div id="tms-slideout"><div id="tms-slideout-body"></div></div>
<div id="tms-toast" class="hidden"></div>
<script>
var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
var brokerEmail = '';
var allLoads = [];
var activeStatus = 'all';
var searchTerm = '';

var STATUSES = ['all', 'Draft', 'Available', 'Covered', 'Dispatched', 'In Transit', 'Delivered', 'POD Received', 'Ready to Submit', 'Submitted', 'Cancelled'];

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function money(n){ var v = Number(n)||0; return (v<0?'-$':'$') + Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0}); }
function chipClass(s){ return 'chip ' + String(s||'').toLowerCase().replace(/[^a-z]/g,''); }
window.chipClass = chipClass;

function renderPills() {
  var box = document.getElementById('pills');
  if (!box) return;
  box.innerHTML = '';
  STATUSES.forEach(function(s){
    var b = document.createElement('button');
    b.className = 'filter-pill' + (s === activeStatus ? ' active' : '');
    b.textContent = s === 'all' ? 'All' : s;
    b.onclick = function(){ activeStatus = s; renderPills(); applyFilters(); };
    box.appendChild(b);
  });
}

function applyFilters() {
  selectedLoadIds = []; toggleBulkBar();
  var rows = allLoads.filter(function(l){
    if (activeStatus === 'all') { if (l.status === 'Cancelled') return false; }
    else if (l.status !== activeStatus) { return false; }
    if (searchTerm) {
      var hay = (l.load_number + ' ' + l.customer_name + ' ' + l.carrier_name + ' ' + l.lane).toLowerCase();
      if (hay.indexOf(searchTerm.toLowerCase()) === -1) return false;
    }
    return true;
  });
  renderRows(rows);
}

function renderRows(rows) {
  var body = document.getElementById('board-body');
  if (!body) return;
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="8" class="empty">No loads match.</td></tr>';
    return;
  }
  body.innerHTML = '';
  rows.forEach(function(l){
    var tr = document.createElement('tr');
    tr.onclick = function(){ selectLoad(l.id); };
    var mcls = (Number(l.margin)||0) >= 0 ? 'pos' : 'neg';
    tr.innerHTML =
      '<td data-label=""><input type="checkbox" class="row-checkbox" data-load-id="' + esc(l.id) + '"></td>' +
      '<td data-label="Load"><div class="ld-num">' + esc(l.load_number) + '</div></td>' +
      '<td data-label="Status"><span class="' + chipClass(l.status) + '">' + esc(l.status) + '</span></td>' +
      '<td data-label="Customer">' + esc(l.customer_name) + '</td>' +
      '<td data-label="Lane">' + esc(l.lane) + '</td>' +
      '<td data-label="Carrier">' + esc(l.carrier_name || '—') + '</td>' +
      '<td style="text-align:right" data-label="Invoice">' + money(l.invoice_amount) + '</td>' +
      '<td style="text-align:right" class="' + mcls + '" data-label="Margin">' + money(l.margin) + '</td>';
    var cb = tr.querySelector('.row-checkbox');
    cb.addEventListener('click', function(e){ e.stopPropagation(); });
    cb.addEventListener('change', function(){ onRowCheck(l.id, cb.checked); });
    body.appendChild(tr);
  });
}

function renderBoard(payload) {
  allLoads = (payload && payload.loads) || [];
  var active = allLoads.filter(function(l){ return l.status !== 'Submitted' && l.status !== 'Draft' && l.status !== 'Cancelled'; });
  var toSubmit = allLoads.filter(function(l){ return l.status === 'POD Received'; });
  var rev = allLoads.reduce(function(a,l){ return a + (Number(l.invoice_amount)||0); }, 0);
  var marg = allLoads.reduce(function(a,l){ return a + (Number(l.margin)||0); }, 0);
  setText('kpi-active', active.length);
  setText('kpi-revenue', money(rev));
  setText('kpi-margin', money(marg));
  setText('kpi-tosubmit', toSubmit.length);
  setText('sub', allLoads.length + ' load' + (allLoads.length === 1 ? '' : 's'));
  applyFilters();
}
function setText(id, v){ var el = document.getElementById(id); if (el) el.textContent = v; }

function selectLoad(loadId) {
  return openSlideout(loadId);
}
function newLoad() {
  try { localStorage.setItem('tmsLoadTarget', JSON.stringify({ load_id: '', mode: 'new', ts: Date.now() })); } catch (e) {}
  try { sessionStorage.removeItem('tmsLoadId'); } catch (e) {}
  navigateToDetail();
}
function portalPageUrl(page) {
  // These widgets are hosted on GH Pages, so window.top is NOT the portal and a
  // bare '#Page:' hash won't reach it. Creator passes the portal origin in the
  // ?serviceOrigin= param; build an absolute URL to the portal's hash route.
  var svc = '';
  try { svc = new URLSearchParams(window.location.search).get('serviceOrigin') || ''; } catch (e) {}
  return svc.replace(/\/+$/, '') + '/#Page:' + page;
}
function navigateToDetail() {
  try { window.top.location.href = portalPageUrl('TMS_Load_Detail'); } catch (e) {}
}

/* ---- read-only slide-out (cards + lifecycle chip stepper) ---- */
function showSlideout(on) {
  var p = document.getElementById('tms-slideout'), b = document.getElementById('tms-backdrop');
  if (!p || !b) return;
  p.classList.toggle('open', !!on);
  b.classList.toggle('hidden', !on);
}
function closeSlideout() { showSlideout(false); }

function openSlideout(loadId) {
  if (!loadId || !brokerEmail) return Promise.resolve();
  showSlideout(true);
  document.getElementById('tms-slideout-body').innerHTML = '<div style="padding:40px;text-align:center;color:#667085">Loading…</div>';
  return fetch(BROKER_API_BASE + '/tms-load?email=' + encodeURIComponent(brokerEmail) + '&id=' + encodeURIComponent(loadId))
    .then(function(r){ return r.json(); })
    .then(function(p){ if (p && p.load) { window._slideoutLoad = p.load; renderView(p.load); } })
    .catch(function(){ document.getElementById('tms-slideout-body').innerHTML = '<div style="padding:40px;text-align:center;color:#b42318">Could not load.</div>'; });
}

function renderView(load) {
  window._slideoutLoad = load;
  var lane = [load.origin, load.destination].filter(Boolean).join(' → ');
  var inv = parseFloat(load.invoice_amount) || 0, pay = parseFloat(load.carrier_pay) || 0;
  var margin = inv ? Math.round((inv - pay) / inv * 1000) / 10 : 0;
  var stops = (load.stops || []).map(function(s, i){
    return '<div class="vrow"><b>' + (i + 1) + ' ' + esc(s.stop_type || '') + '</b> &mdash; ' + esc(s.company_name || '') + ' ' + esc(s.address || '') + ' <span class="muted">' + esc(s.appointment || '') + '</span></div>';
  }).join('') || '<div class="muted">No stops</div>';
  var v = document.getElementById('tms-slideout-body');
  if (!v) return;
  var issue = load.exception_reason
    ? '<span class="chip issue">⚠ ' + esc(load.exception_reason) + '</span>' : '';
  v.innerHTML =
    '<div class="vhead">'
    + '<div class="vhead-top"><span class="vlink" id="v-close">&times;</span><span class="vtag">TMS LOAD</span></div>'
    + '<div class="vtitle">' + esc(load.load_number || '') + ' · ' + esc(load.customer_name || '') + '</div>'
    + '<div class="vsub">' + esc(lane) + '</div>'
    + '<div id="v-stepper"></div>'
    + (issue ? '<div class="vactions" style="margin-top:8px">' + issue + '</div>' : '')
    + '<div class="vactions" id="v-actions"></div>'
    + '</div>'
    + '<div class="vcards">'
    +   '<div class="vcard wide"><div class="vlabel">RATES &amp; MARGIN</div><div class="vrates">'
    +     '<div class="vstat"><span>CUSTOMER</span><b>' + money(inv) + '</b></div>'
    +     '<div class="vstat"><span>CARRIER</span><b>' + money(pay) + '</b></div>'
    +     '<div class="vstat good"><span>MARGIN</span><b>' + margin + '%</b></div>'
    +   '</div></div>'
    +   '<div class="vcard"><div class="vlabel">CUSTOMER</div><div class="vname">' + esc(load.customer_name || '') + '</div><div class="muted">Ref# ' + esc(load.customer_reference || '') + ' · ' + esc(load.customer_payment_terms || '') + '</div></div>'
    +   '<div class="vcard"><div class="vlabel">CARRIER</div><div class="vname">' + esc(load.carrier_name || '') + '</div><div class="muted">MC# ' + esc(load.carrier_mc || '') + '</div></div>'
    +   '<div class="vcard"><div class="vlabel">LANE &amp; STOPS</div>' + stops + '</div>'
    +   '<div class="vcard"><div class="vlabel">LOAD DETAILS</div><div class="muted">' + [load.equipment, load.commodity, load.weight, load.bol_number].filter(Boolean).map(esc).join(' · ') + '</div></div>'
    + '</div>';
  renderStepper(load);
  renderViewActions(load);
  var close = document.getElementById('v-close');
  if (close) close.addEventListener('click', closeSlideout);
}

var TMS_STATUSES = ['Draft', 'Available', 'Covered', 'Dispatched', 'In Transit', 'Delivered', 'POD Received', 'Ready to Submit', 'Submitted'];

function renderStepper(load) {
  var el = document.getElementById('v-stepper');
  if (!el) return;
  if (load.status === 'Cancelled') {
    el.innerHTML = '<div class="vlabel" style="color:#8b97ad">LIFECYCLE</div><div class="chips"><span class="chip cancelled">Cancelled</span></div>';
    return;
  }
  var cur = TMS_STATUSES.indexOf(load.status || 'Draft');
  if (cur < 0) cur = 1;
  var html = '<div class="vlabel" style="color:#8b97ad">LIFECYCLE</div><div class="chips">';
  TMS_STATUSES.forEach(function(s, i){
    var cls = 'chip', click = '';
    if (s === 'Submitted') { cls += ' locked'; }
    else if (i < cur) { cls += ' done'; click = ' data-status="' + s + '"'; }
    else if (i === cur) { cls += ' current'; }
    else { cls += ' upcoming'; click = ' data-status="' + s + '"'; }
    html += '<span class="' + cls + '"' + click + '>' + esc(s) + '</span>';
  });
  el.innerHTML = html + '</div>';
  el.querySelectorAll('.chip[data-status]').forEach(function(chip){
    chip.addEventListener('click', function(){ changeStatus(load, chip.getAttribute('data-status')); });
  });
}

function showToast(msg) {
  var t = document.getElementById('tms-toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){ t.classList.add('hidden'); }, 2500);
}

function changeStatus(load, status) {
  var lid = (load && load.id) || (window._slideoutLoad && window._slideoutLoad.id) || '';
  if (!status || !lid || !brokerEmail) return;
  fetch(BROKER_API_BASE + '/tms-status', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: brokerEmail, load_id: lid, status: status })
  }).then(function(r){ return r.json(); }).then(function(p){
    if (p && p.ok) { load.status = status; window._slideoutLoad = load; renderView(load); showToast('Status → ' + status); }
    else { showToast((p && p.error) || 'Status update failed'); }
  }).catch(function(){ showToast('Status update failed'); });
}

function canCancel(status) {
  return ['Delivered', 'POD Received', 'Submitted', 'Cancelled'].indexOf(status || '') === -1;
}

function cancelLoad(load) {
  var lid = (load && load.id) || (window._slideoutLoad && window._slideoutLoad.id) || '';
  if (!lid || !brokerEmail) return Promise.resolve();
  if (typeof confirm === 'function' && !confirm('Cancel load ' + (load.load_number || lid) + '? It will be removed from the active board (reversible).')) {
    return Promise.resolve();
  }
  return fetch(BROKER_API_BASE + '/tms-status-bulk', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: brokerEmail, load_ids: [String(lid)], status: 'Cancelled' })
  }).then(function(r){ return r.json(); }).then(function(p){
    var skipped = (p && p.skipped && p.skipped.length);
    showToast(skipped ? 'Could not cancel (ineligible)' : 'Load cancelled');
    if (!skipped) { if (typeof closeSlideout === 'function') closeSlideout(); loadBoard(); }
  }).catch(function(){ showToast('Cancel failed'); });
}

function renderViewActions(load) {
  var el = document.getElementById('v-actions');
  if (!el) return;
  if (load.status === 'Submitted') {
    var link = load.funding_portal_link || '';
    el.innerHTML = link
      ? '<a class="vbtn light" href="' + esc(link) + '" target="_blank">Open funding record ↗</a>'
      : '<span class="muted" style="color:#aeb8cc">Submitted</span>';
    return;
  }
  var actionsHtml = '<button class="vbtn light" id="v-edit">✎ Edit load</button>';
  if (canCancel(load.status)) {
    actionsHtml += '<button class="vbtn" id="v-cancel-load" style="color:#7a1f1f">Cancel Load</button>';
  }
  el.innerHTML = actionsHtml;
  document.getElementById('v-edit').addEventListener('click', function(){ selectForEdit(load.id); });
  var cl = document.getElementById('v-cancel-load');
  if (cl) cl.onclick = function(){ cancelLoad(load); };
}

function selectForEdit(loadId) {
  try { localStorage.setItem('tmsLoadTarget', JSON.stringify({ load_id: loadId, mode: 'edit', ts: Date.now() })); } catch (e) {}
  try { sessionStorage.setItem('tmsLoadId', loadId); } catch (e) {}
  navigateToDetail();
}

var selectedLoadIds = [];

function onRowCheck(id, checked) {
  id = String(id);
  var i = selectedLoadIds.indexOf(id);
  if (checked && i === -1) selectedLoadIds.push(id);
  if (!checked && i !== -1) selectedLoadIds.splice(i, 1);
  toggleBulkBar();
}

function toggleBulkBar() {
  var bar = document.getElementById('bulk-bar');
  if (!bar) return;
  if (selectedLoadIds.length) {
    bar.classList.remove('hidden');
    var c = document.getElementById('bulk-count');
    if (c) c.textContent = selectedLoadIds.length + ' selected';
  } else {
    bar.classList.add('hidden');
  }
}

function _bulkPost(status) {
  if (!selectedLoadIds.length || !brokerEmail) return Promise.resolve();
  var ids = selectedLoadIds.slice();
  return fetch(BROKER_API_BASE + '/tms-status-bulk', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: brokerEmail, load_ids: ids, status: status })
  }).then(function(r){ return r.json(); }).then(function(p){
    var n = (p && p.updated ? p.updated.length : 0);
    var m = (p && p.skipped ? p.skipped.length : 0);
    showToast(n + ' updated' + (m ? ', ' + m + ' skipped' : ''));
    selectedLoadIds = [];
    toggleBulkBar();
    return loadBoard();
  }).catch(function(){ showToast('Bulk update failed'); });
}

function bulkApply() {
  var s = document.getElementById('bulk-status');
  if (!s || !s.value) { showToast('Pick a status first'); return Promise.resolve(); }
  return _bulkPost(s.value);
}

function bulkCancel() { return _bulkPost('Cancelled'); }

function loadBoard() {
  if (!brokerEmail) return;
  return fetch(BROKER_API_BASE + '/tms-loads?email=' + encodeURIComponent(brokerEmail))
    .then(function(r){ return r.json(); })
    .then(function(p){ renderBoard(p); })
    .catch(function(){ setText('sub', 'Could not load the board.'); });
}

function boot() {
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.UTIL) return;
  var result = ZOHO.CREATOR.UTIL.getInitParams();
  if (result && typeof result.then === 'function') {
    result.then(function(params){
      brokerEmail = (params && (params.loginUser || params.login_user || params.email)) || '';
      loadBoard();
    });
  }
}

document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeSlideout(); });

window.addEventListener('load', function(){
  renderPills();
  var s = document.getElementById('search');
  if (s) s.addEventListener('input', function(){ searchTerm = s.value; applyFilters(); });
  var nb = document.getElementById('new-load-btn');
  if (nb) nb.addEventListener('click', newLoad);
  var b = document.getElementById('tms-backdrop');
  if (b) b.addEventListener('click', closeSlideout);
  var ba = document.getElementById('bulk-apply'); if (ba) ba.onclick = bulkApply;
  var bc = document.getElementById('bulk-cancel'); if (bc) bc.onclick = bulkCancel;
  boot();
});

// expose for tests
window.renderBoard = renderBoard;
window.applyFilters = applyFilters;
window.selectLoad = selectLoad;
window.newLoad = newLoad;
window.showSlideout = showSlideout;
window.closeSlideout = closeSlideout;
window.openSlideout = openSlideout;
window.selectForEdit = selectForEdit;
window.renderView = renderView;
window.renderStepper = renderStepper;
window.changeStatus = changeStatus;
window.onRowCheck = onRowCheck; window.toggleBulkBar = toggleBulkBar;
window.bulkApply = bulkApply; window.bulkCancel = bulkCancel;
window.canCancel = canCancel; window.cancelLoad = cancelLoad;
window.STATUSES = STATUSES; window.TMS_STATUSES = TMS_STATUSES;
</script>
</body>
</html>
