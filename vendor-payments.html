<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Payments</title>
<style>
  :root {
    --of-charcoal: #1d1d1f; --of-orange: #F97316; --of-orange-soft: #FEF3E8;
    --of-gray-50: #F8F9FB; --of-gray-100: #F1F2F4; --of-gray-200: #E5E7EB;
    --of-gray-300: #D1D5DB; --of-gray-500: #6B7280; --of-gray-700: #374151;
    --of-green: #059669; --of-green-soft: #ECFDF5;
    --of-amber: #D97706; --of-amber-soft: #FFFBEB;
    --of-red: #DC2626; --of-red-soft: #FEF2F2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; background: #f0efe9; color: var(--of-charcoal); min-height: 100vh; }
  .page { max-width: 1400px; margin: 0 auto; padding: 20px 24px 60px; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
  .title { font-size: 22px; font-weight: 700; }
  .subtitle { font-size: 12px; color: var(--of-gray-500); margin-top: 4px; }
  .acct-pill { background: var(--of-gray-100); border: 1px solid var(--of-gray-200); padding: 6px 12px; border-radius: 8px; font-size: 12px; color: var(--of-gray-700); }
  .acct-pill b { color: var(--of-charcoal); margin-left: 4px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--of-gray-200); margin-bottom: 18px; }
  .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--of-gray-500); border-bottom: 2px solid transparent; }
  .tab.active { color: var(--of-charcoal); border-bottom-color: var(--of-orange); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .loading, .empty { padding: 36px; text-align: center; color: var(--of-gray-500); background: #fff; border: 1px solid #e6e3da; border-radius: 12px; }
  .empty strong { color: var(--of-charcoal); display: block; margin-bottom: 6px; font-size: 14px; }
  .version-stamp { text-align: right; font-size: 10px; color: #bbb; padding: 8px 4px 0; }

  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  .search { flex: 1; max-width: 280px; padding: 9px 12px; border: 1px solid var(--of-gray-300); border-radius: 8px; font-size: 13px; font-family: inherit; }
  .search:focus { outline: none; border-color: var(--of-orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.12); }
  .btn-pdf { background: #fff; border: 1px solid var(--of-gray-300); border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 700; color: var(--of-gray-700); cursor: pointer; font-family: inherit; }
  .btn-pdf:hover { background: var(--of-gray-50); }

  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi-card { background: #fff; border: 1px solid #e6e3da; border-radius: 10px; padding: 14px 16px; }
  .kpi-label { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--of-gray-500); }
  .kpi-value { font-size: 22px; font-weight: 700; color: var(--of-charcoal); margin-top: 4px; }

  .vp-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e6e3da; border-radius: 12px; overflow: hidden; }
  .vp-table th, .vp-table td { padding: 10px 14px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--of-gray-100); }
  .vp-table th { background: var(--of-gray-50); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--of-gray-700); }
  .vp-table tbody tr { cursor: pointer; }
  .vp-table tbody tr:hover { background: var(--of-gray-50); }
  .vp-table td.num, .vp-table th.num { text-align: right; }
  /* Admin see-all: keep Load # tight (shrink to content), give Debtor room, keep the date column on one line */
  .vp-table.vp-seeall th:nth-child(2), .vp-table.vp-seeall td:nth-child(2) { white-space: nowrap; width: 1%; }
  .vp-table.vp-seeall th:nth-child(3), .vp-table.vp-seeall td:nth-child(3) { min-width: 210px; }
  .vp-table.vp-seeall th:nth-child(7), .vp-table.vp-seeall td:nth-child(7) { white-space: nowrap; }
  .vp-table .empty-row { text-align: center; color: var(--of-gray-500); padding: 30px; }
  .pending-vendor { color: var(--of-gray-500); font-family: ui-monospace, monospace; font-size: 12px; }
  .pending-vendor em { font-style: normal; opacity: 0.7; }

  .pill { display: inline-block; padding: 2px 10px; border-radius: 11px; font-size: 11px; font-weight: 700; }
  .pill.paid { background: var(--of-green-soft); color: var(--of-green); }
  .pill.pending { background: var(--of-amber-soft); color: var(--of-amber); }
  input[type="date"] { padding: 8px 10px; border: 1px solid var(--of-gray-300); border-radius: 8px; font-size: 13px; font-family: inherit; }
  select#hist-preset { padding: 8px 10px; border: 1px solid var(--of-gray-300); border-radius: 8px; font-size: 13px; background: #fff; font-family: inherit; }

  .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 99; }
  .detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 95vw; background: #fff; border-left: 1px solid var(--of-gray-200); box-shadow: -4px 0 24px rgba(0,0,0,0.12); z-index: 100; overflow-y: auto; padding: 20px 24px 40px; }
  .detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--of-gray-100); }
  .detail-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .detail-close { background: transparent; border: none; font-size: 22px; cursor: pointer; color: var(--of-gray-500); padding: 0 6px; }
  .detail-close:hover { color: var(--of-charcoal); }
  .dp-section { margin-bottom: 18px; }
  .dp-heading { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--of-gray-500); margin-bottom: 8px; }
  .dp-row { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--of-gray-100); }
  .dp-row:last-child { border-bottom: none; }
  .dp-label { color: var(--of-gray-500); }
  .dp-value { color: var(--of-charcoal); font-weight: 600; text-align: right; }
  .dp-value .override { color: var(--of-orange); }

  /* ===== Mobile (<=640px): card reflow + stacking ===== */
  @media (max-width: 640px) {
    html, body { overflow-x: hidden; }
    .page { padding: 14px 12px 48px; max-width: 100%; }
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }

    /* P2 — stack KPIs + toolbar */
    .kpis { grid-template-columns: 1fr !important; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar .search { max-width: none; width: 100%; }

    /* P5 — detail panel near full screen */
    .detail-panel { width: 100% !important; max-width: 100% !important; }

    /* P6 — tap targets + no iOS zoom */
    .tab, .btn-pdf, .detail-close { min-height: 44px; }
    input, select, textarea, .search { font-size: 16px; }

    /* P3 — vp tables reflow to cards */
    .vp-table thead { display: none; }
    .vp-table, .vp-table tbody, .vp-table tr, .vp-table td { display: block; width: 100%; }
    .vp-table { border-radius: 0; border: none; }
    .vp-table tbody tr {
      border: 1px solid #e6e3da; border-radius: 10px; background: #fff;
      padding: 8px 12px; margin: 0 0 10px;
    }
    .vp-table td {
      display: flex; justify-content: space-between; gap: 12px;
      text-align: right; padding: 5px 0; border: none;
    }
    .vp-table td.num { text-align: right; }
    .vp-table td[data-label]::before {
      content: attr(data-label); font-weight: 700; color: var(--of-gray-500);
      text-align: left; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px;
    }
    .vp-table td.empty-row { text-align: center; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <div class="title">Vendor Payments</div>
      <div class="subtitle">Open obligations and payment history</div>
    </div>
    <div class="acct-pill" id="acctPill" style="display:none;">Account<b id="acctName">-</b></div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="open" id="tab-open">Open AP</div>
    <div class="tab" data-tab="history" id="tab-history">Payment History</div>
  </div>
  <div class="tab-panel active" id="panel-open"><div class="loading">Loading open vendor payments...</div></div>
  <div class="tab-panel" id="panel-history"><div class="loading">Click to load Payment History</div></div>
  <div class="version-stamp">v2026-06-17.1</div>
</div>
<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<script src="https://tcroteau01-commits.github.io/zoho-widget-host/operfi-impersonate.js?v=2"></script>
<script src="https://tcroteau01-commits.github.io/zoho-widget-host/operfi-av.js?v=1"></script>
<script>
(function () {
  'use strict';
  var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';
  var state = { email: '', accountName: '', activeTab: 'open' };

  function isLocalTest() {
    var params = new URLSearchParams(window.location.search);
    return window.location.protocol === 'file:' || params.get('mock') === '1';
  }

  function waitForZoho(attempts, delay) {
    if (typeof ZOHO !== 'undefined' && ZOHO.CREATOR) return Promise.resolve();
    if (attempts <= 0) return Promise.reject(new Error('Widget must be loaded inside OperFi Broker Portal. Or append ?email=BROKER_EMAIL to the URL to test.'));
    return new Promise(function (resolve, reject) {
      setTimeout(function () { waitForZoho(attempts - 1, delay).then(resolve, reject); }, delay);
    });
  }

  function init() {
    bindTabHandlers();
    var override = new URLSearchParams(window.location.search).get('email');
    if (override) {
      state.email = override;
      onReady();
      return;
    }
    waitForZoho(30, 100).then(function () {
      return ZOHO.CREATOR.UTIL.getInitParams();
    }).then(function (initParams) {
      try { console.log('[VendorPayments] init params:', initParams); } catch (e) {}
      var loginUser = initParams && (initParams.loginUser || initParams.login_user || initParams.email);
      state.email = loginUser || '';
      if (!state.email) throw new Error('No login email returned from Creator.');
      onReady();
    }).catch(function (err) { showFatal(err.message || 'Failed to load.'); });
  }

  function onReady() {
    // Open AP loads automatically. History loads only on first tab click.
    fetchOpenAP();
  }

  function bindTabHandlers() {
    document.querySelectorAll('.tab').forEach(function (el) {
      el.addEventListener('click', function () { activateTab(el.dataset.tab); });
    });
  }

  function activateTab(name) {
    state.activeTab = name;
    document.querySelectorAll('.tab').forEach(function (el) {
      el.classList.toggle('active', el.dataset.tab === name);
    });
    document.querySelectorAll('.tab-panel').forEach(function (el) {
      el.classList.toggle('active', el.id === 'panel-' + name);
    });
    if (name === 'history' && !state.historyLoaded) {
      fetchHistory();
    }
  }

  function fetchOpenAP() {
    var panel = document.getElementById('panel-open');
    if (isLocalTest()) {
      renderOpenAP(MOCK_OPEN_ROWS, mockTotals(MOCK_OPEN_ROWS, 'open'), 'Marek LLC (mock)');
      state.accountName = 'Marek LLC (mock)';
      document.getElementById('acctName').textContent = state.accountName;
      document.getElementById('acctPill').style.display = 'inline-block';
      return;
    }
    panel.innerHTML = '<div class="loading">Loading open vendor payments...</div>';
    fetch(BROKER_API_BASE + '/vendor-payments/open?email=' + encodeURIComponent(state.email))
      .then(function (r) {
        if (r.status === 404) {
          return r.json().then(function () {
            showEmpty('panel-open', 'Vendor payments not yet available', 'Your account is being set up. Once your first load is funded, vendor payments will appear here. Contact your OperFi account manager if you have questions.');
            throw new Error('__handled__');
          });
        }
        if (!r.ok) {
          return r.json().then(function (b) { throw new Error((b && b.error) || ('HTTP ' + r.status)); });
        }
        return r.json();
      })
      .then(function (data) {
        state.seeAll = !!data.seeAll;
        state.accountName = data.accountName || '';
        if (state.accountName) {
          document.getElementById('acctName').textContent = state.accountName;
          document.getElementById('acctPill').style.display = 'inline-block';
        }
        renderOpenAP(data.rows || [], data.totals || {}, state.accountName);
      })
      .catch(function (e) {
        if (e && e.message === '__handled__') return;
        showEmpty('panel-open', 'Could not load Open AP', e.message);
      });
  }

  function renderOpenAP(rows, totals, accountName) {
    state.openRows = rows;
    state.openTotals = totals;
    var html = '' +
      '<div class="toolbar">' +
        '<input class="search" id="open-search" placeholder="Search vendor, load, USDOT…" />' +
        (state.seeAll ? clientSelect('open-client', rows) : '') +
        factorSelect('open-factor', rows) +
        '<button class="btn-pdf" id="open-pdf">Export PDF</button>' +
      '</div>' +
      '<div class="kpis">' +
        kpiCard('OPEN LOADS', totals.openLoads || 0) +
        kpiCard('TOTAL OWED', '$' + fmtMoney(totals.totalOwed || 0)) +
        kpiCard('CARRIERS',   totals.carrierCount || 0) +
      '</div>' +
      '<div id="open-table-wrap"></div>';
    document.getElementById('panel-open').innerHTML = html;
    document.getElementById('open-search').addEventListener('input', renderOpenTable);
    document.getElementById("open-factor").addEventListener('change', renderOpenTable);
    if (state.seeAll) document.getElementById('open-client').addEventListener('change', renderOpenTable);
    document.getElementById('open-pdf').addEventListener('click', function () { exportPdf('open'); });
    renderOpenTable();
  }

  function renderOpenTable() {
    var q = (document.getElementById('open-search').value || '').toLowerCase();
    var fsel = (document.getElementById('open-factor') || {}).value || '__all';
    var csel = (document.getElementById('open-client') || {}).value || '__all';
    var filtered = (state.openRows || []).filter(function (r) {
      return matchesSearch(r, q) && matchesFactor(r, fsel) && matchesClient(r, csel);
    });
    var today = new Date();
    var rowsHtml = filtered.map(function (r) {
      var vendor = r['Vendor Name'] ? escapeHtml(r['Vendor Name']) :
        '<span class="pending-vendor">' + escapeHtml(r['USDOT'] || '') + ' <em>(pending)</em></span>';
      var buy = r['Date of Buy Date'] || r['Purchase Date'] || '';
      var age = '';
      if (buy) { try { age = Math.floor((today - new Date(buy)) / (1000*60*60*24)); } catch (e) {} }
      var statusClass = (r['Payment Status'] === 'Paid') ? 'paid' : 'pending';
      return '' +
        '<tr data-id="' + escapeHtml(r['_id'] || '') + '">' +
        (state.seeAll ? '<td data-label="Client">' + escapeHtml(r['Client'] || '') + '</td>' : '') +
        '<td data-label="Load #">' + escapeHtml(r['Load #'] || '') + '</td>' +
        '<td data-label="Debtor">' + escapeHtml(r['Debtor'] || '') + '</td>' +
        '<td data-label="Vendor">' + vendor + '</td>' +
        '<td data-label="Factor">' + factorLabel(r) + '</td>' +
        '<td class="num" data-label="Amount">$' + fmtMoney(r['Vendor Amount'] || 0) + '</td>' +
        '<td data-label="Due">' + escapeHtml(r['Vendor Due'] || '') + '</td>' +
        '<td class="num" data-label="AP Age">' + age + '</td>' +
        '<td data-label="Terms">' + escapeHtml(r['Broker Pmt Terms'] || r['Vendor Pmt Terms'] || '-') + '</td>' +
        '<td data-label="Status"><span class="pill ' + statusClass + '">' + escapeHtml(r['Payment Status'] || '') + '</span></td>' +
        '</tr>';
    }).join('');
    var clientTh = state.seeAll ? '<th>Client</th>' : '';
    var colCount = state.seeAll ? 10 : 9;
    var table = '' +
      '<table class="vp-table' + (state.seeAll ? ' vp-seeall' : '') + '">' +
        '<thead><tr>' + clientTh + '<th>Load #</th><th>Debtor</th><th>Vendor</th><th>Factor</th><th class="num">Amount</th><th>Due</th><th class="num">AP Age</th><th>Terms</th><th>Status</th></tr></thead>' +
        '<tbody>' + (rowsHtml || '<tr><td colspan="' + colCount + '" class="empty-row">No open vendor payments.</td></tr>') + '</tbody>' +
      '</table>';
    document.getElementById('open-table-wrap').innerHTML = table;
    document.querySelectorAll('#open-table-wrap tbody tr[data-id]').forEach(function (tr) {
      tr.addEventListener('click', function () { openDetail(tr.dataset.id, state.openRows); });
    });
  }

  function kpiCard(label, value) {
    return '<div class="kpi-card"><div class="kpi-label">' + label + '</div><div class="kpi-value">' + escapeHtml(String(value)) + '</div></div>';
  }
  function factorLabel(r) {
    var f = r['Factoring Company'] || '';
    if (f) return escapeHtml(f);
    return r['_av_resolved'] ? 'Direct' : '—';
  }
  function distinctFactors(rows) {
    var set = {};
    (rows || []).forEach(function (r) {
      var f = r['Factoring Company'] || (r['_av_resolved'] ? 'Direct' : '');
      if (f) set[f] = true;
    });
    return Object.keys(set).sort();
  }
  function matchesSearch(r, q) {
    if (!q) return true;
    var hay = [r['Vendor Name'], r['USDOT'], r['Load #'], r['Invoice #'],
               r['Vendor Invoice #'], r['PO #']].map(function (x) {
      return String(x || '').toLowerCase();
    });
    return hay.some(function (s) { return s.indexOf(q) !== -1; });
  }
  function matchesFactor(r, sel) {
    if (!sel || sel === '__all') return true;
    var f = r['Factoring Company'] || (r['_av_resolved'] ? 'Direct' : '');
    return f === sel;
  }
  function distinctClients(rows) {
    var set = {};
    (rows || []).forEach(function (r) { if (r['Client']) set[r['Client']] = true; });
    return Object.keys(set).sort();
  }
  function clientSelect(id, rows) {
    var opts = ['<option value="__all">All clients</option>'].concat(
      distinctClients(rows).map(function (c) {
        return '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
      })).join('');
    return '<select class="search" id="' + id + '">' + opts + '</select>';
  }
  function matchesClient(r, sel) {
    if (!sel || sel === '__all') return true;
    return (r['Client'] || '') === sel;
  }
  // id="open-factor" and id="hist-factor" are injected by factorSelect below
  function factorSelect(id, rows) {
    var opts = ['<option value="__all">All factors</option>'].concat(
      distinctFactors(rows).map(function (f) {
        return '<option value="' + escapeHtml(f) + '">' + escapeHtml(f) + '</option>';
      })).join('');
    return '<select class="search" id="' + id + '">' + opts + '</select>';
  }
  function fmtMoney(n) { return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function showEmpty(panelId, title, detail) {
    document.getElementById(panelId).innerHTML = '<div class="empty"><strong>' + escapeHtml(title) + '</strong><br>' + escapeHtml(detail) + '</div>';
  }
  function openDetail(id, rows) {
    var row = (rows || []).find(function (r) { return r['_id'] === id; });
    if (!row) return;
    var brokerTerms = row['Broker Pmt Terms'] || '';
    var vendorTerms = row['Vendor Pmt Terms'] || '';
    var override = brokerTerms && vendorTerms && brokerTerms !== vendorTerms;
    var vendorDisplay = row['Vendor Name'] || (row['USDOT'] + ' (pending)');
    var html = '' +
      '<div class="detail-overlay" id="detail-overlay"></div>' +
      '<aside class="detail-panel" id="detail-panel">' +
        '<div class="detail-head">' +
          '<div class="detail-title">Load #' + escapeHtml(row['Load #'] || '') + ' &mdash; ' + escapeHtml(vendorDisplay) + '</div>' +
          '<button class="detail-close" id="detail-close">&times;</button>' +
        '</div>' +
        detailSection('Amounts', [
          ['Vendor Gross Amt', '$' + fmtMoney(row['Vendor Gross Amt'] || 0)],
          ['Vendor Amount',    '$' + fmtMoney(row['Vendor Amount'] || 0)],
          ['AR Balance',       '$' + fmtMoney(row['AR Balance'] || 0)],
        ]) +
        detailSection('Dates', [
          ['Date of Buy Date', row['Date of Buy Date'] || '-'],
          ['Purchase Date',   row['Purchase Date'] || '-'],
          ['Vendor Due',      row['Vendor Due'] || '-'],
          ['Paid Date',       row['Paid Date'] || '-'],
        ]) +
        detailSection('Identifiers', [
          ['USDOT',            row['USDOT'] || '-'],
          ['Invoice #',        row['Invoice #'] || '-'],
          ['Vendor Invoice #', row['Vendor Invoice #'] || '-'],
          ['PO #',             row['PO #'] || '-'],
          ['Other Reference',  row['Other Reference'] || '-'],
          ['Client (Debtor)',  row['Debtor'] || '-'],
        ]) +
        detailSection('Terms & Routing', [
          ['Vendor Pmt Terms',                                       escapeHtml(vendorTerms || '-')],
          [override ? 'Broker Pmt Terms (override)' : 'Broker Pmt Terms', '<span class="' + (override ? 'override' : '') + '">' + escapeHtml(brokerTerms || '-') + '</span>'],
          ['Factoring Company', escapeHtml(row['Factoring Company'] || '-')],
          ['Pmt Acct Number',   escapeHtml(row['Pmt Acct Number'] || '-')],
        ]) +
        '<div class="dp-section">' +
          '<div class="dp-heading">Carrier Vetting</div>' +
          '<div id="vp-carrier-av"></div>' +
        '</div>' +
      '</aside>';
    document.body.insertAdjacentHTML('beforeend', html);
    if (window.OperFiAV) {
      OperFiAV.carrierBadge(document.getElementById('vp-carrier-av'),
        { usdot: row['USDOT'], email: state.email, apiBase: BROKER_API_BASE });
    }
    document.getElementById('detail-close').addEventListener('click', closeDetail);
    document.getElementById('detail-overlay').addEventListener('click', closeDetail);
    document.addEventListener('keydown', escClose);
  }

  function detailSection(heading, kvs) {
    var rows = kvs.map(function (kv) {
      return '<div class="dp-row"><span class="dp-label">' + escapeHtml(kv[0]) + '</span><span class="dp-value">' + kv[1] + '</span></div>';
    }).join('');
    return '<div class="dp-section"><div class="dp-heading">' + escapeHtml(heading) + '</div>' + rows + '</div>';
  }

  function closeDetail() {
    var p = document.getElementById('detail-panel');
    var o = document.getElementById('detail-overlay');
    if (p) p.remove();
    if (o) o.remove();
    document.removeEventListener('keydown', escClose);
  }

  function escClose(e) { if (e.key === 'Escape') closeDetail(); }

  function exportPdf(tab) {
    if (isLocalTest()) {
      alert('Test mode: PDF export would download vendor_payments_' + tab + '.pdf');
      return;
    }
    var url = BROKER_API_BASE + '/vendor-payments/pdf?email=' + encodeURIComponent(state.email) + '&tab=' + tab;
    if (tab === 'history') {
      var d = state.historyDates || defaultThisMonth();
      url += '&from=' + d.from + '&to=' + d.to;
    }
    window.open(url, '_blank');
  }

  function mockTotals(rows, tab) {
    var sum = rows.reduce(function (s, r) { return s + (Number(r['Vendor Amount']) || 0); }, 0);
    var vendors = new Set(rows.map(function (r) { return r['USDOT']; }).filter(Boolean));
    if (tab === 'open') return { openLoads: rows.length, totalOwed: sum, carrierCount: vendors.size };
    return { paymentCount: rows.length, totalPaid: sum, carriersPaid: vendors.size };
  }

  var MOCK_OPEN_ROWS = [
    { _id: 'm1', 'Load #': '8662', 'Debtor': 'Sunbelt Rentals', 'Vendor Name': 'A&M FAST TRANSPORT', 'USDOT': '92261', 'Vendor Amount': 850.00, 'Vendor Due': '2026-05-29', 'Date of Buy Date': '2026-05-08', 'Vendor Pmt Terms': 'Factoring Company', 'Broker Pmt Terms': 'Quick Pay', 'Factoring Company': 'RTS Financial', 'Pmt Acct Number': 'XXXX0001', 'Vendor Invoice #': 'INV1', 'Invoice #': '8662', 'Payment Status': 'Pending Payment', 'Purchase Date': '2026-05-08', 'AR Balance': 0, 'Vendor Gross Amt': 850, 'PO #': 'PO1', 'Other Reference': 'REF1' },
    { _id: 'm2', 'Load #': '8674', 'Debtor': 'United Rentals C/O Transportation Insight', 'Vendor Name': '', 'USDOT': '999999', 'Vendor Amount': 3700.00, 'Vendor Due': '2026-05-28', 'Date of Buy Date': '2026-05-10', 'Vendor Pmt Terms': '', 'Broker Pmt Terms': '', 'Factoring Company': '', 'Pmt Acct Number': '', 'Vendor Invoice #': 'INV2', 'Invoice #': '8674', 'Payment Status': 'Pending Payment', 'Purchase Date': '2026-05-10', 'AR Balance': 0, 'Vendor Gross Amt': 3700, 'PO #': 'PO2', 'Other Reference': 'REF2' }
  ];

  function fetchHistory() {
    state.historyLoaded = true;
    if (!state.historyDates) state.historyDates = defaultThisMonth();
    renderHistoryShell();
    doHistoryFetch();
  }

  function defaultThisMonth() {
    var now = new Date();
    var y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2,'0');
    var first = y + '-' + m + '-01';
    var lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    var last = y + '-' + m + '-' + String(lastDay).padStart(2,'0');
    return { from: first, to: last };
  }

  function renderHistoryShell() {
    var d = state.historyDates;
    var html = '' +
      '<div class="toolbar">' +
        '<select id="hist-preset">' +
          '<option value="week">This Week</option>' +
          '<option value="this">This Month</option>' +
          '<option value="last">Last Month</option>' +
          '<option value="custom">Specific Date</option>' +
        '</select>' +
        '<input type="date" id="hist-from" value="' + d.from + '" />' +
        '<input type="date" id="hist-to" value="' + d.to + '" />' +
        '<input class="search" id="hist-search" placeholder="Search vendor, load, USDOT…" />' +
        (state.seeAll ? clientSelect('hist-client', state.historyRows) : '') +
        factorSelect('hist-factor', state.historyRows) +
        '<button class="btn-pdf" id="hist-pdf">Export PDF</button>' +
      '</div>' +
      '<div class="kpis" id="hist-kpis"></div>' +
      '<div id="hist-table-wrap"><div class="loading">Loading...</div></div>';
    document.getElementById('panel-history').innerHTML = html;
    document.getElementById('hist-preset').value = 'this';

    document.getElementById('hist-preset').addEventListener('change', onHistPreset);
    document.getElementById('hist-from').addEventListener('change', onHistDateChange);
    document.getElementById('hist-to').addEventListener('change', onHistDateChange);
    document.getElementById('hist-search').addEventListener('input', renderHistoryTable);
    document.getElementById('hist-factor').addEventListener('change', renderHistoryTable);
    if (state.seeAll) document.getElementById('hist-client').addEventListener('change', renderHistoryTable);
    document.getElementById('hist-pdf').addEventListener('click', function () { exportPdf('history'); });
  }

  function onHistPreset() {
    var v = document.getElementById('hist-preset').value;
    var now = new Date(), y = now.getFullYear(), mo = now.getMonth();
    function iso(d) { return d.toISOString().slice(0,10); }
    if (v === 'week') {
      var day = now.getDay();                 // 0=Sun
      var monday = new Date(now); monday.setDate(now.getDate() - ((day + 6) % 7));
      var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
      state.historyDates = { from: iso(monday), to: iso(sunday) };
    } else if (v === 'this') {
      state.historyDates = defaultThisMonth();
    } else if (v === 'last') {
      var first = new Date(y, mo - 1, 1), last = new Date(y, mo, 0);
      state.historyDates = { from: iso(first), to: iso(last) };
    }
    if (v !== 'custom') {
      document.getElementById('hist-from').value = state.historyDates.from;
      document.getElementById('hist-to').value = state.historyDates.to;
      doHistoryFetch();
    }
  }

  function onHistDateChange() {
    state.historyDates = {
      from: document.getElementById('hist-from').value,
      to: document.getElementById('hist-to').value
    };
    document.getElementById('hist-preset').value = 'custom';
    if (state.historyDates.from && state.historyDates.to && state.historyDates.from <= state.historyDates.to) {
      doHistoryFetch();
    }
  }

  function doHistoryFetch() {
    var d = state.historyDates;
    if (isLocalTest()) {
      state.historyRows = MOCK_HISTORY_ROWS;
      renderHistoryKpis(mockTotals(MOCK_HISTORY_ROWS, 'history'));
      renderHistoryTable();
      return;
    }
    document.getElementById('hist-table-wrap').innerHTML = '<div class="loading">Loading...</div>';
    var url = BROKER_API_BASE + '/vendor-payments/history?email=' + encodeURIComponent(state.email) +
      '&from=' + d.from + '&to=' + d.to;
    fetch(url)
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        state.seeAll = !!data.seeAll;
        state.historyRows = data.rows || [];
        renderHistoryKpis(data.totals || {});
        renderHistoryTable();
      })
      .catch(function (e) {
        document.getElementById('hist-table-wrap').innerHTML =
          '<div class="empty"><strong>Could not load history</strong><br>' + escapeHtml(e.message) + '</div>';
      });
  }

  function renderHistoryKpis(totals) {
    document.getElementById('hist-kpis').innerHTML = '' +
      kpiCard('PAYMENTS', totals.paymentCount || 0) +
      kpiCard('TOTAL PAID', '$' + fmtMoney(totals.totalPaid || 0)) +
      kpiCard('CARRIERS PAID', totals.carriersPaid || 0);
  }

  function renderHistoryTable() {
    var q = (document.getElementById('hist-search').value || '').toLowerCase();
    var fsel = (document.getElementById('hist-factor') || {}).value || '__all';
    var csel = (document.getElementById('hist-client') || {}).value || '__all';
    var filtered = (state.historyRows || []).filter(function (r) {
      return matchesSearch(r, q) && matchesFactor(r, fsel) && matchesClient(r, csel);
    });
    var rowsHtml = filtered.map(function (r) {
      var vendor = r['Vendor Name'] ? escapeHtml(r['Vendor Name']) :
        '<span class="pending-vendor">' + escapeHtml(r['USDOT'] || '') + ' <em>(pending)</em></span>';
      return '' +
        '<tr data-id="' + escapeHtml(r['_id'] || '') + '">' +
        (state.seeAll ? '<td data-label="Client">' + escapeHtml(r['Client'] || '') + '</td>' : '') +
        '<td data-label="Load #">' + escapeHtml(r['Load #'] || '') + '</td>' +
        '<td data-label="Debtor">' + escapeHtml(r['Debtor'] || '') + '</td>' +
        '<td data-label="Vendor">' + vendor + '</td>' +
        '<td data-label="Factor">' + factorLabel(r) + '</td>' +
        '<td class="num" data-label="Amount">$' + fmtMoney(r['Vendor Amount'] || 0) + '</td>' +
        '<td data-label="Paid Date">' + escapeHtml(r['Paid Date'] || '') + '</td>' +
        '<td data-label="Terms">' + escapeHtml(r['Broker Pmt Terms'] || r['Vendor Pmt Terms'] || '-') + '</td>' +
        '<td data-label="Status"><span class="pill paid">' + escapeHtml(r['Payment Status'] || '') + '</span></td>' +
        '</tr>';
    }).join('');
    var clientTh = state.seeAll ? '<th>Client</th>' : '';
    var colCount = state.seeAll ? 9 : 8;
    var table = '' +
      '<table class="vp-table' + (state.seeAll ? ' vp-seeall' : '') + '">' +
        '<thead><tr>' + clientTh + '<th>Load #</th><th>Debtor</th><th>Vendor</th><th>Factor</th><th class="num">Amount</th><th>Paid Date</th><th>Terms</th><th>Status</th></tr></thead>' +
        '<tbody>' + (rowsHtml || '<tr><td colspan="' + colCount + '" class="empty-row">No payments in this period.</td></tr>') + '</tbody>' +
      '</table>';
    document.getElementById('hist-table-wrap').innerHTML = table;
    document.querySelectorAll('#hist-table-wrap tbody tr[data-id]').forEach(function (tr) {
      tr.addEventListener('click', function () { openDetail(tr.dataset.id, state.historyRows); });
    });
  }

  var MOCK_HISTORY_ROWS = [
    { _id: 'h1', 'Load #': '8530', 'Debtor': 'Sunbelt Rentals', 'Vendor Name': 'CAMT TRANSPORTATION', 'USDOT': '12345', 'Vendor Amount': 1060.00, 'Paid Date': '2026-05-12', 'Vendor Due': '2026-05-12', 'Date of Buy Date': '2026-04-22', 'Vendor Pmt Terms': 'Standard Net 30', 'Broker Pmt Terms': 'Quick Pay', 'Factoring Company': '', 'Pmt Acct Number': 'XXXX0002', 'Vendor Invoice #': 'INV3', 'Invoice #': '8530', 'Payment Status': 'Paid', 'Purchase Date': '2026-04-22', 'AR Balance': 0, 'Vendor Gross Amt': 1060, 'PO #': 'PO3', 'Other Reference': 'REF3' }
  ];
  function showFatal(msg) {
    document.getElementById('panel-open').innerHTML =
      '<div class="empty"><strong>Widget unavailable</strong>' + (msg || '') + '</div>';
  }

  if (document.readyState === 'complete') init();
  else window.addEventListener('load', init);
})();
</script>
</body>
</html>
