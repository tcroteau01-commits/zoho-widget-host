<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendors</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f0efe9; color: #333; min-height: 100vh; }
.widget { max-width: 1320px; margin: 0 auto; padding: 20px 24px 60px; }

.widget-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }
.widget-title { font-size: 22px; font-weight: 700; color: #272727; letter-spacing: -0.2px; }
.widget-sub { font-size: 12px; color: #888; margin-top: 4px; }
.header-actions { display: flex; gap: 8px; }
.btn { background: #fff; border: 1px solid #d8d8d8; border-radius: 6px; padding: 8px 14px; font-size: 13px; font-weight: 600; color: #444; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn:hover { border-color: #b8b8b8; background: #fafafa; }
.btn.primary { background: #272727; color: #fff; border-color: #272727; }
.btn.primary:hover { background: #1a1a1a; }
.btn .ic { margin-right: 6px; opacity: 0.7; }

.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 18px; }
.kpi { background: #fff; border: 1px solid #e6e3da; border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden; }
.kpi::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #e8a020; }
.kpi.approved::before { background: #2e7d32; }
.kpi.factor::before { background: #1976d2; }
.kpi.quickpay::before { background: #f5a623; }
.kpi.dnu::before { background: #c62828; }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: #888; font-weight: 600; }
.kpi-value { font-size: 24px; font-weight: 700; color: #272727; margin-top: 4px; letter-spacing: -0.4px; }

.toolbar { background: #fff; border: 1px solid #e6e3da; border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.search { flex: 1; min-width: 240px; position: relative; }
.search input { width: 100%; border: 1px solid #d8d8d8; border-radius: 6px; padding: 9px 12px 9px 36px; font-size: 13px; font-family: inherit; background: #fafafa; outline: none; transition: all 0.15s; }
.search input:focus { border-color: #e8a020; background: #fff; box-shadow: 0 0 0 3px rgba(232,160,32,0.12); }
.search-ic { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }

.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { border: 1px solid #d8d8d8; background: #fff; border-radius: 999px; padding: 7px 13px; font-size: 12px; font-weight: 600; color: #555; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; user-select: none; }
.chip:hover { border-color: #b8b8b8; }
.chip.active { background: #272727; color: #fff; border-color: #272727; }
.chip .count { background: rgba(0,0,0,0.07); border-radius: 999px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
.chip.active .count { background: rgba(255,255,255,0.18); }

.list { display: flex; flex-direction: column; gap: 8px; }
.row {
  background: #fff; border: 1px solid #e6e3da; border-radius: 10px;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1.5fr 0.9fr 1.15fr 0.9fr 0.7fr 1fr 1fr 28px;
  gap: 14px; align-items: center;
  cursor: pointer; transition: all 0.12s; position: relative;
}
.row:hover { border-color: #c8c4b6; box-shadow: 0 2px 6px rgba(0,0,0,0.04); transform: translateY(-1px); }
.row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 10px 0 0 10px; background: #ddd; }
.row.s-approved::before { background: #2e7d32; }
.row.s-pending::before  { background: #f5a623; }
.row.s-denied::before   { background: #c62828; }
.row.s-dnu::before      { background: #c62828; }
.row.s-payment-change::before { background: #1976d2; }
.row.s-dnu { background: #fafaf6; }
.row.s-dnu .cell-val { color: #888; }

.cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; font-weight: 600; margin-bottom: 2px; }
.cell-val { font-size: 13px; color: #272727; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cell-val.lg { font-size: 14px; }
.cell-sub { font-size: 11px; color: #888; margin-top: 1px; font-weight: 500; }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.2px; text-transform: uppercase; white-space: nowrap;
}
.tag.factor   { background: #e3f0fb; color: #0d4a8a; }
.tag.quickpay { background: #fff4e0; color: #b86e00; }
.tag.net30    { background: #f0efe9; color: #555; }
.tag.dnu      { background: #fde4e4; color: #a31818; }
.tag.approved { background: #e3f4e3; color: #1f6321; }
.tag.pending  { background: #fff4e0; color: #b86e00; }
.tag.denied   { background: #fde4e4; color: #a31818; }
.tag.payment-change { background: #e3f0fb; color: #0d4a8a; }

.row-action {
  background: #fff; border: 1px solid #d8d8d8; border-radius: 6px;
  padding: 7px 12px; font-size: 11px; font-weight: 700; color: #444;
  cursor: pointer; transition: all 0.12s;
  text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
  font-family: inherit;
}
.row-action:hover:not(.disabled) { border-color: #e8a020; color: #e8a020; }
.row-action.disabled { opacity: 0.45; cursor: not-allowed; }

.chev { color: #ccc; transition: color 0.12s, transform 0.12s; text-align: right; }
.row:hover .chev { color: #888; transform: translateX(2px); }

/* States */
.state { background: #fff; border: 1px solid #e6e3da; border-radius: 10px; padding: 60px 24px; text-align: center; color: #888; }
.state-title { font-size: 16px; font-weight: 600; color: #555; margin-bottom: 6px; }
.state-msg { font-size: 13px; }
.state .spinner { width: 28px; height: 28px; border: 3px solid #e6e3da; border-top-color: #e8a020; border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; padding: 0 4px; font-size: 12px; color: #888; }

/* Allow grid children to shrink so `text-overflow: ellipsis` actually kicks in
   instead of cells expanding to their content's natural width. */
.row > div { min-width: 0; }
.kpi { min-width: 0; }

@media (max-width: 1100px) {
  .widget-header { flex-direction: column; align-items: stretch; }
  .header-actions { flex-wrap: wrap; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 20px; }
  .row { grid-template-columns: 1fr 1fr; gap: 10px; }
  .row .cell-chev { display: none; }
}

@media (max-width: 600px) {
  .widget { padding: 16px 12px 40px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .kpi { padding: 12px 14px; }
  .kpi-value { font-size: 18px; }
  .toolbar { padding: 8px; gap: 8px; }
  .chip { padding: 6px 11px; font-size: 11px; }
  .row {
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 12px 14px;
  }
  .row .cell-chev { display: none; }
  .cell-val { white-space: normal; }
  .cell-val.lg { font-size: 14px; line-height: 1.3; }
}

/* ===== Side panel ===== */
.scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 90; backdrop-filter: blur(2px); display: none; animation: fadeIn 0.18s ease-out; }
.scrim.show { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.panel { position: fixed; top: 0; right: 0; bottom: 0; width: 580px; max-width: 100vw; background: #f7f6f1; z-index: 100; box-shadow: -8px 0 32px rgba(0,0,0,0.12); display: none; flex-direction: column; animation: slideIn 0.22s ease-out; }
.panel.show { display: flex; }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.panel-top { background: #272727; color: #fff; padding: 14px 18px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.panel-top .nav-btn { width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.08); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 14px; transition: background 0.12s; }
.panel-top .nav-btn:hover { background: rgba(255,255,255,0.16); }
.panel-top .nav-btn.disabled { opacity: 0.35; cursor: not-allowed; }
.panel-top .position { font-size: 11px; color: rgba(255,255,255,0.55); font-weight: 600; letter-spacing: 0.3px; }
.panel-top .spacer { flex: 1; }
.panel-top .close-btn { width: 30px; height: 30px; border-radius: 6px; background: rgba(255,255,255,0.08); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 16px; transition: background 0.12s; }
.panel-top .close-btn:hover { background: rgba(255,255,255,0.18); }

.panel-header { background: #272727; color: #fff; padding: 0 22px 22px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.panel-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: rgba(255,255,255,0.5); font-weight: 700; margin-bottom: 4px; }
.panel-vendor { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }
.panel-meta { display: flex; gap: 14px; align-items: center; font-size: 13px; color: rgba(255,255,255,0.7); flex-wrap: wrap; }
.panel-meta .dot { color: rgba(255,255,255,0.3); }
.panel-status-row { margin-top: 14px; display: flex; gap: 8px; align-items: center; }

.panel-body { flex: 1; overflow-y: auto; padding: 18px 22px 24px; }
.panel-section { background: #fff; border: 1px solid #e6e3da; border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.panel-section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px;
  color: #888; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.panel-section-title::after { content: ''; flex: 1; height: 1px; background: #f0efe9; }

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
.field-grid.full > .field { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.field-val { font-size: 14px; color: #272727; font-weight: 600; word-break: break-word; }
.field-val.empty { color: #bbb; font-weight: 500; font-style: italic; }

.panel-footer { border-top: 1px solid #e6e3da; background: #fff; padding: 12px 22px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 10px; }
.panel-footer .actions { display: flex; gap: 8px; }
.kbd { display: inline-block; background: #f0efe9; border: 1px solid #e0ddd2; border-bottom-width: 2px; border-radius: 4px; padding: 1px 6px; font-family: ui-monospace, 'SF Mono', monospace; font-size: 10px; font-weight: 700; color: #555; margin: 0 2px; }
.kbd-hints { font-size: 11px; color: #888; }

/* ===== Mobile (<=640px): stacked labeled cards + panel full screen ===== */
@media (max-width: 640px) {
  html, body { overflow-x: hidden; }
  .widget { padding: 14px 12px 40px; max-width: 100%; }
  .widget-header { flex-direction: column; align-items: stretch; gap: 12px; }
  .header-actions { flex-wrap: wrap; }
  .header-actions .btn { flex: 1 1 auto; }

  /* P2 — stack KPIs + toolbar */
  .kpi-row { grid-template-columns: 1fr !important; gap: 8px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search { min-width: 0; width: 100%; }

  /* P3-equivalent — grid row list becomes single-column labeled cards */
  .row { grid-template-columns: 1fr !important; gap: 8px; }
  .row .cell-chev { display: none; }
  .cell-val { white-space: normal; }
  .row-action { width: 100%; }

  /* P5 — slide-in detail panel near full screen */
  .panel { width: 100% !important; max-width: 100% !important; }
  .field-grid { grid-template-columns: 1fr !important; }
  .panel-footer { flex-direction: column; align-items: stretch; gap: 8px; }
  .panel-footer .actions { flex-wrap: wrap; }
  .panel-footer .actions .btn { flex: 1 1 auto; }

  /* P6 — tap targets + no iOS zoom */
  .btn, .chip, .row-action { min-height: 44px; }
  input, select, textarea, .search input { font-size: 16px; }
}
</style>

<body>

<div class="widget">

  <div class="widget-header">
    <div>
      <div class="widget-title">Vendors</div>
      <div class="widget-sub">All carriers and vendors connected to your account</div>
    </div>
    <div class="header-actions">
      <button class="btn" id="btn-export"><span class="ic">⤓</span>Export CSV</button>
      <button class="btn primary" id="btn-new"><span class="ic">＋</span>Add New Carrier</button>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total Vendors</div><div class="kpi-value" id="kpi-total">—</div></div>
    <div class="kpi approved"><div class="kpi-label">Active / Approved</div><div class="kpi-value" id="kpi-approved">—</div></div>
    <div class="kpi factor"><div class="kpi-label">With Factoring</div><div class="kpi-value" id="kpi-factor">—</div></div>
    <div class="kpi quickpay"><div class="kpi-label">Quick Pay</div><div class="kpi-value" id="kpi-quickpay">—</div></div>
    <div class="kpi dnu"><div class="kpi-label">Do Not Use</div><div class="kpi-value" id="kpi-dnu">—</div></div>
  </div>

  <div class="toolbar">
    <div class="search">
      <span class="search-ic">⌕</span>
      <input type="text" id="search-input" placeholder="Search by vendor name, MC#, DOT, or email...">
    </div>
    <div class="chips" id="chips"></div>
    <select id="sort-select" class="btn" aria-label="Sort vendors" style="cursor:pointer;">
      <option value="status">Status</option>
      <option value="name_asc">Name (A–Z)</option>
      <option value="name_desc">Name (Z–A)</option>
      <option value="rel_new" selected>Relationship: Newest</option>
      <option value="rel_old">Relationship: Oldest</option>
    </select>
  </div>

  <div id="results">
    <div class="state">
      <div class="spinner"></div>
      <div class="state-title">Loading vendors…</div>
      <div class="state-msg" id="load-progress">Pulling your vendor list</div>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none;">
    <div id="footer-count">—</div>
  </div>

  <div style="text-align:right;font-size:10px;color:#bbb;padding:10px 8px 0;">v2026-06-24.1</div>
</div>

<aside class="panel" id="panel"></aside>

<script>
(function() {
'use strict';

var BROKER_API_BASE = 'https://operfi-broker-api.onrender.com';

var brokerEmail = '';
var allRecords = [];
var filteredRecords = [];
var currentFilter = 'all';
var currentSort = 'rel_new';
var currentSearch = '';
var openIndex = -1;
var vvDocCache = {};   // vendorId -> documents array
var vvRiskCache = {}; // vendorId -> carrier-profile response
var vvPanelCtx = null; // { vendorId, isDnu, statusKey, isFactored } for the currently-open panel
var currentLoadId = 0;

// ── Status / payment classification ───────────────────────────────────────
// Status priority: DO_NOT_USE overrides everything.
function statusMeta(r) {
  if (r.DO_NOT_USE === true || r.DO_NOT_USE === 'true') {
    return { key: 'dnu', label: 'Do Not Use', tag: 'dnu' };
  }
  var raw = r.Vendor_Status || '';
  switch (raw) {
    case 'Approved':       return { key: 'approved',       label: 'Approved',       tag: 'approved' };
    case 'Pending':        return { key: 'pending',        label: 'Pending',        tag: 'pending' };
    case 'DENIED':         return { key: 'denied',         label: 'Denied',         tag: 'denied' };
    case 'Payment Change': return { key: 'payment-change', label: 'Payment Change', tag: 'payment-change' };
    default:               return { key: 'unknown',        label: raw || '—',       tag: '' };
  }
}

// Payment method: Factoring > Quick Pay > Net terms
function paymentMeta(r) {
  var factoring = (r.Factoring_Company || '').trim();
  var terms     = (r.Payment_Terms || '').trim();
  if (factoring) return { key: 'factor', label: 'Factoring', tag: 'factor', sub: factoring };
  if (/quick\s*pay/i.test(terms)) return { key: 'quickpay', label: 'Quick Pay', tag: 'quickpay', sub: terms };
  if (terms) return { key: 'net30', label: terms, tag: 'net30', sub: '' };
  return { key: 'unknown', label: '—', tag: '', sub: '' };
}

// ── Boot ──────────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  bindGlobalUI();
  bootApp();
});

function bootApp() {
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR) {
    showError('SDK unavailable', 'Reload the page.');
    return;
  }
  function gotParams(params) {
    console.log('[ViewVendors] init params:', params);
    brokerEmail = (params && (params.loginUser || params.login_user || params.email)) || '';
    if (!brokerEmail) {
      showError('Could not identify broker', 'Open DevTools console (F12) for details.');
      return;
    }
    console.log('[ViewVendors] Booted as', brokerEmail);
    loadAllRecords();
  }
  if (!ZOHO.CREATOR.UTIL || typeof ZOHO.CREATOR.UTIL.getInitParams !== 'function') {
    showError('SDK shape unexpected', 'getInitParams is not available.');
    return;
  }
  try {
    var result = ZOHO.CREATOR.UTIL.getInitParams();
    if (result && typeof result.then === 'function') {
      result.then(gotParams).catch(function(err) {
        console.error('[ViewVendors] getInitParams rejected', err);
        showError('Initialization failed', 'Could not read init params.');
      });
    } else {
      gotParams(result);
    }
  } catch (err) {
    console.error('[ViewVendors] getInitParams threw', err);
    showError('Initialization failed', 'Could not read init params.');
  }
}

function bindGlobalUI() {
  document.getElementById('search-input').addEventListener('input', function(e) {
    currentSearch = e.target.value.toLowerCase().trim();
    applyFilters();
  });
  document.getElementById('sort-select').addEventListener('change', function(e) {
    currentSort = e.target.value;
    applyFilters();
  });
  document.getElementById('btn-new').addEventListener('click', function() {
    navigateParent('#Page:Carrier_Onboarding');
  });
  document.getElementById('btn-export').addEventListener('click', exportCsv);

  document.getElementById('scrim').addEventListener('click', closePanel);
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('panel').classList.contains('show')) return;
    if (e.key === 'Escape') closePanel();
    else if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); navPanel(1); }

function navigateParent(hash) {
  var sp = new URLSearchParams(window.location.search);
  var origin = sp.get('serviceOrigin') || 'https://brokerhub.operfi.com';
  var url = origin.replace(/\/$/, '') + '/' + hash;
  try { window.top.location.href = url; return; } catch (e) {}
  try { window.parent.location.href = url; return; } catch (e) {}
  try { window.open(url, '_top'); } catch (e) {}
}

// ── Data load ─────────────────────────────────────────────────────────────
function loadAllRecords() {
  if (!brokerEmail) return;
  currentLoadId++;
  var loadId = currentLoadId;

  document.getElementById('results').innerHTML =
    '<div class="state"><div class="spinner"></div>' +
    '<div class="state-title">Loading vendors…</div>' +
    '<div class="state-msg">Pulling your vendor list</div></div>';

  var qs = new URLSearchParams({
    email: brokerEmail,
    report: 'Check_All_Vendors',
    from_idx: '1',
    limit: '200'
  });
  var url = BROKER_API_BASE + '/broker-report?' + qs.toString();

  fetch(url).then(function(res) {

    return res.json();
  }).then(function(payload) {

  }).catch(function(err) {

    console.error('[ViewVendors] /broker-report failed', err);
    showError('Could not load vendors', 'Open DevTools console (F12) for the error.');
  });
}

function sortRecords(records) {
  var arr = records.slice();
  if (currentSort === 'name_asc' || currentSort === 'name_desc') {
    var dir = currentSort === 'name_asc' ? 1 : -1;
    arr.sort(function(a, b) {
      return dir * (a.Vendor_Name || '').toLowerCase()
                     .localeCompare((b.Vendor_Name || '').toLowerCase());
    });
    return arr;
  }
  if (currentSort === 'rel_new' || currentSort === 'rel_old') {
    var sign = currentSort === 'rel_new' ? -1 : 1;
    arr.sort(function(a, b) {
      var da = parseAddedTime(a.Added_Time), db = parseAddedTime(b.Added_Time);
      if (!da && !db) return (a.Vendor_Name || '').localeCompare(b.Vendor_Name || '');
      if (!da) return 1;   // missing dates always sort last
      if (!db) return -1;
      return sign * (da.getTime() - db.getTime());
    });
    return arr;
  }
  // 'status' (default) — preserved verbatim from the original onRecordsLoaded sort.
  arr.sort(function(a, b) {
    var sa = statusMeta(a), sb = statusMeta(b);
    var rank = { approved: 0, pending: 1, 'payment-change': 1, denied: 2, dnu: 3, unknown: 4 };
    var diff = (rank[sa.key] || 9) - (rank[sb.key] || 9);
    if (diff !== 0) return diff;
    return (a.Vendor_Name || '').localeCompare(b.Vendor_Name || '');
  });
  return arr;
}

function onRecordsLoaded(records) {
  allRecords = records;
  buildChips();
  applyFilters();
}

// ── Chips / filters ───────────────────────────────────────────────────────
function buildChips() {
  var chips = document.getElementById('chips');
  var counts = countBy(allRecords);
  var def = [
    { key: 'all',       label: 'All',        count: allRecords.length },
    { key: 'approved',  label: 'Approved',   count: counts.status.approved || 0 },
    { key: 'pending',   label: 'Pending',    count: (counts.status.pending || 0) + (counts.status['payment-change'] || 0) },
    { key: 'factor',    label: 'Factoring',  count: counts.payment.factor || 0 },
    { key: 'quickpay',  label: 'Quick Pay',  count: counts.payment.quickpay || 0 },
    { key: 'net30',     label: 'Net Terms',  count: counts.payment.net30 || 0 },
    { key: 'dnu',       label: 'Do Not Use', count: counts.status.dnu || 0 }
  ];
  chips.innerHTML = '';
  def.forEach(function(c) {
    if (c.key === 'dnu' && c.count === 0) return;
    var el = document.createElement('span');
    el.className = 'chip' + (c.key === currentFilter ? ' active' : '');
    el.dataset.key = c.key;
    el.innerHTML = esc(c.label) + ' <span class="count">' + c.count + '</span>';
    el.addEventListener('click', function() {
      currentFilter = c.key;
      document.querySelectorAll('#chips .chip').forEach(function(x) { x.classList.remove('active'); });
      el.classList.add('active');
      applyFilters();
    });
    chips.appendChild(el);
  });
}

function countBy(records) {
  var status = {}, payment = {};
  records.forEach(function(r) {
    var sk = statusMeta(r).key;
    var pk = paymentMeta(r).key;
    status[sk]  = (status[sk] || 0) + 1;
    // Don't count payment for DNU rows
    if (sk !== 'dnu') payment[pk] = (payment[pk] || 0) + 1;
  });
  return { status: status, payment: payment };
}

function applyFilters() {
  filteredRecords = sortRecords(allRecords).filter(function(r) {
    if (currentFilter !== 'all') {
      var sm = statusMeta(r), pm = paymentMeta(r);
      if (currentFilter === 'approved' && sm.key !== 'approved') return false;
      if (currentFilter === 'pending'  && sm.key !== 'pending' && sm.key !== 'payment-change') return false;
      if (currentFilter === 'dnu'      && sm.key !== 'dnu')      return false;
      if (currentFilter === 'factor'   && pm.key !== 'factor')   return false;
      if (currentFilter === 'quickpay' && pm.key !== 'quickpay') return false;
      if (currentFilter === 'net30'    && pm.key !== 'net30')    return false;
    }
    if (currentSearch) {
      var hay = [
        r.Vendor_Name,
        r.Email,
        r.Phone_Number,
        r.MC ? 'mc# ' + r.MC : '',
        r.USDOT ? 'dot ' + r.USDOT : '',
        r.Factoring_Company
      ].filter(Boolean).join(' ').toLowerCase();
      if (hay.indexOf(currentSearch) === -1) return false;
    }
    return true;
  });
  renderKpis();
  renderList();
  renderFooter();
}

function renderKpis() {
  var counts = countBy(allRecords);
  document.getElementById('kpi-total').textContent    = allRecords.length.toLocaleString();
  document.getElementById('kpi-approved').textContent = (counts.status.approved || 0).toLocaleString();
  document.getElementById('kpi-factor').textContent   = (counts.payment.factor || 0).toLocaleString();
  document.getElementById('kpi-quickpay').textContent = (counts.payment.quickpay || 0).toLocaleString();
  document.getElementById('kpi-dnu').textContent      = (counts.status.dnu || 0).toLocaleString();
}

    results.innerHTML = '<div class="state"><div class="state-title">No vendors match your filters</div>' +

    return;
  }
  var html = '<div class="list">';
  filteredRecords.forEach(function(r) { html += rowHtml(r, allRecords.indexOf(r)); });
  html += '</div>';
  results.innerHTML = html;

  results.querySelectorAll('.row').forEach(function(rowEl) {
    rowEl.addEventListener('click', function(e) {
      if (e.target.closest('.row-action')) return;
      var idx = parseInt(rowEl.dataset.idx, 10);
      openPanel(idx);

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (btn.classList.contains('disabled')) return;

  });
}

// ── Side panel ────────────────────────────────────────────────────────────
function openPanel(allRecordsIdx) {
  var rec = allRecords[allRecordsIdx];
  var idx = filteredRecords.indexOf(rec);
  if (idx === -1) return;
  openIndex = idx;
  renderPanel();
  document.getElementById('scrim').classList.add('show');
  document.getElementById('panel').classList.add('show');
}
function closePanel() {
  document.getElementById('scrim').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  openIndex = -1;
}
function navPanel(dir) {
  var next = openIndex + dir;
  if (next < 0 || next >= filteredRecords.length) return;
  openIndex = next;
  renderPanel();
}

function loadVendorDocs(vendorId, container, force) {
  if (!container) return;
  if (!force && vvDocCache[vendorId]) { renderVendorDocs(vvDocCache[vendorId], container); refreshVettingPane(); return; }
  container.innerHTML = '<div class="vv-doc-state" style="font-size:12px;color:#999;">Loading documents…</div>';
  fetch(BROKER_API_BASE + '/carrier-docs?email=' + encodeURIComponent(brokerEmail) +
        '&vendor_id=' + encodeURIComponent(vendorId) + (force ? '&refresh=1' : ''))
    .then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function (data) {
      var docs = (data.documents || []).slice().sort(function (a, b) {
        return (b.created_time || 0) - (a.created_time || 0);
      });
      vvDocCache[vendorId] = docs;
      renderVendorDocs(docs, container);
      refreshVettingPane();
    })
    .catch(function () {
      container.innerHTML = '<div class="vv-doc-state" style="font-size:12px;color:#a3322b;">Couldn\'t load documents.</div>';
    });
}

function refreshVendorVetting(vendorId) {
  delete vvRiskCache[vendorId];
  delete vvDocCache[vendorId];
  var rec = filteredRecords[openIndex];
  loadVendorDocs(vendorId, document.getElementById('vv-docs'), true);
  if (rec && String(rec.ID) === String(vendorId)) loadVendorRedFlags(rec, true);
}

var VV_DOC_ICON = { agreement: '📄', onboarding: '📋', banking: '🏦', coi: '🛡️', noa: '🧾', lor: '🧾', other: '📎' };

function renderVendorDocs(docs, container) {
  docs = docs || [];
  container.innerHTML = '';

  var title = document.createElement('div');
  title.className = 'vvp-sec-title';
  title.appendChild(document.createTextNode('Documents'));
  var ct = document.createElement('span');
  ct.className = 'vvp-ct';
  ct.textContent = docs.length + ' on file';
  title.appendChild(ct);
  container.appendChild(title);

  var list = document.createElement('div');
  list.className = 'vvp-docs';
  container.appendChild(list);

  docs.forEach(function (d) {
    var row = document.createElement('div');
    row.className = 'vvp-doc';
    var dic = document.createElement('div'); dic.className = 'vvp-dic';
    dic.textContent = VV_DOC_ICON[d.type] || '📎';
    var main = document.createElement('div'); main.className = 'vvp-dmain';
    var lab = document.createElement('div'); lab.className = 'vvp-dlabel';
    lab.textContent = d.label || d.type || 'Document';
    var file = document.createElement('div'); file.className = 'vvp-dfile';
    file.textContent = d.filename || '';
    main.appendChild(lab); main.appendChild(file);
    var btn = document.createElement('button'); btn.className = 'vvp-dbtn'; btn.textContent = 'View';
    btn.addEventListener('click', function () {
      if (!window.OperFiDocViewer) return;
      OperFiDocViewer.open({
        url: BROKER_API_BASE + '/carrier-doc-file?t=' + encodeURIComponent(d.preview_token),
        filename: d.filename || (d.type || 'document')
      });
    });
    row.appendChild(dic); row.appendChild(main); row.appendChild(btn);
    list.appendChild(row);
  });

  // Recommended (not on file) — advisory only, never blocking.
  var present = {};
  docs.forEach(function (d) { present[d.type] = true; });
  var ctx = vvPanelCtx || {};
  var missing = recommendedDocs(ctx).filter(function (r) {
    return !r.match.some(function (k) { return present[k]; });
  });
  if (missing.length) {
    var head = document.createElement('div');
    head.className = 'vvp-rec-head';
    head.textContent = 'Recommended (not on file)';
    container.appendChild(head);
    var recList = document.createElement('div');
    recList.className = 'vvp-docs';
    container.appendChild(recList);
    missing.forEach(function (r) {
      var row = document.createElement('div');
      row.className = 'vvp-doc recommended';
      var dic = document.createElement('div'); dic.className = 'vvp-dic';
      dic.textContent = VV_DOC_ICON[r.match[0]] || '📎';
      var main = document.createElement('div'); main.className = 'vvp-dmain';
      var lab = document.createElement('div'); lab.className = 'vvp-dlabel';
      lab.textContent = r.label;
      var note = document.createElement('div'); note.className = 'vvp-dnote';
      note.textContent = 'You may already have it in your TMS. Keeping a copy here is recommended.';
      main.appendChild(lab); main.appendChild(note);
      row.appendChild(dic); row.appendChild(main);
      recList.appendChild(row);
    });
  }
}

// ── Exception-only, severity-ranked vetting flags (Phase 1) ──────────────
function deriveVettingFlags(profile, ctx) {
  profile = profile || {}; ctx = ctx || {};
  var ipqs = profile.ipqs || {};
  var risk = (profile.risk && profile.risk.flags) || [];
  function has(id) { return risk.some(function (f) { return f.id === id; }); }
  var flags = [];

  // Account / status hard stops
  if (ctx.isDnu) flags.push({ key: 'dnu', level: 'stop', label: 'Do Not Use',
    reason: 'This carrier is marked Do Not Use.' });
  if (ctx.statusKey === 'denied') flags.push({ key: 'denied', level: 'stop', label: 'Denied',
    reason: 'This carrier was denied.' });

  // Bank
  if (has('bank_bad_actor')) flags.push({ key: 'bank_bad_actor', level: 'stop',
    label: 'Bank: linked to flagged vendor',
    reason: 'Bank account is linked to a vendor flagged for fraud.' });
  if (has('bank_account_shared')) flags.push({ key: 'bank_account_shared', level: 'stop',
    label: 'Bank: account shared with another carrier',
    reason: 'This bank account is in use by another carrier.' });
  if (has('bank_routing_invalid')) flags.push({ key: 'bank_routing_invalid', level: 'stop',
    label: 'Bank: routing not valid / not in FedACH',
    reason: 'Routing number is not a valid FedACH routing number.' });
  if (has('bank_name_mismatch')) flags.push({ key: 'bank_name_mismatch', level: 'check',
    label: 'Bank: name mismatch',
    reason: 'Account-holder name does not match the carrier.' });
  // bank_state_mismatch intentionally NOT surfaced in Phase 1 (profile-only).

  // Footprint — VOIP/VPN. Either alone = check; both = a single stop.
  var voip = !!ipqs.voip_number || has('voip_phone');
  var vpn  = !!ipqs.vpn_detected || has('vpn_signup');
  if (voip && vpn) flags.push({ key: 'foot_both', level: 'stop', label: 'VOIP + VPN',
    reason: 'Phone is VOIP and signup was VPN-masked, a strong spoofing signal.' });
  else if (voip) flags.push({ key: 'foot_voip', level: 'check', label: 'VOIP phone',
    reason: 'Carrier phone is a VOIP number.' });
  else if (vpn) flags.push({ key: 'foot_vpn', level: 'check', label: 'VPN-masked signup',
    reason: 'Signup IP was masked by a VPN.' });

  // Factor — only ever denied/pending (exception-only).
  if (has('factor_not_approved')) flags.push({ key: 'factor_denied', level: 'stop',
    label: 'Factor denied', reason: 'Factoring company is not approved by OperFi.' });
  else if (has('factor_pending')) flags.push({ key: 'factor_pending', level: 'check',
    label: 'Factor pending OperFi approval', reason: 'Factoring company is pending OperFi approval.' });

  // Payment change pending
  if (ctx.statusKey === 'payment-change') flags.push({ key: 'pay_change', level: 'check',
    label: 'Payment change pending', reason: 'A payment-info change is pending review.' });

  // Stop above check; stable within level (Node/JSDOM sort is stable).
  var order = { stop: 0, check: 1 };
  return flags.slice().sort(function (a, b) { return order[a.level] - order[b.level]; });
}

// ── Recommended documents (advisory, never required/blocking) ──────────────
// COI is recommended on every carrier. The payment doc pairs with factoring:
// factored -> NOA/LOR (either noa or lor); not factored -> Banking.
function recommendedDocs(ctx) {
  ctx = ctx || {};
  var rec = [{ key: 'coi', label: 'Insurance (COI)', match: ['coi'] }];
  if (ctx.isFactored) {
    rec.push({ key: 'noa_lor', label: 'NOA or LOR', match: ['noa', 'lor'] });
  } else {
    rec.push({ key: 'banking', label: 'Banking (Voided Check / Bank Info)', match: ['banking'] });
  }
  return rec;
}

// ── Vetting summary ──────────────────────────────────────────────────────
function vettingSummary(flags, profileMissing) {
  flags = flags || [];
  if (!flags.length) {
    if (profileMissing) {
      return { level: 'check', ic: '⚠', text: "Couldn't check this carrier", sub: 'Tap Refresh to retry.' };
    }
    return { level: 'clean', ic: '✓', text: 'Looks clean',
             sub: 'No vetting flags. Review the full profile before you submit.' };
  }
  var stops = flags.filter(function (f) { return f.level === 'stop'; }).length;
  var n = flags.length;
  if (stops) {
    return { level: 'stop', ic: '⛔', text: n + ' issue' + (n > 1 ? 's' : '') + ' to review',
             sub: 'At least one is a hard stop. Open the full profile before booking.' };
  }
  return { level: 'check', ic: '⚠', text: n + ' thing' + (n > 1 ? 's' : '') + ' to check',
           sub: 'No hard stops, but review before you submit.' };
}

// ── Exception-only vetting pane ───────────────────────────────────────────
var VV_FLAG_ICON = { stop: '⛔', check: '⚠' };
var VV_FLAG_SEV  = { stop: 'Stop', check: 'Check' };

function renderVettingPane(profile, ctx, container, profileMissing) {
  container.innerHTML = '';
  var flags = deriveVettingFlags(profile, ctx);
  var summary = vettingSummary(flags, profileMissing);

  var sum = document.createElement('div');
  sum.className = 'vvp-summary ' + summary.level;
  var sic = document.createElement('div'); sic.className = 'vvp-ic'; sic.textContent = summary.ic;
  var stx = document.createElement('div'); stx.className = 'vvp-txt'; stx.textContent = summary.text;
  var ssub = document.createElement('small'); ssub.textContent = summary.sub; stx.appendChild(ssub);
  sum.appendChild(sic); sum.appendChild(stx);
  container.appendChild(sum);

  if (!flags.length) return;
  var wrap = document.createElement('div'); wrap.className = 'vvp-flags';
  flags.forEach(function (f) {
    var card = document.createElement('div');
    card.className = 'vvp-flag ' + f.level;
    var fic = document.createElement('div'); fic.className = 'vvp-fic'; fic.textContent = VV_FLAG_ICON[f.level] || '';
    var main = document.createElement('div'); main.className = 'vvp-fmain';
    var lab = document.createElement('div'); lab.className = 'vvp-flabel'; lab.textContent = f.label;
    var why = document.createElement('div'); why.className = 'vvp-freason'; why.textContent = f.reason;
    main.appendChild(lab); main.appendChild(why);
    var sev = document.createElement('div'); sev.className = 'vvp-fsev'; sev.textContent = VV_FLAG_SEV[f.level] || '';
    card.appendChild(fic); card.appendChild(main); card.appendChild(sev);
    wrap.appendChild(card);
  });
  container.appendChild(wrap);
}

// Repaint the vetting pane from whatever is cached right now.
// Called after profile arrives; DNU/status are known from row data immediately.
function refreshVettingPane() {
  if (!vvPanelCtx) return;
  var c = document.getElementById('vv-redflags');
  if (!c) return;
  var profile = vvRiskCache[vvPanelCtx.vendorId] || null;
  var profileMissing = !profile && !!vvPanelCtx.profileError;
  if (!profile) {
    // Before the profile loads, only DNU/status are known — derive from those alone.
    renderVettingPane({ risk: { flags: [] }, ipqs: {} }, vvPanelCtx, c, profileMissing);
    return;
  }
  renderVettingPane(profile, vvPanelCtx, c, false);
}

function loadVendorRedFlags(rec, force) {
  vvPanelCtx = {
    vendorId: rec.ID,
    isDnu: statusMeta(rec).key === 'dnu',
    statusKey: statusMeta(rec).key,
    isFactored: !!(rec.Factoring_Company || '').trim(),
    profileError: false
  };
  refreshVettingPane();
  if (!force && vvRiskCache[rec.ID]) { refreshVettingPane(); return; }
  fetch(BROKER_API_BASE + '/carrier-profile?email=' + encodeURIComponent(brokerEmail) +
        '&vendor_id=' + encodeURIComponent(rec.ID) + (force ? '&refresh=1' : ''))
    .then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function (profile) { vvRiskCache[rec.ID] = profile; refreshVettingPane(); })
    .catch(function () {
      if (vvPanelCtx && vvPanelCtx.vendorId === rec.ID) {
        vvPanelCtx.profileError = true;
        refreshVettingPane();
      }
    });
}

// Same-origin localStorage bridge - Carrier Profile widget reads this on
// load because Creator doesn't forward URL hash params into widget iframes.
function stashCarrierProfileTarget(vendorId, modal) {
  try {
    localStorage.setItem('carrierProfileTarget', JSON.stringify({
      Vendor_ID: String(vendorId),
      Modal: modal || '',
      ts: Date.now()
    }));
  } catch (e) {}
}

function stashNoaTarget(vendorId) {
  try {
    localStorage.setItem('noaManagementTarget', JSON.stringify({
      Vendor_ID: String(vendorId), action: 'submit', ts: Date.now()
    }));
  } catch (e) {}
}

function field(label, val) {
  var has = val !== null && val !== undefined && String(val).trim() !== '';
  return '<div class="field"><div class="field-label">' + esc(label) + '</div>' +
    '<div class="field-val' + (has ? '' : ' empty') + '">' + (has ? esc(String(val)) : '—') + '</div></div>';
}

// ── Helpers ───────────────────────────────────────────────────────────────
var REL_MONTHS = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
var REL_MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Parse Creator's "dd-MMM-yyyy HH:mm:ss" Added_Time into a Date (date part only).
// Returns null for missing or unparseable input.
function parseAddedTime(value) {
  if (!value) return null;
  var m = /^(\d{1,2})-([A-Za-z]{3})-(\d{4})/.exec(String(value).trim());
  if (!m) return null;
  var mon = REL_MONTHS[m[2].charAt(0).toUpperCase() + m[2].slice(1).toLowerCase()];
  if (mon === undefined) return null;
  var d = new Date(parseInt(m[3], 10), mon, parseInt(m[1], 10));
  return isNaN(d.getTime()) ? null : d;
}

// 'short' -> "Mar 2025"; 'full' -> "Mar 14, 2025". Em-dash when unparseable.
function formatRelDate(value, style) {
  var d = parseAddedTime(value);
  if (!d) return '—';
  var mon = REL_MONTH_NAMES[d.getMonth()];
  if (style === 'full') return mon + ' ' + d.getDate() + ', ' + d.getFullYear();
  return mon + ' ' + d.getFullYear();
}

function formatAddress(addr) {
  if (!addr) return '';
  if (typeof addr === 'string') return addr;
  var parts = [];
  if (addr.address_line_1) parts.push(addr.address_line_1);
  var cs = [];
  if (addr.district_city)  cs.push(addr.district_city);
  if (addr.state_province) cs.push(addr.state_province);
  var csStr = cs.join(', ');
  if (addr.postal_Code) csStr += (csStr ? ' ' : '') + addr.postal_Code;
  if (csStr) parts.push(csStr);
  return parts.join(', ');
}
function mapsHref(addr) {
  var s = String(addr || '').trim();
  return s ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s) : '';
}
function addressFieldHtml(addr) {
  var mh = mapsHref(addr);
  var val = mh ? '<a href="' + esc(mh) + '" target="_blank" rel="noopener">' + esc(addr) + '</a>' : esc(addr);
  return '<div class="field"><div class="field-label">Address</div><div class="field-val">' + val + '</div></div>';
}
if (typeof window !== 'undefined') {
  window.mapsHref = mapsHref;
  window.addressFieldHtml = addressFieldHtml;
}
function formatPhone(v) {
  if (!v) return '';
  var s = String(v).trim();
  if (/^\+/.test(s)) return s;
  var digits = s.replace(/[^\d]/g, '');
  if (digits.length === 10) return '+1 ' + s;
  if (digits.length === 11 && digits[0] === '1') return '+' + digits[0] + ' ' + s.replace(/^1[\s-]?/, '');
  return s;
}
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(ch) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch];
  });
}

// ── CSV export ────────────────────────────────────────────────────────────
function exportCsv() {
  if (!filteredRecords.length) return;
  var headers = ['Vendor','MC','DOT','Email','Phone','Address','Payment Method','Payment Terms','Factoring Company','Status','Relationship Since'];
  var rows = filteredRecords.map(function(r) {
    var s = statusMeta(r);
    var p = paymentMeta(r);
    return [
      r.Vendor_Name || '',
      r.MC || '',
      r.USDOT || '',
      r.Email || '',
      r.Phone_Number || '',
      formatAddress(r.Address),
      p.label,
      r.Payment_Terms || '',
      r.Factoring_Company || '',
      s.label,
      formatRelDate(r.Added_Time, 'full')
    ];
  });
  var csv = [headers].concat(rows).map(function(row) {
    return row.map(function(cell) {
      var s = String(cell);
      if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',');
  }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'vendors_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Exposed for tests (the script runs inside an IIFE under 'use strict').
window.__vvtest = {
  deriveVettingFlags: deriveVettingFlags,
  recommendedDocs: recommendedDocs,
  vettingSummary: vettingSummary
};

})();
